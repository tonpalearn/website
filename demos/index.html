// REVEAL hook

function useReveal() {
  useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

function useScrollProgress() {
  useEffect(() => {
    const onScroll = () => {
      const h = document.documentElement;
      const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
      document.documentElement.style.setProperty('--scroll-pct', pct + '%');
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
}

// ─────────── Demo #1: Chatbot ───────────
function ChatbotDemo() {

    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, thinking]);

  const send = (text) => {
    if (!text.trim()) return;
    setMessages(m => [...m, { from: 'user', text }]);
    setInput('');
    setThinking(true);
    setTimeout(() => {
      const a = findKbAnswer(text) || 'ขอบคุณที่ถามครับ! เรื่องนี้แนะนำให้ทักไลน์ @tonpalearn เพื่อคุยรายละเอียดดีกว่าครับ 🙏';
      setMessages(m => [...m, { from: 'ai', text: a }]);
      setThinking(false);
    }, 700 + Math.random() * 600);
  };

  const suggestions = ['คอร์สมีอะไรบ้าง?', 'ราคาเท่าไหร่?', 'AI Agent คืออะไร?', 'รับงาน corporate ไหม?'];

  return (
    <div className="glass-strong p-5 reveal flex flex-col" style={{ minHeight: 480 }}>
      <div className="flex items-start justify-between mb-3">
        <div>
          <div className="font-display font-bold text-lg text-white">💬 Mini Chatbot</div>
          <div className="text-[11px] text-slate-400 mt-0.5">FAQ บอท · rule-based · ใช้กับ Claude API ได้ (P1)</div>
        </div>
        <span className="pill-status st-paid">● Online</span>
      </div>

      <div ref={scrollRef} className="flex-1 space-y-2 overflow-y-auto scrollable pr-1" style={{ maxHeight: 320 }}>
        {messages.map((m, i) => (
          <div key={i} className={`flex ${m.from === 'user' ? 'justify-end' : 'justify-start'}`}>
            <div className={`max-w-[80%] px-3.5 py-2 rounded-2xl text-sm ${m.from === 'user' ? 'bubble-user' : 'bubble-ai'}`}>
              {m.text}
            </div>
          </div>
        ))}
        {thinking && (
          <div className="flex justify-start">
            <div className="bubble-ai px-3.5 py-2 rounded-2xl text-sm flex items-center gap-1.5">
              <span className="inline-block w-1.5 h-1.5 rounded-full bg-gold-200 animate-pulse" style={{background:'var(--gold-200)'}}></span>
              <span className="inline-block w-1.5 h-1.5 rounded-full bg-gold-200 animate-pulse" style={{background:'var(--gold-200)', animationDelay: '0.15s'}}></span>
              <span className="inline-block w-1.5 h-1.5 rounded-full bg-gold-200 animate-pulse" style={{background:'var(--gold-200)', animationDelay: '0.30s'}}></span>
            </div>
          </div>
        )}

      <div className="flex flex-wrap gap-1.5 mt-3">
        {suggestions.map(s => (
          <button key={s} onClick={() => send(s)} className="pill text-[11px]">{s}</button>
        ))}
      </div>

      <form onSubmit={e => { e.preventDefault(); send(input); }} className="mt-3 flex gap-2">
