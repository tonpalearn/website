  strategies:SlideStrategies,

  permissions:SlidePermissions,
  mindset:SlideMindset,
  summary:SlideSummary,
}

const SLIDE_TITLES={
  cover:"Amway Thailand 2026",
  context:"บริบท 2026",
  personas:"10 Personas",
  panel_verdict:"Panel Verdict",
  swot:"SWOT",
  strategies:"5 กลยุทธ์",
  playbook:"Persona Playbook",
  preview_philosophy:"Preview Philosophy",

  permissions:"Permission Questions",
  mindset:"Mindset Rules",
  summary:"สรุป",
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────

function App(){
  const [current,setCurrent]=useState(0)
  const [key,setKey]=useState(0)
  const total=SLIDES.length

  const go=useCallback((dir)=>{
    setCurrent(c=>{
      const next=Math.max(0,Math.min(total-1,c+dir))
      if(next!==c)setKey(k=>k+1)
      return next
    })
  },[total])

  useEffect(()=>{
    const handler=(e)=>{
      if(e.key==="ArrowRight"||e.key==="ArrowDown")go(1)
      if(e.key==="ArrowLeft"||e.key==="ArrowUp")go(-1)
    }
    window.addEventListener("keydown",handler)
    return()=>window.removeEventListener("keydown",handler)
  },[go])

  const SlideComp=SLIDE_COMPONENTS[SLIDES[current].id]
  const pct=((current+1)/total*100).toFixed(1)

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",position:"relative",zIndex:1}}>

      {/* TOP NAV */}
      <div style={{
        display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"10px 20px",borderBottom:"1px solid rgba(255,255,255,.04)",
        background:"rgba(4,6,15,.8)",backdropFilter:"blur(12px)",flexShrink:0,
      }}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:28,height:28,borderRadius:6,background:"linear-gradient(135deg,#0d9488,#0891b2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span className="mono" style={{fontSize:10,fontWeight:700,color:"white"}}>UP</span>
          </div>
          <div className="mono" style={{fontSize:10,color:"#334155",display:"none"}} id="desktop-title">
            UP WELLNESS · AMWAY THAILAND 2026 · PANEL RESEARCH
          </div>
        </div>

        {/* Slide dots / mini nav */}
        <div style={{display:"flex",gap:3,alignItems:"center"}}>
          {SLIDES.map((_,i)=>(
            <button key={i} onClick={()=>{setCurrent(i);setKey(k=>k+1)}} style={{
              width:i===current?20:6,height:6,borderRadius:99,border:"none",cursor:"pointer",
              background:i===current?"#06b6d4":"rgba(255,255,255,.1)",transition:"all .2s",
              padding:0,
            }}/>
          ))}
        </div>

        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span className="mono" style={{fontSize:10,color:"#334155"}}>{current+1}/{total}</span>
          <span className="mono" style={{fontSize:10,color:"#06b6d4"}}>{SLIDE_TITLES[SLIDES[current].id]}</span>
        </div>
      </div>

      {/* PROGRESS BAR */}
      <div style={{height:2,background:"rgba(255,255,255,.04)",flexShrink:0}}>
        <div className="progress-bar" style={{height:2,width:`${pct}%`,background:"linear-gradient(90deg,#0891b2,#0d9488)"}}/>
      </div>

      {/* SLIDE CONTENT */}
      <div key={key} className="slide-enter" style={{flex:1,padding:"clamp(14px,2vw,24px) clamp(16px,2.5vw,32px)",overflow:"hidden"}}>
        <SlideComp/>
      </div>

      {/* BOTTOM NAV */}
      <div style={{
        display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"10px 20px",borderTop:"1px solid rgba(255,255,255,.04)",
        background:"rgba(4,6,15,.8)",backdropFilter:"blur(12px)",flexShrink:0,
      }}>
        <button className="nav-btn" onClick={()=>go(-1)} disabled={current===0}>← ก่อนหน้า</button>
        <div className="mono" style={{fontSize:10,color:"#1e293b"}}>
          ← → เพื่อเลื่อน slide
        </div>
        <button className="nav-btn" onClick={()=>go(1)} disabled={current===total-1}>ถัดไป →</button>
      </div>

    </div>
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)
</script>
