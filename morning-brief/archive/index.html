<!-- Pre-paint theme detection — avoids FOUC -->
<script>
  (function() {
    try {
      var mode = localStorage.getItem('mb-theme') || 'auto';
      var effective;
      if (mode === 'auto') {
        effective = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      } else {
        effective = mode;
      }
      document.documentElement.setAttribute('data-theme', effective);
      document.documentElement.setAttribute('data-theme-mode', mode);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.documentElement.setAttribute('data-theme-mode', 'auto');
    }
  })();
</script>

<script type="text/babel" data-presets="env,react">
const { useState, useMemo, useEffect } = React;

const manifest = (() => {
  try { return JSON.parse(document.getElementById('archive-manifest').textContent); }
  catch (e) { return { items: [], total_count: 0 }; }
})();

const THEME_KEY = 'mb-theme';

function useTheme() {
  const [mode, setMode] = useState(() => {
    try { return localStorage.getItem(THEME_KEY) || 'auto'; } catch (e) { return 'auto'; }
  });
  useEffect(() => {
    const html = document.documentElement;
    html.setAttribute('data-theme-mode', mode);
    const apply = () => {
      let effective;
      if (mode === 'auto') {
        effective = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      } else {
        effective = mode;
      }
      html.setAttribute('data-theme', effective);
    };
    apply();
    try { localStorage.setItem(THEME_KEY, mode); } catch (e) {}
    if (mode === 'auto') {
      const mq = window.matchMedia('(prefers-color-scheme: light)');
      const handler = () => apply();
      mq.addEventListener('change', handler);
      return () => mq.removeEventListener('change', handler);
    }
  }, [mode]);
  return {
    mode,
    cycle: () => setMode(m => m === 'auto' ? 'light' : m === 'light' ? 'dark' : 'auto')
  };
}

function ThemeToggle() {
  const { mode, cycle } = useTheme();
  const icon = mode === 'auto' ? '🔄' : mode === 'light' ? '☀️' : '🌙';
  const label = mode === 'auto' ? 'Auto' : mode === 'light' ? 'Light' : 'Dark';
  return (
    <button onClick={cycle} className="theme-toggle" title={`Theme: ${label} (คลิกเพื่อสลับ)`}>
      <span className="theme-icon">{icon}</span>
      <span className="theme-label">{label}</span>
    </button>
  );
}

const TH_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const TH_MONTHS_LONG = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

function fmtDateThai(iso) {
  try {
    const d = new Date(iso);
    return `${d.getDate()} ${TH_MONTHS[d.getMonth()]} ${(d.getFullYear() + 543).toString().slice(2)}`;
  } catch (e) { return iso; }
}

function getMonthKey(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function getMonthLabel(key) {
  const [y, m] = key.split('-');
  return `${TH_MONTHS_LONG[parseInt(m) - 1]} ${(parseInt(y) + 543).toString().slice(0)}`;
}

function App() {
  const [search, setSearch] = useState('');
  const items = manifest.items || [];

  const filtered = useMemo(() => {
    if (!search) return items;
    const q = search.toLowerCase();
    return items.filter(i =>
      i.date.includes(q) ||
      (i.weekday_th || '').toLowerCase().includes(q) ||
      (i.preview || '').toLowerCase().includes(q)
    );
  }, [search, items]);

  const grouped = useMemo(() => {
    const map = {};
    filtered.forEach(item => {
      const key = getMonthKey(item.date);
      if (!map[key]) map[key] = [];
      map[key].push(item);
    });
    return Object.entries(map)
      .sort((a, b) => b[0].localeCompare(a[0]))
      .map(([key, items]) => ({
        key,
        label: getMonthLabel(key),
        items: items.sort((a, b) => b.date.localeCompare(a.date))
      }));
  }, [filtered]);

  return (
    <div className="max-w-5xl mx-auto px-4 md:px-6 py-6">
      <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div className="flex items-center gap-3">
          <div className="text-3xl">📚</div>
          <div>
            <div className="text-xs text-faint font-mono uppercase tracking-wider">Archive · TONPALEARN</div>
            <div className="text-2xl md:text-3xl font-extrabold grad-aurora">Morning Brief Archive</div>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <ThemeToggle />
          <a href="../" className="btn-gold text-sm">🌅 Brief วันนี้</a>
        </div>
      </div>

      <div className="glass-strong rounded-2xl p-5 mb-6 flex items-center justify-between flex-wrap gap-3">
        <div>
          <div className="text-sm text-muted">รวมทั้งหมด</div>
          <div className="text-2xl font-extrabold text-default">{manifest.total_count || items.length} briefs</div>
        </div>
        {items.length > 0 && (
          <div className="text-right">
            <div className="text-sm text-muted">ช่วงเวลา</div>
            <div className="text-sm font-mono text-cyan-300">
              {fmtDateThai(items[items.length - 1].date)} → {fmtDateThai(items[0].date)}
            </div>
          </div>
        )}
        <div className="text-right">
          <div className="text-sm text-muted">Manifest updated</div>
          <div className="text-xs font-mono text-faint">{manifest.generated_at || '—'}</div>
        </div>
      </div>

      <div className="mb-6">
        <input
          type="text"
          className="inp"
          placeholder="🔍 ค้นหา: 2026-06, จันทร์, คำสำคัญ..."
          value={search}
          onChange={e => setSearch(e.target.value)}
        />
        {search && (
          <div className="mt-2 text-xs text-dim">
            พบ {filtered.length} จาก {items.length} briefs
          </div>
        )}
      </div>

      {items.length === 0 && (
        <div className="glass rounded-2xl p-10 text-center">
          <div className="text-5xl mb-3">📭</div>
          <div className="text-lg font-bold mb-1 text-default">ยังไม่มี brief ในคลัง</div>
          <div className="text-sm text-muted">Brief จะถูกบันทึกใน archive อัตโนมัติทุกวัน หลัง generate ตอน 07:00 BKK</div>
        </div>
      )}

      {grouped.map(({ key, label, items }) => (
        <section key={key} className="mb-8">
          <div className="flex items-center gap-3 mb-3">
            <h2 className="text-lg font-extrabold grad-aurora">{label}</h2>
            <span className="pill">{items.length}</span>
            <div className="flex-1 h-px" style={{background:'var(--separator)'}}></div>
          </div>
          <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-3">
            {items.map(item => (
              <a key={item.date} href={`${item.date}.html`} className="glass rounded-2xl p-4 card-h block">
                <div className="flex items-start justify-between mb-2">
                  <div>
                    <div className="text-xs text-faint font-mono">{item.date}</div>
                    <div className="text-base font-bold mt-0.5 text-default">{fmtDateThai(item.date)}</div>
                    {item.weekday_th && <div className="text-xs text-cyan-300">{item.weekday_th}</div>}
                  </div>
                  <span className="pill pill-gold text-[10px]">🔐</span>
                </div>
                {item.preview && (
                  <div className="text-xs text-muted mt-2 line-clamp-2 leading-relaxed">
                    {item.preview}
                  </div>
                )}
                <div className="flex items-center gap-3 mt-3 text-[11px] text-faint">
                  {typeof item.events === 'number' && <span>📅 {item.events}</span>}
                  {typeof item.emails === 'number' && <span>📧 {item.emails}</span>}
                  {typeof item.tasks === 'number' && <span>✅ {item.tasks}</span>}
                </div>
              </a>
            ))}
          </div>
        </section>
      ))}

      <footer className="text-center text-xs text-faint mt-12 mb-6">
        <div>🔐 ทุก brief ใน archive ถูก encrypt แยกกัน · ต้องใส่ password ทีละไฟล์</div>
        <div className="mt-1">Manifest ถูก regenerate อัตโนมัติทุกครั้งที่ brief ใหม่ถูกสร้าง</div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
