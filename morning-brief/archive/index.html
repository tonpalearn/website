<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Morning Brief Archive · TONPALEARN</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #08080F;
    --gold: #F5D67A;
    --teal: #67E8F9;
    --violet: #A78BFA;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--ink); color: #fff; font-family: 'Sarabun', 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
  body {
    background:
      radial-gradient(60% 80% at 10% 0%, rgba(124, 92, 252, 0.18), transparent 60%),
      radial-gradient(50% 70% at 100% 10%, rgba(103, 232, 249, 0.14), transparent 65%),
      radial-gradient(70% 90% at 50% 100%, rgba(245, 214, 122, 0.10), transparent 60%),
      var(--ink);
    background-attachment: fixed;
  }
  .glass {
    background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
  }
  .glass-strong {
    background: linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(28px);
  }
  .glass-gold {
    background: linear-gradient(135deg, rgba(245,214,122,0.10), rgba(230,184,75,0.04));
    border: 1px solid rgba(245,214,122,0.20);
  }
  .grad-aurora {
    background: linear-gradient(135deg, #F5D67A 0%, #67E8F9 50%, #A78BFA 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .btn-ghost {
    background: rgba(255,255,255,0.04);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 8px 14px;
    transition: all 0.2s ease;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.20); }
  .btn-gold {
    background: linear-gradient(135deg, #F5D67A, #E6B84B);
    color: #08080F; font-weight: 700; border-radius: 10px; padding: 8px 14px;
    cursor: pointer; border: none; transition: all 0.25s ease;
  }
  .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(245, 214, 122, 0.4); }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .pill-gold { background: rgba(245,214,122,0.12); color: #F5D67A; border-color: rgba(245,214,122,0.25); }
  .pill-teal { background: rgba(103,232,249,0.12); color: #67E8F9; border-color: rgba(103,232,249,0.25); }
  .inp {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 10px 16px;
    color: #fff; font-size: 14px; width: 100%;
    transition: all 0.2s ease; outline: none;
  }
  .inp:focus { border-color: rgba(245,214,122,0.4); }
  .card-h { transition: all 0.2s ease; }
  .card-h:hover { background: rgba(255,255,255,0.05); border-color: rgba(245,214,122,0.18); transform: translateY(-1px); }

  @keyframes float-slow {
    0%, 100% { transform: translate(0, 0) rotate(0); }
    50% { transform: translate(20px, -30px) rotate(180deg); }
  }
  .blob {
    position: fixed; pointer-events: none; z-index: 0;
    border-radius: 50%; filter: blur(80px); opacity: 0.3;
    animation: float-slow 25s ease-in-out infinite;
  }
  .blob-gold { background: radial-gradient(circle, rgba(245,214,122,0.6), transparent 70%); width: 320px; height: 320px; top: 5%; right: -8%; }
  .blob-teal { background: radial-gradient(circle, rgba(103,232,249,0.5), transparent 70%); width: 280px; height: 280px; bottom: 10%; left: -6%; animation-delay: -10s; }
</style>
</head>
<body>
<div class="blob blob-gold"></div>
<div class="blob blob-teal"></div>

<!-- Archive manifest — regenerated by morning-brief script every day -->
<script id="archive-manifest" type="application/json">
{
  "generated_at": "2026-06-08 12:42 BKK",
  "total_count": 1,
  "items": [
    {
      "date": "2026-06-08",
      "weekday_th": "จันทร์",
      "weekday_en": "Monday",
      "events": 2,
      "emails": 0,
      "tasks": 11,
      "preview": "วันจันทร์เริ่มต้นสัปดาห์ — มี 2 นัด: Sally Rama 3 (10:30–21:00) แล้วต่อ ส่งของแจง @ Estara Haven (18:00). ⚡ ข่าวเด่น: Cl",
      "size_kb": 49
    }
  ]
}
</script>

<div id="app" class="relative z-10"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useMemo } = React;

const manifest = (() => {
  try { return JSON.parse(document.getElementById('archive-manifest').textContent); }
  catch (e) { return { items: [], total_count: 0 }; }
})();

const TH_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const TH_MONTHS_LONG = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

function fmtDateThai(iso) {
  try {
    const d = new Date(iso);
    return `${d.getDate()} ${TH_MONTHS[d.getMonth()]} ${(d.getFullYear() + 543).toString().slice(2)}`;
  } catch (e) { return iso; }
}

function getMonthKey(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function getMonthLabel(key) {
  const [y, m] = key.split('-');
  return `${TH_MONTHS_LONG[parseInt(m) - 1]} ${(parseInt(y) + 543).toString().slice(0)}`;
}

function App() {
  const [search, setSearch] = useState('');

  const items = manifest.items || [];

  const filtered = useMemo(() => {
    if (!search) return items;
    const q = search.toLowerCase();
    return items.filter(i =>
      i.date.includes(q) ||
      (i.weekday_th || '').toLowerCase().includes(q) ||
      (i.preview || '').toLowerCase().includes(q)
    );
  }, [search, items]);

  const grouped = useMemo(() => {
    const map = {};
    filtered.forEach(item => {
      const key = getMonthKey(item.date);
      if (!map[key]) map[key] = [];
      map[key].push(item);
    });
    return Object.entries(map)
      .sort((a, b) => b[0].localeCompare(a[0]))
      .map(([key, items]) => ({
        key,
        label: getMonthLabel(key),
        items: items.sort((a, b) => b.date.localeCompare(a.date))
      }));
  }, [filtered]);

  return (
    <div className="max-w-5xl mx-auto px-4 md:px-6 py-6">
      {/* Header */}
      <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div className="flex items-center gap-3">
          <div className="text-3xl">📚</div>
          <div>
            <div className="text-xs text-white/50 font-mono uppercase tracking-wider">Archive · TONPALEARN</div>
            <div className="text-2xl md:text-3xl font-extrabold grad-aurora">Morning Brief Archive</div>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <a href="../" className="btn-gold text-sm">🌅 Brief วันนี้</a>
        </div>
      </div>

      {/* Stats */}
      <div className="glass-strong rounded-2xl p-5 mb-6 flex items-center justify-between flex-wrap gap-3">
        <div>
          <div className="text-sm text-white/60">รวมทั้งหมด</div>
          <div className="text-2xl font-extrabold">{manifest.total_count || items.length} briefs</div>
        </div>
        {items.length > 0 && (
          <div className="text-right">
            <div className="text-sm text-white/60">ช่วงเวลา</div>
            <div className="text-sm font-mono text-cyan-300">
              {fmtDateThai(items[items.length - 1].date)} → {fmtDateThai(items[0].date)}
            </div>
          </div>
        )}
        <div className="text-right">
          <div className="text-sm text-white/60">Manifest updated</div>
          <div className="text-xs font-mono text-white/40">{manifest.generated_at || '—'}</div>
        </div>
      </div>

      {/* Search */}
      <div className="mb-6">
        <input
          type="text"
          className="inp"
          placeholder="🔍 ค้นหา: 2026-06, จันทร์, คำสำคัญ..."
          value={search}
          onChange={e => setSearch(e.target.value)}
        />
        {search && (
          <div className="mt-2 text-xs text-white/50">
            พบ {filtered.length} จาก {items.length} briefs
          </div>
        )}
      </div>

      {/* Empty state */}
      {items.length === 0 && (
        <div className="glass rounded-2xl p-10 text-center">
          <div className="text-5xl mb-3">📭</div>
          <div className="text-lg font-bold mb-1">ยังไม่มี brief ในคลัง</div>
          <div className="text-sm text-white/60">Brief จะถูกบันทึกใน archive อัตโนมัติทุกวัน หลัง generate ตอน 07:00 BKK</div>
        </div>
      )}

      {/* Grouped briefs */}
      {grouped.map(({ key, label, items }) => (
        <section key={key} className="mb-8">
          <div className="flex items-center gap-3 mb-3">
            <h2 className="text-lg font-extrabold grad-aurora">{label}</h2>
            <span className="pill">{items.length}</span>
            <div className="flex-1 h-px bg-white/5"></div>
          </div>
          <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-3">
            {items.map(item => (
              <a
                key={item.date}
                href={`${item.date}.html`}
                className="glass rounded-2xl p-4 card-h block"
              >
                <div className="flex items-start justify-between mb-2">
                  <div>
                    <div className="text-xs text-white/50 font-mono">{item.date}</div>
                    <div className="text-base font-bold mt-0.5">{fmtDateThai(item.date)}</div>
                    {item.weekday_th && <div className="text-xs text-cyan-300">{item.weekday_th}</div>}
                  </div>
                  <span className="pill pill-gold text-[10px]">🔐</span>
                </div>
                {item.preview && (
                  <div className="text-xs text-white/60 mt-2 line-clamp-2 leading-relaxed">
                    {item.preview}
                  </div>
                )}
                <div className="flex items-center gap-3 mt-3 text-[11px] text-white/40">
                  {typeof item.events === 'number' && <span>📅 {item.events}</span>}
                  {typeof item.emails === 'number' && <span>📧 {item.emails}</span>}
                  {typeof item.tasks === 'number' && <span>✅ {item.tasks}</span>}
                </div>
              </a>
            ))}
          </div>
        </section>
      ))}

      <footer className="text-center text-xs text-white/40 mt-12 mb-6">
        <div>🔐 ทุก brief ใน archive ถูก encrypt แยกกัน · ต้องใส่ password ทีละไฟล์</div>
        <div className="mt-1">Manifest ถูก regenerate อัตโนมัติทุกครั้งที่ brief ใหม่ถูกสร้าง</div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
