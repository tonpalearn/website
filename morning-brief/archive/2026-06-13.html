<!-- Pre-paint theme detection — avoids FOUC -->
<script>
  (function() {
    try {
      var mode = localStorage.getItem('mb-theme') || 'auto';
      var effective;
      if (mode === 'auto') {
        effective = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      } else {
        effective = mode;
      }
      document.documentElement.setAttribute('data-theme', effective);
      document.documentElement.setAttribute('data-theme-mode', mode);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.documentElement.setAttribute('data-theme-mode', 'auto');
    }
  })();
</script>

<div id="app" class="relative z-10"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef } = React;

// ============= Helpers =============
const meta = (() => {
  try { return JSON.parse(document.getElementById('brief-meta').textContent); }
  catch (e) { return {}; }
})();

const STORAGE_KEY = 'mb_pwd_v1';
const THEME_KEY = 'mb-theme';

function decryptPayload(encryptedB64, password) {
  try {
    const decrypted = CryptoJS.AES.decrypt(encryptedB64, password);
    const utf8 = decrypted.toString(CryptoJS.enc.Utf8);
    if (!utf8) return null;
    return JSON.parse(utf8);
  } catch (e) {
    return null;
  }
}

function getStoredPassword() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const { pwd, exp } = JSON.parse(raw);
    if (Date.now() > exp) { localStorage.removeItem(STORAGE_KEY); return null; }
    return pwd;
  } catch (e) { return null; }
}

function storePassword(pwd, days = 7) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      pwd, exp: Date.now() + days * 24 * 60 * 60 * 1000
    }));
  } catch (e) {}
}

function clearStoredPassword() {
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
}

function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
  } catch (e) { return iso; }
}

function fmtDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
  } catch (e) { return iso; }
}

function relTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diffH = (now - d) / (1000 * 60 * 60);
  if (diffH < 1) return `${Math.round(diffH * 60)} นาทีที่แล้ว`;
  if (diffH < 24) return `${Math.round(diffH)} ชม.ที่แล้ว`;
  if (diffH < 48) return 'เมื่อวาน';
  return `${Math.round(diffH / 24)} วันที่แล้ว`;
}

function gmailComposeUrl(to, subject, body) {
  const params = new URLSearchParams({ view: 'cm', to: to || '', su: subject || '', body: body || '' });
  return `https://mail.google.com/mail/?${params.toString()}`;
}

// ============= Theme Toggle =============
function useTheme() {
  const [mode, setMode] = useState(() => {
    try { return localStorage.getItem(THEME_KEY) || 'auto'; } catch (e) { return 'auto'; }
  });

  // Apply theme to <html>
  useEffect(() => {
    const html = document.documentElement;
    html.setAttribute('data-theme-mode', mode);
    const apply = () => {
      let effective;
      if (mode === 'auto') {
        effective = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      } else {
        effective = mode;
      }
      html.setAttribute('data-theme', effective);
    };
    apply();
    try { localStorage.setItem(THEME_KEY, mode); } catch (e) {}

    // Listen for system change only when in auto mode
    if (mode === 'auto') {
      const mq = window.matchMedia('(prefers-color-scheme: light)');
      const handler = () => apply();
      mq.addEventListener('change', handler);
      return () => mq.removeEventListener('change', handler);
    }
  }, [mode]);

  const cycle = () => {
    setMode(m => m === 'auto' ? 'light' : m === 'light' ? 'dark' : 'auto');
  };

  return { mode, cycle };
}

function ThemeToggle() {
  const { mode, cycle } = useTheme();
  const icon = mode === 'auto' ? '🔄' : mode === 'light' ? '☀️' : '🌙';
  const label = mode === 'auto' ? 'Auto' : mode === 'light' ? 'Light' : 'Dark';
  return (
    <button onClick={cycle} className="theme-toggle" title={`Theme: ${label} (คลิกเพื่อสลับ)`}>
      <span className="theme-icon">{icon}</span>
      <span className="theme-label">{label}</span>
    </button>
  );
}

// ============= Password Gate =============
function PasswordGate({ onUnlock }) {
  const [pwd, setPwd] = useState('');
  const [error, setError] = useState('');
  const [remember, setRemember] = useState(true);
  const [shaking, setShaking] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    const stored = getStoredPassword();
    if (stored && meta.encrypted) {
      const result = decryptPayload(meta.encrypted, stored);
      if (result) {
        onUnlock(result, stored);
        return;
      }
      clearStoredPassword();
    }
    inputRef.current && inputRef.current.focus();
  }, []);

  function submit(e) {
    e && e.preventDefault();
    if (!pwd) return;
    const result = decryptPayload(meta.encrypted, pwd);
    if (result) {
      if (remember) storePassword(pwd);
      onUnlock(result, pwd);
    } else {
      setError('Password ไม่ถูกต้อง');
      setShaking(true);
      setTimeout(() => setShaking(false), 400);
    }
  }

  return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="absolute top-4 right-4">
        <ThemeToggle />
      </div>
      <form onSubmit={submit} className={`glass-strong rounded-3xl p-8 md:p-10 w-full max-w-md ${shaking ? 'animate-pulse' : ''}`} style={{boxShadow:'var(--modal-shadow)'}}>
        <div className="text-center mb-8">
          <div className="text-5xl mb-3">🌅</div>
          <div className="text-2xl font-extrabold grad-aurora">Morning Brief</div>
          <div className="text-sm text-muted mt-2">
            {meta.weekday_th || ''} · {fmtDate(meta.date)}
          </div>
          <div className="text-xs text-faint mt-1 font-mono">TONPALEARN · Personal</div>
        </div>
        <label className="block mb-3 text-sm text-muted font-medium">เข้าสู่ระบบด้วย password</label>
        <input
          ref={inputRef}
          type="password"
          className="inp"
          placeholder="ADMIN_PASS"
          value={pwd}
          onChange={e => { setPwd(e.target.value); setError(''); }}
          autoComplete="current-password"
        />
        <label className="flex items-center gap-2 mt-3 text-xs text-dim cursor-pointer">
          <input type="checkbox" checked={remember} onChange={e => setRemember(e.target.checked)} className="rounded" />
          จำไว้ 7 วัน (เบราว์เซอร์นี้)
        </label>
        {error && <div className="mt-3 err">{error}</div>}
        <button type="submit" className="btn-gold w-full mt-5">
          ปลดล็อค Brief
        </button>
        <div className="text-center mt-6 text-xs text-faint">
          เนื้อหาถูก encrypt ด้วย AES-256 · ปลอดภัยต่อให้ URL หลุด
        </div>
      </form>
    </div>
  );
}

// ============= Sections =============
function StatTile({ icon, label, value, accent }) {
  const accentMap = {
    gold: 'glass-gold', teal: 'glass-teal', violet: 'glass-violet', rose: 'glass-rose'
  };
  return (
    <div className={`${accentMap[accent] || 'glass'} rounded-2xl p-4 reveal`}>
      <div className="text-2xl mb-1">{icon}</div>
      <div className="text-2xl font-extrabold text-default">{value}</div>
      <div className="text-xs text-muted font-medium mt-0.5">{label}</div>
    </div>
  );
}

function TodaySchedule({ events }) {
  if (!events || events.length === 0) {
    return (
      <div className="glass rounded-2xl p-8 text-center">
        <div className="text-5xl mb-3">🌴</div>
        <div className="text-muted">วันนี้ไม่มีนัด — เป็นวันสบายๆ</div>
      </div>
    );
  }
  return (
    <div className="space-y-3">
      {events.map((ev, idx) => (
        <div key={idx} className="glass rounded-2xl p-4 card-h reveal" style={{animationDelay: `${idx * 60}ms`}}>
          <div className="flex items-start gap-4">
            <div className="flex flex-col items-center min-w-[64px]">
              <div className="font-mono text-lg font-bold grad-gold">{ev.time_start || ''}</div>
              {ev.time_end && <div className="text-[10px] text-faint font-mono mt-0.5">→ {ev.time_end}</div>}
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-start justify-between gap-3 mb-1">
                <div className="font-semibold text-base text-default">{ev.title || '(ไม่มีหัวข้อ)'}</div>
                {ev.calendar && <span className="pill pill-violet whitespace-nowrap">{ev.calendar}</span>}
              </div>
              {ev.location && (
                <div className="flex items-center gap-1.5 text-sm text-muted mb-2">
                  <span>📍</span><span className="truncate">{ev.location}</span>
                </div>
              )}
              {ev.travel && (
                <div className="glass-gold rounded-xl p-3 mt-2">
                  <div className="text-xs text-muted mb-1">🚗 การเดินทาง</div>
                  <div className="flex items-center justify-between flex-wrap gap-2">
                    <div className="text-sm text-default">
                      จาก <span className="font-medium">{ev.travel.from_label || 'ที่ก่อนหน้า'}</span>
                      {ev.travel.duration_min && <span className="text-muted"> · {ev.travel.duration_min} นาที</span>}
                    </div>
                    {ev.travel.leave_at && (
                      <div className="pill pill-gold">⏰ ออก {ev.travel.leave_at}</div>
                    )}
                  </div>
                </div>
              )}
              {ev.notes && <div className="text-sm text-dim mt-2 italic">{ev.notes}</div>}
              {ev.attendees_count > 0 && (
                <div className="text-xs text-faint mt-2">👥 {ev.attendees_count} คน</div>
              )}
              {ev.url && (
                <a href={ev.url} target="_blank" className="text-xs link inline-block mt-2">
                  ↗ เปิดใน Calendar
                </a>
              )}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function ReminderList({ items }) {
  if (!items || items.length === 0) {
    return <div className="text-sm text-dim italic">ไม่มี reminder ใน 1-2 วันนี้</div>;
  }
  return (
    <div className="space-y-2">
      {items.map((r, idx) => (
        <div key={idx} className="glass rounded-xl p-3 card-h flex items-center gap-3 reveal" style={{animationDelay: `${idx * 50}ms`}}>
          <div className="pill pill-amber whitespace-nowrap text-[10px]">{r.when_label || fmtDate(r.due)}</div>
          <div className="flex-1 min-w-0">
            <div className="text-sm font-medium truncate text-default">{r.title}</div>
            {r.source && <div className="text-[11px] text-faint mt-0.5">via {r.source}</div>}
          </div>
          {r.url && (
            <a href={r.url} target="_blank" className="btn-ghost text-xs whitespace-nowrap">เปิด</a>
          )}
        </div>
      ))}
    </div>
  );
}

function UpcomingSchedule({ days }) {
  if (!days || days.length === 0) {
    return <div className="text-sm text-dim italic">ไม่มีนัดใน 2 วันถัดไป</div>;
  }
  return (
    <div className="space-y-4">
      {days.map((d, di) => (
        <div key={di} className="glass rounded-2xl p-4 reveal" style={{animationDelay: `${di * 80}ms`}}>
          <div className="flex items-center gap-2 mb-3">
            <span className="pill pill-teal">{d.date_label}</span>
            <span className="text-xs text-faint font-mono">{d.date}</span>
            {d.events.length === 0 && <span className="text-xs text-faint italic ml-2">(ว่าง)</span>}
          </div>
          {d.events.length > 0 && (
            <div className="space-y-2">
              {d.events.map((ev, ei) => (
                <div key={ei} className="flex items-start gap-3 text-sm">
                  <div className="font-mono text-xs text-cyan-300 min-w-[44px] pt-0.5">{ev.time_start || 'ทั้งวัน'}</div>
                  <div className="flex-1">
                    <div className="text-default">{ev.title}</div>
                    {ev.location && <div className="text-xs text-faint">📍 {ev.location}</div>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function EmailCard({ email, idx }) {
  const [expanded, setExpanded] = useState(false);
  const [copied, setCopied] = useState(false);

  function copyReply() {
    navigator.clipboard.writeText(email.suggested_reply || '');
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  }

  return (
    <div className="glass rounded-2xl p-4 card-h reveal" style={{animationDelay: `${idx * 60}ms`}}>
      <div className="flex items-start justify-between gap-3 mb-2">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-1">
            {email.importance === 'high' && <span className="pill pill-red text-[10px]">⚡ สำคัญ</span>}
            {email.category && <span className="pill pill-violet text-[10px]">{email.category}</span>}
            <span className="text-[11px] text-faint">{relTime(email.received_at)}</span>
          </div>
          <div className="font-semibold text-base truncate text-default">{email.subject || '(no subject)'}</div>
          <div className="text-xs text-muted mt-0.5">
            จาก <span className="text-default">{email.from_name || email.from}</span>
            {email.from_name && email.from && <span className="text-faint ml-1">&lt;{email.from}&gt;</span>}
          </div>
        </div>
      </div>

      {email.snippet && (
        <div className="text-sm text-muted leading-relaxed inset rounded-lg p-3 my-2">
          {email.snippet}
        </div>
      )}

      {email.suggested_reply && (
        <div className="glass-teal rounded-xl p-3 mt-3">
          <div className="flex items-center justify-between mb-2">
            <div className="text-xs font-semibold" style={{color:'var(--teal-2)'}}>💡 Suggested Reply</div>
            <div className="flex gap-2">
              <button onClick={copyReply} className="text-[11px] text-dim hover:text-default">
                {copied ? '✓ Copied' : '📋 Copy'}
              </button>
              <button onClick={() => setExpanded(!expanded)} className="text-[11px] text-dim hover:text-default">
                {expanded ? '▲ ย่อ' : '▼ ขยาย'}
              </button>
            </div>
          </div>
          <div className={`text-sm text-default leading-relaxed whitespace-pre-wrap ${expanded ? '' : 'line-clamp-3'}`}>
            {email.suggested_reply}
          </div>
        </div>
      )}

      <div className="flex flex-wrap gap-2 mt-3">
        <a
          href={gmailComposeUrl(email.from, `Re: ${email.subject || ''}`, email.suggested_reply || '')}
          target="_blank"
          className="btn-teal text-sm"
        >
          ✉️ Reply ใน Gmail
        </a>
        {email.thread_url && (
          <a href={email.thread_url} target="_blank" className="btn-ghost text-sm">
            ↗ เปิด Thread
          </a>
        )}
      </div>
    </div>
  );
}

function EmailList({ emails }) {
  if (!emails || emails.length === 0) {
    return (
      <div className="glass rounded-2xl p-6 text-center">
        <div className="text-3xl mb-2">📭</div>
        <div className="text-muted text-sm">Inbox zero — ไม่มี email สำคัญที่ยังไม่อ่าน</div>
      </div>
    );
  }
  return (
    <div className="space-y-3">
      {emails.map((em, idx) => <EmailCard key={em.id || idx} email={em} idx={idx} />)}
    </div>
  );
}

function TaskGroup({ group, gi }) {
  return (
    <div className="glass rounded-2xl p-4 reveal" style={{animationDelay: `${gi * 80}ms`}}>
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <span className="text-base font-semibold text-default">{group.source_label || group.source || 'Tasks'}</span>
          <span className="pill pill-emerald">{group.tasks.length}</span>
        </div>
        {group.source_url && (
          <a href={group.source_url} target="_blank" className="text-[11px] link">↗ เปิด DB</a>
        )}
      </div>
      <div className="space-y-2">
        {group.tasks.map((t, ti) => (
          <a
            key={ti}
            href={t.url || '#'}
            target={t.url ? '_blank' : '_self'}
            className="block bg-white/[0.02] hover:bg-white/[0.05] border border-white/5 hover:border-emerald-400/20 rounded-lg p-3 transition-all"
          >
            <div className="flex items-start justify-between gap-3">
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium truncate text-default">{t.title || '(no title)'}</div>
                {t.notes && <div className="text-xs text-faint mt-0.5 line-clamp-1">{t.notes}</div>}
              </div>
              <div className="flex flex-col items-end gap-1">
                {t.status && (
                  <span className={`pill text-[10px] ${
                    t.status === 'In Progress' ? 'pill-amber' :
                    t.status === 'Waiting' ? 'pill-violet' :
                    'pill-emerald'
                  }`}>{t.status}</span>
                )}
                {t.due && (
                  <span className={`text-[10px] font-mono ${t.overdue ? 'text-red-300' : 'text-faint'}`}>
                    {t.overdue && '⚠️ '}{fmtDate(t.due)}
                  </span>
                )}
              </div>
            </div>
          </a>
        ))}
      </div>
    </div>
  );
}

function NotionTasks({ groups }) {
  if (!groups || groups.length === 0) {
    return (
      <div className="glass rounded-2xl p-6 text-center">
        <div className="text-3xl mb-2">✨</div>
        <div className="text-muted text-sm">Notion เคลียร์แล้ว — ไม่มี task ที่รอ action</div>
      </div>
    );
  }
  return (
    <div className="grid md:grid-cols-2 gap-3">
      {groups.map((g, gi) => <TaskGroup key={gi} group={g} gi={gi} />)}
    </div>
  );
}

function NewsItem({ news, idx }) {
  return (
    <a
      href={news.url || '#'}
      target="_blank"
      className="glass rounded-xl p-4 card-h block reveal"
      style={{animationDelay: `${idx * 60}ms`}}
    >
      <div className="flex items-center gap-2 mb-2">
        <span className="pill pill-teal text-[10px]">{news.source}</span>
        {news.published_at && <span className="text-[10px] text-faint">{relTime(news.published_at)}</span>}
      </div>
      <div className="font-semibold text-sm mb-1 leading-snug text-default">{news.title}</div>
      {news.summary && <div className="text-xs text-muted leading-relaxed line-clamp-3">{news.summary}</div>}
      {news.why_matters && (
        <div className="text-[11px] text-amber-200/80 mt-2 italic">💡 {news.why_matters}</div>
      )}
    </a>
  );
}

function NewsCategory({ title, icon, items, accent }) {
  const headerColor = { ai: 'grad-aurora', health: 'grad-teal', world: 'grad-gold' }[accent] || 'grad-aurora';
  return (
    <div>
      <div className="flex items-center gap-2 mb-3">
        <div className="sec-icon glass-violet">{icon}</div>
        <h3 className={`text-lg font-extrabold ${headerColor}`}>{title}</h3>
        <span className="pill text-[10px]">{(items || []).length}</span>
      </div>
      {(!items || items.length === 0) ? (
        <div className="text-sm text-dim italic glass rounded-xl p-4">ไม่มีข่าวเด่นในรอบ 24 ชม.</div>
      ) : (
        <div className="space-y-3">
          {items.map((n, idx) => <NewsItem key={idx} news={n} idx={idx} />)}
        </div>
      )}
    </div>
  );
}

function NewsSection({ news }) {
  return (
    <div className="grid md:grid-cols-3 gap-5">
      <NewsCategory title="AI" icon="🤖" items={news?.ai || []} accent="ai" />
      <NewsCategory title="Health & Longevity" icon="🧬" items={news?.health || []} accent="health" />
      <NewsCategory title="สถานการณ์โลก" icon="🌍" items={news?.world || []} accent="world" />
    </div>
  );
}

// ============= Main Brief =============
function Brief({ data, onLock }) {
  const stats = data.stats || {};
  return (
    <div className="max-w-6xl mx-auto px-4 md:px-6 py-6">
      {/* Top bar */}
      <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div className="flex items-center gap-3">
          <div className="text-3xl">🌅</div>
          <div>
            <div className="text-xs text-faint font-mono uppercase tracking-wider">Morning Brief · TONPALEARN</div>
            <div className="text-2xl md:text-3xl font-extrabold grad-aurora leading-tight">
              {meta.weekday_th || ''} · {fmtDate(meta.date)}
            </div>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <ThemeToggle />
          <a href="archive/" className="btn-ghost text-sm">📚 Archive</a>
          <button onClick={onLock} className="btn-ghost text-sm" title="ออกจากระบบ">🔒</button>
        </div>
      </div>

      {/* Hero greeting */}
      {data.greeting && (
        <div className="glass-strong rounded-3xl p-6 md:p-8 mb-6 reveal">
          <div className="text-lg md:text-xl text-default leading-relaxed">
            {data.greeting}
          </div>
          {data.weather && (
            <div className="text-sm text-muted mt-3 flex items-center gap-2">
              <span>{data.weather.icon || '☀️'}</span>
              <span>{data.weather.summary}</span>
              {data.weather.temp && <span className="font-mono">{data.weather.temp}°C</span>}
            </div>
          )}
        </div>
      )}

      {/* Stats grid */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
        <StatTile icon="📅" label="นัดวันนี้" value={stats.events_today || 0} accent="gold" />
        <StatTile icon="📧" label="Email สำคัญ" value={stats.important_emails || 0} accent="teal" />
        <StatTile icon="✅" label="Tasks ค้าง" value={stats.pending_tasks || 0} accent="violet" />
        <StatTile icon="📰" label="ข่าวเด่น" value={stats.news_count || 0} accent="rose" />
      </div>

      {/* Today */}
      <section className="mb-8">
        <div className="sec-h">
          <span className="sec-icon glass-gold">📅</span>
          <span>วันนี้</span>
          {stats.first_leave_at && (
            <span className="pill pill-gold ml-2">⏰ ออกแรก {stats.first_leave_at}</span>
          )}
        </div>
        <TodaySchedule events={data.today_events || []} />
      </section>

      {/* Reminders */}
      <section className="mb-8">
        <div className="sec-h">
          <span className="sec-icon glass-rose">⏰</span>
          <span>Reminders (1-2 วันนี้)</span>
        </div>
        <ReminderList items={data.reminders || []} />
      </section>

      {/* Upcoming */}
      <section className="mb-8">
        <div className="sec-h">
          <span className="sec-icon glass-teal">📆</span>
          <span>นัดถัดไป (พรุ่งนี้ & มะรืน)</span>
        </div>
        <UpcomingSchedule days={data.next_days || []} />
      </section>

      {/* Emails */}
      <section className="mb-8">
        <div className="sec-h">
          <span className="sec-icon glass-teal">📧</span>
          <span>Email สำคัญที่ยังไม่อ่าน</span>
          {(data.emails || []).length > 0 && (
            <span className="pill pill-teal ml-2">{data.emails.length} ฉบับ</span>
          )}
        </div>
        <EmailList emails={data.emails || []} />
      </section>

      {/* Tasks */}
      <section className="mb-8">
        <div className="sec-h">
          <span className="sec-icon glass-violet">✅</span>
          <span>Notion Tasks — รอ action</span>
        </div>
        <NotionTasks groups={data.task_groups || []} />
      </section>

      {/* News */}
      <section className="mb-8">
        <div className="sec-h">
          <span className="sec-icon glass-rose">📰</span>
          <span>News Brief</span>
          <span className="text-xs text-faint ml-2 font-mono">trusted sources only</span>
        </div>
        <NewsSection news={data.news || {}} />
      </section>

      {/* Footer */}
      <footer className="text-center text-xs text-faint mt-12 mb-6">
        <div>Generated at {meta.generated_at} · v{meta.version || '1.0'}</div>
        <div className="mt-1">🔐 Encrypted at rest · ปลอดภัยต่อให้ URL หลุด · localStorage 7 วัน</div>
      </footer>
    </div>
  );
}

// ============= App =============
function App() {
  const [data, setData] = useState(null);
  const [pwd, setPwd] = useState(null);

  if (!meta.encrypted || meta.encrypted === '__BRIEF_ENCRYPTED_PAYLOAD__') {
    return (
      <div className="min-h-screen flex items-center justify-center p-6">
        <div className="absolute top-4 right-4">
          <ThemeToggle />
        </div>
        <div className="glass-strong rounded-3xl p-8 max-w-md text-center">
          <div className="text-4xl mb-3">⚠️</div>
          <div className="text-lg font-bold mb-2 text-default">Brief ยังไม่ถูก generate</div>
          <div className="text-sm text-muted mb-4">
            หน้านี้เป็น template — รัน generator script เพื่อใส่ข้อมูล หรือรอ 07:00 BKK สำหรับ auto-run ถัดไป
          </div>
          <div className="text-xs text-faint font-mono">
            generate via: <span className="chip">claude --skill schedule</span>
          </div>
        </div>
      </div>
    );
  }

  if (!data) {
    return <PasswordGate onUnlock={(d, p) => { setData(d); setPwd(p); }} />;
  }

  return <Brief data={data} onLock={() => { clearStoredPassword(); setData(null); setPwd(null); }} />;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
