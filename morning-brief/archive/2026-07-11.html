<!-- Pre-paint theme detection — avoids FOUC -->
<script>
  (function() {
    try {
      var mode = localStorage.getItem('mb-theme') || 'auto';
      var effective;
      if (mode === 'auto') {
        effective = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      } else {
        effective = mode;
      }
      document.documentElement.setAttribute('data-theme', effective);
      document.documentElement.setAttribute('data-theme-mode', mode);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.documentElement.setAttribute('data-theme-mode', 'auto');
    }
  })();
</script>

<div id="app" class="relative z-10"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef } = React;

// ============= Helpers =============
const meta = (() => {
  try { return JSON.parse(document.getElementById('brief-meta').textContent); }
  catch (e) { return {}; }
})();

const STORAGE_KEY = 'mb_pwd_v1';
const THEME_KEY = 'mb-theme';

function decryptPayload(encryptedB64, password) {
  try {
    const decrypted = CryptoJS.AES.decrypt(encryptedB64, password);
    const utf8 = decrypted.toString(CryptoJS.enc.Utf8);
    if (!utf8) return null;
    return JSON.parse(utf8);
  } catch (e) {
    return null;
  }
}

function getStoredPassword() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const { pwd, exp } = JSON.parse(raw);
    if (Date.now() > exp) { localStorage.removeItem(STORAGE_KEY); return null; }
    return pwd;
  } catch (e) { return null; }
}

function storePassword(pwd, days = 7) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      pwd, exp: Date.now() + days * 24 * 60 * 60 * 1000
    }));
  } catch (e) {}
}

function clearStoredPassword() {
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
}

function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
  } catch (e) { return iso; }
}

function fmtDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
  } catch (e) { return iso; }
}

function relTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diffH = (now - d) / (1000 * 60 * 60);
  if (diffH < 1) return `${Math.round(diffH * 60)} นาทีที่แล้ว`;
  if (diffH < 24) return `${Math.round(diffH)} ชม.ที่แล้ว`;
  if (diffH < 48) return 'เมื่อวาน';
  return `${Math.round(diffH / 24)} วันที่แล้ว`;
}

function gmailComposeUrl(to, subject, body) {
  const params = new URLSearchParams({ view: 'cm', to: to || '', su: subject || '', body: body || '' });
  return `https://mail.google.com/mail/?${params.toString()}`;
}

// ============= Theme Toggle =============
function useTheme() {
  const [mode, setMode] = useState(() => {
    try { return localStorage.getItem(THEME_KEY) || 'auto'; } catch (e) { return 'auto'; }
  });

  // Apply theme to <html>
  useEffect(() => {
    const html = document.documentElement;
    html.setAttribute('data-theme-mode', mode);
    const apply = () => {
      let effective;
      if (mode === 'auto') {
        effective = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      } else {
        effective = mode;
      }
      html.setAttribute('data-theme', effective);
    };
    apply();
    try { localStorage.setItem(THEME_KEY, mode); } catch (e) {}

    // Listen for system change only when in auto mode
    if (mode === 'auto') {
      const mq = window.matchMedia('(prefers-color-scheme: light)');
      const handler = () => apply();
      mq.addEventListener('change', handler);
      return () => mq.removeEventListener('change', handler);
    }
  }, [mode]);

  const cycle = () => {
    setMode(m => m === 'auto' ? 'light' : m === 'light' ? 'dark' : 'auto');
  };

  return { mode, cycle };
}

function ThemeToggle() {
  const { mode, cycle } = useTheme();
  const icon = mode === 'auto' ? '🔄' : mode === 'light' ? '☀️' : '🌙';
  const label = mode === 'auto' ? 'Auto' : mode === 'light' ? 'Light' : 'Dark';
  return (
    <button onClick={cycle} className="theme-toggle" title={`Theme: ${label} (คลิกเพื่อสลับ)`}>
      <span className="theme-icon">{icon}</span>
      <span className="theme-label">{label}</span>
    </button>
  );
}

// ============= Password Gate =============
function PasswordGate({ onUnlock }) {
  const [pwd, setPwd] = useState('');
  const [error, setError] = useState('');
  const [remember, setRemember] = useState(true);
  const [shaking, setShaking] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    const stored = getStoredPassword();
    if (stored && meta.encrypted) {
      const result = decryptPayload(meta.encrypted, stored);
      if (result) {
        onUnlock(result, stored);
        return;
      }
      clearStoredPassword();
    }
    inputRef.current && inputRef.current.focus();
  }, []);

  function submit(e) {
    e && e.preventDefault();
    if (!pwd) return;
    const result = decryptPayload(meta.encrypted, pwd);
    if (result) {
      if (remember) storePassword(pwd);
      onUnlock(result, pwd);
    } else {
      setError('Password ไม่ถูกต้อง');
      setShaking(true);
      setTimeout(() => setShaking(false), 400);
    }
  }

  return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="absolute top-4 right-4">
        <ThemeToggle />
      </div>
      <form onSubmit={submit} className={`glass-strong rounded-3xl p-8 md:p-10 w-full max-w-md ${shaking ? 'animate-pulse' : ''}`} style={{boxShadow:'var(--modal-shadow)'}}>
        <div className="text-center mb-8">
          <div className="text-5xl mb-3">🌅</div>
          <div className="text-2xl font-extrabold grad-aurora">Morning Brief</div>
          <div className="text-sm text-muted mt-2">
            {meta.weekday_th || ''} · {fmtDate(meta.date)}
          </div>
          <div className="text-xs text-faint mt-1 font-mono">TONPALEARN · Personal</div>
        </div>
        <label className="block mb-3 text-sm text-muted font-medium">เข้าสู่ระบบด้วย password</label>
        <input
          ref={inputRef}
          type="password"
          className="inp"
          placeholder="ADMIN_PASS"
          value={pwd}
          onChange={e => { setPwd(e.target.value); setError(''); }}
          autoComplete="current-password"
        />
        <label className="flex items-center gap-2 mt-3 text-xs text-dim cursor-pointer">
          <input type="checkbox" checked={remember} onChange={e => setRemember(e.target.checked)} className="rounded" />
          จำไว้ 7 วัน (เบราว์เซอร์นี้)
        </label>
        {error && <div className="mt-3 err">{error}</div>}
        <button type="submit" className="btn-gold w-full mt-5">
          ปลดล็อค Brief
        </button>
        <div className="text-center mt-6 text-xs text-faint">
          เนื้อหาถูก encrypt ด้วย AES-256 · ปลอดภัยต่อให้ URL หลุด
        </div>
      </form>
    </div>
  );
}

// ============= App =============
function App() {
  const [data, setData] = useState(null);
  const [pwd, setPwd] = useState(null);

  if (!meta.encrypted || meta.encrypted === '__BRIEF_ENCRYPTED_PAYLOAD__') {
    return (
      <div className="min-h-screen flex items-center justify-center p-6">
        <div className="absolute top-4 right-4">
          <ThemeToggle />
        </div>
        <div className="glass-strong rounded-3xl p-8 max-w-md text-center">
          <div className="text-4xl mb-3">⚠️</div>
          <div className="text-lg font-bold mb-2 text-default">Brief ยังไม่ถูก generate</div>
          <div className="text-sm text-muted mb-4">
            หน้านี้เป็น template — รัน generator script เพื่อใส่ข้อมูล หรือรอ 07:00 BKK สำหรับ auto-run ถัดไป
          </div>
          <div className="text-xs text-faint font-mono">
            generate via: <span className="chip">claude --skill schedule</span>
          </div>
        </div>
      </div>
    );
  }

  if (!data) {
    return <PasswordGate onUnlock={(d, p) => { setData(d); setPwd(p); }} />;
  }

  return <Brief data={data} onLock={() => { clearStoredPassword(); setData(null); setPwd(null); }} />;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
