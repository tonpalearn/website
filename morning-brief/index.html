<style>
  :root {
    --ink: #08080F;
    --ink-2: #0F0F1A;
    --ink-3: #1A1A2E;
    --gold: #F5D67A;
    --gold-2: #E6B84B;
    --teal: #67E8F9;
    --teal-2: #14B8A6;
    --violet: #A78BFA;
    --violet-2: #7C5CFC;
    --rose: #F472B6;
    --emerald: #34D399;
    --amber: #FBBF24;
    --red: #EF4444;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--ink); color: #fff; font-family: 'Sarabun', 'Plus Jakarta Sans', -apple-system, sans-serif; min-height: 100vh; }
  body {
    background:
      radial-gradient(60% 80% at 10% 0%, rgba(124, 92, 252, 0.18), transparent 60%),
      radial-gradient(50% 70% at 100% 10%, rgba(103, 232, 249, 0.14), transparent 65%),
      radial-gradient(70% 90% at 50% 100%, rgba(245, 214, 122, 0.10), transparent 60%),
      var(--ink);
    background-attachment: fixed;
  }

  /* ===== Glass surfaces ===== */
  .glass {
    background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .glass-strong {
    background: linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
  }
  .glass-gold {
    background: linear-gradient(135deg, rgba(245,214,122,0.10), rgba(230,184,75,0.04));
    border: 1px solid rgba(245,214,122,0.20);
  }
  .glass-teal {
    background: linear-gradient(135deg, rgba(103,232,249,0.10), rgba(20,184,166,0.04));
    border: 1px solid rgba(103,232,249,0.20);
  }
  .glass-violet {
    background: linear-gradient(135deg, rgba(167,139,250,0.10), rgba(124,92,252,0.04));
    border: 1px solid rgba(167,139,250,0.20);
  }
  .glass-rose {
    background: linear-gradient(135deg, rgba(244,114,182,0.10), rgba(244,114,182,0.04));
    border: 1px solid rgba(244,114,182,0.20);
  }

  /* ===== Gradients & text ===== */
  .grad-aurora {
    background: linear-gradient(135deg, #F5D67A 0%, #67E8F9 50%, #A78BFA 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .grad-gold {
    background: linear-gradient(135deg, #F5D67A, #E6B84B);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .grad-teal {
    background: linear-gradient(135deg, #67E8F9, #14B8A6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ===== Buttons ===== */
  .btn-gold {
    background: linear-gradient(135deg, #F5D67A, #E6B84B);
    color: #08080F;
    font-weight: 700;
    border-radius: 12px;
    padding: 10px 18px;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 14px rgba(245, 214, 122, 0.25);
    cursor: pointer;
    border: none;
  }
  .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(245, 214, 122, 0.4); }
  .btn-ghost {
    background: rgba(255,255,255,0.04);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 8px 14px;
    transition: all 0.2s ease;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.20); }
  .btn-teal {
    background: linear-gradient(135deg, #67E8F9, #14B8A6);
    color: #08080F;
    font-weight: 700;
    border-radius: 10px;
    padding: 8px 14px;
    transition: all 0.25s ease;
    cursor: pointer;
    border: none;
  }
  .btn-teal:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(103, 232, 249, 0.4); }

  /* ===== Pills ===== */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .pill-gold { background: rgba(245,214,122,0.12); color: #F5D67A; border-color: rgba(245,214,122,0.25); }
  .pill-teal { background: rgba(103,232,249,0.12); color: #67E8F9; border-color: rgba(103,232,249,0.25); }
  .pill-violet { background: rgba(167,139,250,0.12); color: #A78BFA; border-color: rgba(167,139,250,0.25); }
  .pill-rose { background: rgba(244,114,182,0.12); color: #F472B6; border-color: rgba(244,114,182,0.25); }
  .pill-emerald { background: rgba(52,211,153,0.12); color: #34D399; border-color: rgba(52,211,153,0.25); }
  .pill-amber { background: rgba(251,191,36,0.12); color: #FBBF24; border-color: rgba(251,191,36,0.25); }
  .pill-red { background: rgba(239,68,68,0.14); color: #FCA5A5; border-color: rgba(239,68,68,0.30); }

  /* ===== Inputs ===== */
  .inp {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 12px 16px;
    color: #fff;
    font-size: 15px;
    width: 100%;
    transition: all 0.2s ease;
    outline: none;
  }
  .inp:focus { border-color: rgba(245,214,122,0.4); background: rgba(255,255,255,0.07); }

  /* ===== Animations ===== */
  @keyframes float-slow {
    0%, 100% { transform: translate(0, 0) rotate(0); }
    33% { transform: translate(30px, -40px) rotate(120deg); }
    66% { transform: translate(-25px, 30px) rotate(240deg); }
  }
  .blob {
    position: fixed; pointer-events: none; z-index: 0;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    animation: float-slow 25s ease-in-out infinite;
  }
  .blob-gold { background: radial-gradient(circle, rgba(245,214,122,0.6), transparent 70%); width: 320px; height: 320px; top: 5%; right: -8%; }
  .blob-teal { background: radial-gradient(circle, rgba(103,232,249,0.5), transparent 70%); width: 280px; height: 280px; bottom: 10%; left: -6%; animation-delay: -8s; }
  .blob-violet { background: radial-gradient(circle, rgba(167,139,250,0.5), transparent 70%); width: 300px; height: 300px; top: 50%; right: 30%; animation-delay: -16s; }

  @keyframes shimmer { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  .pulse-dot { animation: shimmer 2s ease-in-out infinite; }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .reveal { animation: slide-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

  /* Section heading */
  .sec-h {
    display: flex; align-items: center; gap: 10px;
    font-size: 18px; font-weight: 800; letter-spacing: -0.01em;
    margin-bottom: 16px;
  }
  .sec-icon {
    width: 36px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 10px;
    font-size: 18px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
  ::-webkit-scrollbar-thumb { background: rgba(245,214,122,0.18); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(245,214,122,0.32); }

  /* Cards hover */
  .card-h { transition: all 0.2s ease; }
  .card-h:hover { background: rgba(255,255,255,0.05); border-color: rgba(245,214,122,0.18); transform: translateY(-1px); }

  /* Code chip */
  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 2px 7px;
    background: rgba(103,232,249,0.10);
    color: #67E8F9;
    border-radius: 6px;
    border: 1px solid rgba(103,232,249,0.18);
  }
</style>

<div id="app" class="relative z-10"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef } = React;

// ============= Helpers =============
const meta = (() => {
  try { return JSON.parse(document.getElementById('brief-meta').textContent); }
  catch (e) { return {}; }
})();

const STORAGE_KEY = 'mb_pwd_v1';

function decryptPayload(encryptedB64, password) {
  try {
    const decrypted = CryptoJS.AES.decrypt(encryptedB64, password);
    const utf8 = decrypted.toString(CryptoJS.enc.Utf8);
    if (!utf8) return null;
    return JSON.parse(utf8);
  } catch (e) {
    return null;
  }
}

function getStoredPassword() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const { pwd, exp } = JSON.parse(raw);
    if (Date.now() > exp) { localStorage.removeItem(STORAGE_KEY); return null; }
    return pwd;
  } catch (e) { return null; }
}

function storePassword(pwd, days = 7) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      pwd, exp: Date.now() + days * 24 * 60 * 60 * 1000
    }));
  } catch (e) {}
}

function clearStoredPassword() {
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
}

function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
  } catch (e) { return iso; }
}

function fmtDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
  } catch (e) { return iso; }
}

function relTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diffH = (now - d) / (1000 * 60 * 60);
  if (diffH < 1) return `${Math.round(diffH * 60)} นาทีที่แล้ว`;
  if (diffH < 24) return `${Math.round(diffH)} ชม.ที่แล้ว`;
  if (diffH < 48) return 'เมื่อวาน';
  return `${Math.round(diffH / 24)} วันที่แล้ว`;
}

function gmailComposeUrl(to, subject, body) {
  const params = new URLSearchParams({ view: 'cm', to: to || '', su: subject || '', body: body || '' });
  return `https://mail.google.com/mail/?${params.toString()}`;
}

// ============= Password Gate =============
function PasswordGate({ onUnlock }) {
  const [pwd, setPwd] = useState('');
  const [error, setError] = useState('');
  const [remember, setRemember] = useState(true);
  const [shaking, setShaking] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    const stored = getStoredPassword();
    if (stored && meta.encrypted) {
      const result = decryptPayload(meta.encrypted, stored);
      if (result) {
        onUnlock(result, stored);
        return;
      }
      clearStoredPassword();
    }
    inputRef.current && inputRef.current.focus();
  }, []);

  function submit(e) {
    e && e.preventDefault();
    if (!pwd) return;
    const result = decryptPayload(meta.encrypted, pwd);
    if (result) {
      if (remember) storePassword(pwd);
      onUnlock(result, pwd);
    } else {
      setError('Password ไม่ถูกต้อง');
      setShaking(true);
      setTimeout(() => setShaking(false), 400);
    }
  }

  return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <form onSubmit={submit} className={`glass-strong rounded-3xl p-8 md:p-10 w-full max-w-md ${shaking ? 'animate-pulse' : ''}`} style={{boxShadow:'0 20px 60px rgba(0,0,0,0.4)'}}>
        <div className="text-center mb-8">
          <div className="text-5xl mb-3">🌅</div>
          <div className="text-2xl font-extrabold grad-aurora">Morning Brief</div>
          <div className="text-sm text-white/60 mt-2">
            {meta.weekday_th || ''} · {fmtDate(meta.date)}
          </div>
          <div className="text-xs text-white/40 mt-1 font-mono">TONPALEARN · Personal</div>
        </div>
        <label className="block mb-3 text-sm text-white/70 font-medium">เข้าสู่ระบบด้วย password</label>
        <input
          ref={inputRef}
          type="password"
          className="inp"
          placeholder="ADMIN_PASS"
          value={pwd}
          onChange={e => { setPwd(e.target.value); setError(''); }}
          autoComplete="current-password"
        />
        <label className="flex items-center gap-2 mt-3 text-xs text-white/60 cursor-pointer">
          <input type="checkbox" checked={remember} onChange={e => setRemember(e.target.checked)} className="rounded" />
          จำไว้ 7 วัน (เบราว์เซอร์นี้)
        </label>
        {error && <div className="mt-3 text-sm text-red-300 bg-red-500/10 border border-red-500/30 rounded-lg px-3 py-2">{error}</div>}
        <button type="submit" className="btn-gold w-full mt-5">
          ปลดล็อค Brief
        </button>
        <div className="text-center mt-6 text-xs text-white/40">
          เนื้อหาถูก encrypt ด้วย AES-256 · ปลอดภัยต่อให้ URL หลุด
        </div>
      </form>
    </div>
  );
}

function App() {
  const [data, setData] = useState(null);
  const [pwd, setPwd] = useState(null);

  if (!meta.encrypted || meta.encrypted === '__BRIEF_ENCRYPTED_PAYLOAD__') {
    return (
      <div className="min-h-screen flex items-center justify-center p-6">
        <div className="glass-strong rounded-3xl p-8 max-w-md text-center">
          <div className="text-4xl mb-3">⚠️</div>
          <div className="text-lg font-bold mb-2">Brief ยังไม่ถูก generate</div>
          <div className="text-sm text-white/60 mb-4">
            หน้านี้เป็น template — รัน generator script เพื่อใส่ข้อมูล หรือรอ 07:00 BKK สำหรับ auto-run ถัดไป
          </div>
          <div className="text-xs text-white/40 font-mono">
            generate via: <span className="chip">claude --skill schedule</span>
          </div>
        </div>
      </div>
    );
  }

  if (!data) {
    return <PasswordGate onUnlock={(d, p) => { setData(d); setPwd(p); }} />;
  }

  return <Brief data={data} onLock={() => { clearStoredPassword(); setData(null); setPwd(null); }} />;
}
