<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TONPALEARN · Admin · VDO + Arsenal</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/assets/liquid.css">

<style>
  table th, table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: left; }
  table th { background: rgba(255,255,255,0.04); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(255,255,255,0.5); font-weight: 600; }
  table tr:hover td { background: rgba(255,255,255,0.02); }
  .tab-active { background: linear-gradient(135deg, #F5D67A, #E6B84B); color: #08080F; }
</style>
</head>
<body class="mesh-bg min-h-screen">

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef } = React;

// ──────────────────────────────────────────────────────────
// Config — auth via /api/sb-admin-config (Vercel env)
// Admin enters password ONCE → stored in localStorage → fetched on each load
// ──────────────────────────────────────────────────────────
const KEY = 'tpl_admin_v2';
const PASS_KEY = 'tpl_admin_pass';
const loadJSON = (k, fb) => { try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch { return fb; } };
const saveJSON = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

const fetchAdminConfig = async (pass) => {
  const res = await fetch('/api/sb-admin-config', { headers: { 'x-admin-pass': pass }});
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'unknown' }));
    throw new Error(err.message || err.error || `HTTP ${res.status}`);
  }
  return res.json();
};

const fmtTHB = (n) => Number(n||0).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtInt = (n) => Number(n||0).toLocaleString('th-TH');
const fmtDate = (iso) => iso ? new Date(iso).toLocaleString('th-TH', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';

// Generate readable ticket code: TPL-XXXX-XXXX
const genTicketCode = () => {
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; // no 0/O/1/I/L confusion
  const pick = () => chars[Math.floor(Math.random() * chars.length)];
  return `TPL-${pick()}${pick()}${pick()}${pick()}-${pick()}${pick()}${pick()}${pick()}`;
};
const genOrderNo = (existing = 0) => {
  const now = new Date();
  const yymm = String(now.getFullYear()).slice(2) + String(now.getMonth()+1).padStart(2,'0');
  return `VDO-${yymm}-${String(existing+1).padStart(3,'0')}`;
};

// Supabase client
let sb = null;
const getClient = (url, key) => {
  if (!url || !key) return null;
  if (!sb) sb = window.supabase.createClient(url, key, { auth: { persistSession: false }});
  return sb;
};

// ──────────────────────────────────────────────────────────
// PASSWORD GATE
// ──────────────────────────────────────────────────────────
function PasswordGate({ onLogin, error }) {
  const [pass, setPass] = useState('');
  const [busy, setBusy] = useState(false);
  const submit = async (e) => {
    e.preventDefault();
    if (!pass.trim()) return;
    setBusy(true);
    await onLogin(pass.trim());
    setBusy(false);
  };
  return (
    <div className="min-h-screen mesh-bg flex items-center justify-center p-6">
      <div className="blob-field">
        <div className="blob blob-gold blob-drift-1" style={{ width: 400, height: 400, top: '15%', left: '20%' }}/>
        <div className="blob blob-teal blob-drift-2" style={{ width: 350, height: 350, bottom: '15%', right: '20%' }}/>
      </div>
      <form onSubmit={submit} className="glass-strong p-8 max-w-md w-full relative">
        <div className="text-center mb-5">
          <div className="font-display font-bold text-2xl flex items-baseline justify-center gap-1">
            <span className="text-white">TON</span><span className="grad-gold">PA</span><span className="grad-teal">LEARN</span>
          </div>
          <div className="text-[10px] text-slate-500 mt-1 font-mono uppercase tracking-widest">Admin · เฉพาะต้น</div>
        </div>
        <label className="lbl">🔐 Admin Password</label>
        <input type="password" value={pass} onChange={e => setPass(e.target.value)} autoFocus
               className="inp font-mono"/>
        {error && <div className="mt-2 text-red-400 text-xs">{error}</div>}
        <button type="submit" disabled={busy || !pass.trim()} className="btn btn-gold w-full justify-center mt-4">
          {busy ? '...' : 'เข้าสู่ระบบ'}
        </button>
        <div className="mt-5 text-[10px] text-slate-500 text-center">
          ใช้ <code className="bg-white/5 px-1 rounded">ADMIN_PASS</code> ที่ตั้งไว้ใน Vercel env
        </div>
      </form>
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// MAIN
// ──────────────────────────────────────────────────────────
const TABS = [
  { k:'dashboard', icon:'📊', label:'Dashboard' },
  { k:'cohorts',   icon:'🎓', label:'Public Cohorts' },
  { k:'bookings',  icon:'📅', label:'Bookings' },
  { k:'tickets',   icon:'🎟', label:'VDO Tickets' },
  { k:'courses',   icon:'📺', label:'VDO Courses' },
  { k:'episodes',  icon:'🎬', label:'VDO Episodes' },
  { k:'arsenal',   icon:'⚡', label:'Arsenal' },
  { k:'orders',    icon:'🧾', label:'Orders' },
  { k:'settings',  icon:'⚙', label:'Settings' },
];

function App() {
  const [cfg, setCfg] = useState({ sbUrl: '', sbKey: '' });
  const [authState, setAuthState] = useState('checking');  // checking | needpass | ready | error
  const [authError, setAuthError] = useState('');
  const [tab, setTab] = useState('dashboard');
  const [toast, setToast] = useState('');

  // Try to fetch config on mount with stored password
  useEffect(() => {
    const storedPass = localStorage.getItem(PASS_KEY);
    if (!storedPass) { setAuthState('needpass'); return; }
    (async () => {
      try {
        const c = await fetchAdminConfig(storedPass);
        setCfg({ sbUrl: c.url, sbKey: c.serviceKey });
        setAuthState('ready');
      } catch (e) {
        if (e.message === 'unauthorized') {
          localStorage.removeItem(PASS_KEY);
          setAuthState('needpass');
        } else {
          setAuthError(e.message);
          setAuthState('error');
        }
      }
    })();
  }, []);

  const login = async (pass) => {
    setAuthError('');
    try {
      const c = await fetchAdminConfig(pass);
      localStorage.setItem(PASS_KEY, pass);
      setCfg({ sbUrl: c.url, sbKey: c.serviceKey });
      setAuthState('ready');
    } catch (e) {
      setAuthError(e.message);
    }
  };

  const logout = () => {
    localStorage.removeItem(PASS_KEY);
    sb = null;
    setCfg({ sbUrl: '', sbKey: '' });
    setAuthState('needpass');
  };

  const client = cfg.sbKey ? getClient(cfg.sbUrl, cfg.sbKey) : null;
  const configured = !!client;

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2500); };

  // Auth gates
  if (authState === 'checking') return <div className="min-h-screen flex items-center justify-center text-slate-400">⏳ Loading...</div>;
  if (authState === 'needpass') return <PasswordGate onLogin={login} error={authError}/>;
  if (authState === 'error') return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="glass-strong p-6 max-w-md">
        <div className="text-red-400 font-bold mb-2">⚠ Setup Error</div>
        <div className="text-sm text-slate-300 mb-3">{authError}</div>
        <div className="text-xs text-slate-500">
          ตรวจสอบ Vercel env vars: <code className="bg-white/5 px-1 rounded">ADMIN_PASS</code>, <code className="bg-white/5 px-1 rounded">SUPABASE_URL</code>, <code className="bg-white/5 px-1 rounded">SUPABASE_SERVICE_KEY</code>
        </div>
        <button onClick={() => { localStorage.removeItem(PASS_KEY); location.reload(); }} className="btn btn-ghost mt-4">รีเซ็ต + ลองใหม่</button>
      </div>
    </div>
  );

  return (
    <div className="min-h-screen flex">
      <aside className="w-56 flex-shrink-0 glass-strong h-screen sticky top-0 overflow-y-auto scrollable" style={{borderRadius: 0, borderTop:'none', borderLeft:'none', borderBottom:'none'}}>
        <div className="p-4 border-b border-white/10">
          <div className="font-display font-bold text-base">
            <span className="text-white">TON</span><span className="grad-gold">PA</span><span className="grad-teal">LEARN</span>
          </div>
          <div className="text-[10px] text-slate-500 mt-0.5 font-mono uppercase tracking-widest">Admin · VDO</div>
        </div>
        <nav className="p-2 space-y-1">
          {TABS.map(t => (
            <button key={t.k} onClick={() => setTab(t.k)}
              className={`w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-left transition ${tab === t.k ? 'bg-white/10 text-white font-semibold' : 'text-slate-400 hover:bg-white/5 hover:text-white'}`}>
              <span>{t.icon}</span><span>{t.label}</span>
            </button>
          ))}
        </nav>
        <div className="p-2 mt-2 border-t border-white/10">
          <a href="/" className="block px-3 py-2 text-xs text-slate-500 hover:text-white transition">← Home</a>
          <a href="/vdo/" className="block px-3 py-2 text-xs text-slate-500 hover:text-white transition" target="_blank">▶ Open /vdo</a>
          <button onClick={logout} className="w-full text-left block px-3 py-2 text-xs text-slate-500 hover:text-red-300 transition">🔓 Logout</button>
        </div>
      </aside>

      <main className="flex-1 min-w-0 p-6 max-w-full">
        {!configured && tab !== 'settings' && (
          <div className="glass p-5 mb-5" style={{borderColor:'rgba(245,214,122,0.40)'}}>
            <div className="font-semibold text-gold-200" style={{color:'#F5D67A'}}>⚙️ ตั้งค่า Supabase ก่อนใช้งาน</div>
            <p className="text-sm text-slate-400 mt-1">
              ไปที่ <button onClick={() => setTab('settings')} className="underline text-gold-200" style={{color:'#F5D67A'}}>⚙ Settings</button> → ใส่ Supabase URL + Service Role Key<br/>
              และ run <code className="bg-white/5 px-2 py-0.5 rounded text-xs">supabase-schema-vdo.sql</code> ครั้งแรก
            </p>
          </div>
        )}

        {tab === 'dashboard' && <Dashboard client={client}/>}
        {tab === 'cohorts'   && <Cohorts client={client} showToast={showToast}/>}
        {tab === 'bookings'  && <Bookings client={client} showToast={showToast}/>}
        {tab === 'tickets'   && <Tickets client={client} showToast={showToast}/>}
        {tab === 'courses'   && <Courses client={client} showToast={showToast}/>}
        {tab === 'episodes'  && <Episodes client={client} showToast={showToast}/>}
        {tab === 'arsenal'   && <Arsenal client={client} showToast={showToast}/>}
        {tab === 'orders'    && <Orders client={client} showToast={showToast}/>}
        {tab === 'settings'  && <Settings cfg={cfg} onLogout={logout}/>}
      </main>

      {toast && <div className="toast" style={{position:'fixed', bottom: 24, left: '50%', transform:'translateX(-50%)', background:'linear-gradient(135deg,#14B8A6,#0D9488)', color:'#fff', padding:'12px 20px', borderRadius:10, fontWeight:600, zIndex:200}}>{toast}</div>}
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// DASHBOARD
// ──────────────────────────────────────────────────────────
function Dashboard({ client }) {
  const [stats, setStats] = useState({ tickets: 0, active: 0, courses: 0, episodes: 0, packs: 0, orders: 0, revenue: 0, playsToday: 0 });

  useEffect(() => {
    if (!client) return;
    (async () => {
      const today = new Date(); today.setHours(0,0,0,0);
      const [tk, ac, cs, ep, ar, or, rv, pl] = await Promise.all([
        client.from('tickets').select('id', { count:'exact', head: true }),
        client.from('tickets').select('id', { count:'exact', head: true }).eq('status', 'active'),
        client.from('vdo_courses').select('id', { count:'exact', head: true }),
        client.from('vdo_episodes').select('id', { count:'exact', head: true }),
        client.from('arsenal_packs').select('id', { count:'exact', head: true }),
        client.from('vdo_orders').select('id', { count:'exact', head: true }),
        client.from('vdo_orders').select('amount_thb').eq('status', 'paid'),
        client.from('view_logs').select('id', { count:'exact', head: true }).gte('watched_at', today.toISOString()).eq('counted_as_play', true),
      ]);
      setStats({
        tickets: tk.count || 0,
        active: ac.count || 0,
        courses: cs.count || 0,
        episodes: ep.count || 0,
        packs: ar.count || 0,
        orders: or.count || 0,
        revenue: (rv.data || []).reduce((s, r) => s + Number(r.amount_thb||0), 0),
        playsToday: pl.count || 0,
      });
    })();
  }, [client]);

  const tiles = [
    { icon:'🎟', label:'TICKETS · TOTAL',  value: stats.tickets },
    { icon:'✅', label:'ACTIVE',          value: stats.active, color: '#4ADE80' },
    { icon:'🎓', label:'COURSES',         value: stats.courses },
    { icon:'📺', label:'EPISODES',        value: stats.episodes },
    { icon:'⚡', label:'ARSENAL PACKS',   value: stats.packs },
    { icon:'🧾', label:'ORDERS',          value: stats.orders },
    { icon:'💰', label:'REVENUE (PAID)',  value: '฿'+fmtTHB(stats.revenue), wide:true },
    { icon:'▶',  label:'PLAYS TODAY',     value: stats.playsToday, color:'#F5D67A' },
  ];

  return (
    <div>
      <div className="mb-5">
        <h1 className="font-display font-bold text-2xl">Dashboard</h1>
        <p className="text-sm text-slate-400">VDO + Arsenal · ภาพรวม</p>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {tiles.map(t => (
          <div key={t.label} className={`glass p-4 ${t.wide?'col-span-2':''}`}>
            <div className="text-[10px] text-slate-400 font-mono uppercase tracking-widest mb-1">{t.icon} {t.label}</div>
            <div className="font-display font-bold text-2xl text-white" style={t.color?{color:t.color}:{}}>{t.value}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// TICKETS
// ──────────────────────────────────────────────────────────
function Tickets({ client, showToast }) {
  const [items, setItems] = useState([]);
  const [courses, setCourses] = useState([]);
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [showNew, setShowNew] = useState(false);
  const [issuedTicket, setIssuedTicket] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = async () => {
    if (!client) { setLoading(false); return; }
    setLoading(true);
    const [t, c] = await Promise.all([
      client.from('tickets').select('*, ticket_courses(course_id)').order('created_at', { ascending: false }),
      client.from('vdo_courses').select('id, slug, title').order('sort_order'),
    ]);
    setItems(t.data || []); setCourses(c.data || []);
    setLoading(false);
  };
  useEffect(() => { load(); }, [client]);

  const filtered = useMemo(() => {
    let f = items;
    if (filter !== 'all') f = f.filter(t => t.status === filter);
    if (search.trim()) {
      const q = search.toLowerCase();
      f = f.filter(t => (t.code||'').toLowerCase().includes(q) ||
                        (t.customer_name||'').toLowerCase().includes(q) ||
                        (t.customer_phone||'').toLowerCase().includes(q) ||
                        (t.customer_line_id||'').toLowerCase().includes(q));
    }
    return f;
  }, [items, filter, search]);

  const revoke = async (id) => {
    if (!confirm('Revoke ticket นี้?')) return;
    await client.from('tickets').update({ status: 'revoked' }).eq('id', id);
    showToast('✓ Revoked');
    load();
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <div>
          <h1 className="font-display font-bold text-2xl">🎟 Tickets</h1>
          <p className="text-sm text-slate-400">{fmtInt(items.length)} ทั้งหมด · {fmtInt(items.filter(t => t.status === 'active').length)} active</p>
        </div>
        <button onClick={() => setShowNew(true)} disabled={!client} className="btn btn-gold">+ Generate Ticket</button>
      </div>

      <div className="flex flex-wrap items-center gap-2 mb-4">
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="ค้น code / ชื่อ / phone / LINE..." className="inp max-w-sm"/>
        <div className="flex gap-1 p-0.5 rounded-lg" style={{background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)'}}>
          {['all','active','consumed','expired','revoked'].map(s => (
            <button key={s} onClick={() => setFilter(s)} className={`px-3 py-1.5 rounded-md text-[11px] font-semibold transition ${filter === s ? 'tab-active' : 'text-slate-400 hover:text-white'}`}>{s}</button>
          ))}
        </div>
      </div>

      <div className="glass overflow-hidden">
        <table className="w-full text-sm">
          <thead>
            <tr>
              <th>Code</th>
              <th>Customer</th>
              <th>Type</th>
              <th>Used / Limit</th>
              <th>Status</th>
              <th>Created</th>
              <th className="text-right">Actions</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(t => (
              <tr key={t.id}>
                <td className="font-mono font-bold grad-gold">{t.code}</td>
                <td><div className="text-white text-sm">{t.customer_name || '—'}</div>{t.customer_phone && <div className="text-[10px] text-slate-500">{t.customer_phone}</div>}</td>
                <td className="text-xs">{t.ticket_type}</td>
                <td className="font-mono text-xs">
                  {t.ticket_type === 'count' && `${t.plays_used}/${t.max_plays}`}
                  {t.ticket_type === 'days' && (t.expires_at ? fmtDate(t.expires_at) : '—')}
                  {t.ticket_type === 'unlimited' && '∞'}
                </td>
                <td><span className={`pill-status st-${t.status === 'active' ? 'paid' : t.status === 'expired' ? 'expired' : t.status === 'revoked' ? 'declined' : 'pending'}`}>{t.status}</span></td>
                <td className="text-xs text-slate-400">{fmtDate(t.created_at)}</td>
                <td className="text-right">
                  {t.status === 'active' && <button onClick={() => revoke(t.id)} className="btn btn-ghost text-xs" style={{borderColor:'rgba(248,113,113,0.30)', color:'#FCA5A5'}}>Revoke</button>}
                  <button onClick={() => { navigator.clipboard.writeText(t.code); showToast('Copied ' + t.code); }} className="btn btn-ghost text-xs ml-1">📋</button>
                </td>
              </tr>
            ))}
            {filtered.length === 0 && !loading && <tr><td colSpan="7" className="text-center text-slate-500 py-10">ยังไม่มี ticket</td></tr>}
          </tbody>
        </table>
      </div>

      {showNew && <TicketCreateModal client={client} courses={courses}
        onClose={() => setShowNew(false)}
        onCreated={(t) => { setShowNew(false); setIssuedTicket(t); load(); }}/>}

      {issuedTicket && <TicketIssuedModal ticket={issuedTicket} courses={courses} onClose={() => setIssuedTicket(null)}/>}
    </div>
  );
}

function TicketCreateModal({ client, courses, onClose, onCreated }) {
  const [f, setF] = useState({
    customer_name: '', customer_phone: '', customer_line_id: '', customer_email: '',
    ticket_type: 'count', max_plays: 10, days: 30,
    course_ids: [],
    notes: '',
  });
  const [saving, setSaving] = useState(false);

  const toggleCourse = (id) => setF({ ...f, course_ids: f.course_ids.includes(id) ? f.course_ids.filter(x => x !== id) : [...f.course_ids, id] });

  const save = async () => {
    if (f.course_ids.length === 0) { alert('เลือกอย่างน้อย 1 คอร์ส'); return; }
    setSaving(true);
    try {
      const code = genTicketCode();
      const payload = {
        code,
        ticket_type: f.ticket_type,
        max_plays: f.ticket_type === 'count' ? Number(f.max_plays) : null,
        expires_at: f.ticket_type === 'days' ? new Date(Date.now() + Number(f.days)*86400000).toISOString() : null,
        customer_name: f.customer_name, customer_phone: f.customer_phone,
        customer_line_id: f.customer_line_id, customer_email: f.customer_email,
        notes: f.notes,
      };
      const { data, error } = await client.from('tickets').insert(payload).select().single();
      if (error) throw error;
      const rows = f.course_ids.map(course_id => ({ ticket_id: data.id, course_id }));
      await client.from('ticket_courses').insert(rows);
      onCreated({ ...data, course_ids: f.course_ids });
    } catch (e) {
      alert('Failed: ' + e.message);
    } finally { setSaving(false); }
  };

  return (
    <Modal title="🎟 Generate Ticket" onClose={onClose} size="lg">
      <div className="grid grid-cols-2 gap-3">
        <div><label className="lbl">ลูกค้า · ชื่อ</label><input className="inp" value={f.customer_name} onChange={e => setF({...f, customer_name: e.target.value})}/></div>
        <div><label className="lbl">เบอร์โทร</label><input className="inp" value={f.customer_phone} onChange={e => setF({...f, customer_phone: e.target.value})}/></div>
        <div><label className="lbl">LINE ID</label><input className="inp" value={f.customer_line_id} onChange={e => setF({...f, customer_line_id: e.target.value})}/></div>
        <div><label className="lbl">Email</label><input className="inp" value={f.customer_email} onChange={e => setF({...f, customer_email: e.target.value})}/></div>

        <div className="col-span-2 mt-2">
          <label className="lbl">Ticket Type</label>
          <div className="grid grid-cols-3 gap-2">
            {[
              { k:'count', label:'Count', sub:'จำกัดจำนวนครั้ง' },
              { k:'days', label:'Days', sub:'หมดอายุตามวัน' },

function Cohorts({ client, showToast }) {
  const [items, setItems] = useState([]);
  const [editing, setEditing] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = async () => {
    if (!client) { setLoading(false); return; }
    setLoading(true);
    const { data } = await client.from('public_cohorts').select('*').order('start_date', { ascending: true });
    setItems(data || []); setLoading(false);
  };
  useEffect(() => { load(); }, [client]);

  const cancel = async (id) => {
    const reason = prompt('เหตุผลที่ยกเลิก?');
    if (!reason) return;
    await client.from('public_cohorts').update({ status: 'cancelled', cancelled_at: new Date().toISOString(), cancel_reason: reason }).eq('id', id);
    showToast('✓ ยกเลิก cohort'); load();
  };

  const confirmManually = async (id) => {
    if (!confirm('ยืนยัน cohort นี้ก่อนครบ 4 คน?')) return;
    await client.from('public_cohorts').update({ status: 'confirmed', confirmed_at: new Date().toISOString() }).eq('id', id);
    showToast('✓ Confirmed'); load();
  };

  // Duplicate: open edit modal pre-filled with source cohort's data
  // Clear id/cohort_no/seats so save creates a NEW cohort
  // Bump start_date and early_bird_deadline forward by 14 days as a sensible default
  const duplicate = (c) => {
    const shift = (iso, days) => {
      if (!iso) return iso;
      const d = new Date(iso); d.setDate(d.getDate() + days);
      return d.toISOString().slice(0, 10);
    };
    const SHIFT = 14;
    setEditing({
      // copy everything from source
      ...c,
      // strip identity/runtime
      id: undefined,
      cohort_no: undefined,
      seats_taken: 0,
      status: 'open',
      confirmed_at: null,
      cancelled_at: null,
      cancel_reason: null,
      created_at: undefined,
      updated_at: undefined,
      // shift dates forward
      start_date: shift(c.start_date, SHIFT),
      early_bird_deadline: shift(c.early_bird_deadline, SHIFT),
      refund_deadline: shift(c.refund_deadline, SHIFT),
      // mark as draft — admin reviews before publishing
      is_published: false,
      // append "(copy)" hint to title if there's a custom title
      title: c.title ? `${c.title} (copy)` : c.title,
    });
    showToast('📋 Duplicated · กด Save เพื่อสร้าง cohort ใหม่');
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <div>
          <h1 className="font-display font-bold text-2xl">🎓 Public Cohorts</h1>
          <p className="text-sm text-slate-400">{items.length} cohort · เปิดประกาศวันที่ให้คนจอง</p>
        </div>
        <button onClick={() => setEditing({})} disabled={!client} className="btn btn-gold">+ เปิดรอบใหม่</button>
      </div>

      <div className="glass overflow-hidden">
        <table className="w-full text-sm">
          <thead><tr>
            <th>No.</th><th>Course</th><th>Date</th><th>Seats</th><th>Price</th><th>Status</th><th></th>
          </tr></thead>
          <tbody>
            {items.map(c => (
              <tr key={c.id}>
                <td className="font-mono text-xs grad-gold">{c.cohort_no || c.id.slice(0,8)}</td>
                <td>
                  <div className="text-white text-sm">{c.title || `${c.course_num} · ${c.course_name}`}</div>
                  <div className="text-[10px] text-slate-500">{c.format_label} · {c.duration_hours}ชม.</div>
                </td>
                <td className="text-xs">
                  <div className="text-white">{fmtDate(c.start_date)}</div>
                  <div className="text-slate-500">{c.start_time}</div>
                </td>
                <td className="font-mono text-xs">
                  <div>{c.seats_taken||0}/{c.max_seats}</div>
                  <div className="text-[9px] text-slate-500">min {c.min_to_confirm}</div>
                </td>
                <td className="font-mono text-xs">
                  ฿{fmtTHB(c.price_thb)}
                  {c.early_bird_price_thb && <div className="text-[9px]" style={{color:'#F5D67A'}}>EB ฿{fmtTHB(c.early_bird_price_thb)}</div>}
                </td>
                <td><span className={`pill-status st-${c.status === 'confirmed' ? 'paid' : c.status === 'cancelled' ? 'declined' : c.status === 'full' ? 'expired' : 'pending'}`}>{c.status}</span></td>
                <td className="text-right space-x-1">
                  <button onClick={() => setEditing(c)} className="btn btn-ghost text-xs">Edit</button>
                  <button onClick={() => duplicate(c)} className="btn btn-ghost text-xs" title="ทำซ้ำเป็นรอบใหม่">📋 Duplicate</button>
                  {c.status === 'open' && <button onClick={() => confirmManually(c.id)} className="btn btn-ghost text-xs" style={{color:'#4ADE80', borderColor:'rgba(34,197,94,0.30)'}}>Confirm</button>}
                  {c.status !== 'cancelled' && <button onClick={() => cancel(c.id)} className="btn btn-ghost text-xs" style={{color:'#FCA5A5', borderColor:'rgba(248,113,113,0.30)'}}>Cancel</button>}
                </td>
              </tr>
            ))}
            {items.length === 0 && !loading && <tr><td colSpan="7" className="text-center text-slate-500 py-10">ยังไม่มี cohort — กด "+ เปิดรอบใหม่"</td></tr>}
          </tbody>
        </table>
      </div>

      {editing && <CohortEditModal cohort={editing} client={client} onClose={() => setEditing(null)} onSaved={() => { setEditing(null); load(); showToast('✓ Saved'); }}/>}
    </div>
  );
}

function CohortEditModal({ cohort, client, onClose, onSaved }) {
  const [f, setF] = useState({
    course_num:'02', course_name:'AI Agentic',
    format:'group', format_label:'Online Group',
    start_date: new Date(Date.now()+14*86400000).toISOString().slice(0,10),
    start_time:'10:00',
    duration_hours: 4,
    price_thb: 3500, early_bird_price_thb: 2500,
    early_bird_deadline: new Date(Date.now()+7*86400000).toISOString().slice(0,10),
    min_to_confirm: 4, max_seats: 10,
    refund_deadline: new Date(Date.now()+11*86400000).toISOString().slice(0,10),
    cover_url:'', title:'', description:'',
    what_you_learn: [], what_you_get: [],
    is_published: false, is_featured: false,
    sort_order: 0,
    ...cohort,
  });
  const [saving, setSaving] = useState(false);

  const onCourseChange = (num) => {
    const c = CATALOG_COURSES.find(x => x.num === num);
    if (!c) return;
    setF(prev => ({
      ...prev,
      course_num: num,
      course_name: c.name,
      duration_hours: c.hrs,
      price_thb: c.prices[prev.format] || prev.price_thb,
    }));
  };

  const onFormatChange = (fmt) => {
    const c = CATALOG_COURSES.find(x => x.num === f.course_num);
    setF(prev => ({
      ...prev,
      format: fmt,
      format_label: fmt === 'group' ? 'Online Group' : fmt === 'onsite' ? 'On-site' : 'Online 1:1',
      price_thb: c?.prices[fmt] || prev.price_thb,
    }));
  };

  const addBullet = (key) => setF({...f, [key]: [...(f[key]||[]), '']});
  const updBullet = (key, i, v) => setF({...f, [key]: f[key].map((x, ix) => ix === i ? v : x)});
  const delBullet = (key, i) => setF({...f, [key]: f[key].filter((_, ix) => ix !== i)});

  const save = async () => {
    if (!f.course_num || !f.start_date) { alert('course + start_date required'); return; }
    setSaving(true);
    try {
      const payload = { ...f };
      delete payload.created_at; delete payload.updated_at;
      delete payload.seats_taken;

      // Generate cohort_no for new + strip identity fields (for duplicate flow)
      if (!cohort.id) {
        delete payload.id;
        delete payload.cohort_no;
        delete payload.confirmed_at;
        delete payload.cancelled_at;
        const now = new Date();
        const yymm = String(now.getFullYear()).slice(2) + String(now.getMonth()+1).padStart(2,'0');
        const { count } = await client.from('public_cohorts').select('id', { count:'exact', head: true })
          .gte('created_at', new Date(now.getFullYear(), now.getMonth(), 1).toISOString());
        payload.cohort_no = `C-${yymm}-${String((count || 0) + 1).padStart(3,'0')}`;
      }

      // Clean empty bullets
      payload.what_you_learn = (f.what_you_learn || []).filter(x => x.trim());
      payload.what_you_get = (f.what_you_get || []).filter(x => x.trim());

      if (cohort.id) await client.from('public_cohorts').update(payload).eq('id', cohort.id);
      else await client.from('public_cohorts').insert(payload);
      onSaved();
    } catch (e) { alert('Failed: ' + e.message); }
    finally { setSaving(false); }
  };

  return (
    <Modal title={cohort.id ? `แก้ไข Cohort ${cohort.cohort_no || ''}` : '+ เปิด Cohort ใหม่'} onClose={onClose} size="lg">
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className="lbl">Course *</label>
          <select className="inp" value={f.course_num} onChange={e => onCourseChange(e.target.value)}>
            {CATALOG_COURSES.map(c => <option key={c.num} value={c.num} className="bg-ink-900">{c.num} · {c.name} ({c.hrs}ชม.)</option>)}
          </select>
        </div>
        <div>
          <label className="lbl">Format *</label>
          <select className="inp" value={f.format} onChange={e => onFormatChange(e.target.value)}>
            <option value="group" className="bg-ink-900">Online Group</option>
            <option value="onsite" className="bg-ink-900">On-site</option>
          </select>
        </div>

        <div><label className="lbl">วันเรียน *</label><input type="date" className="inp" value={f.start_date} onChange={e => setF({...f, start_date: e.target.value})}/></div>
        <div><label className="lbl">เวลาเริ่ม *</label><input type="time" className="inp" value={f.start_time} onChange={e => setF({...f, start_time: e.target.value})}/></div>

        <div><label className="lbl">ระยะเวลา (ชม.)</label><input type="number" className="inp" value={f.duration_hours} onChange={e => setF({...f, duration_hours: Number(e.target.value)})}/></div>
        <div><label className="lbl">Cover image URL</label><input className="inp text-xs" value={f.cover_url||''} onChange={e => setF({...f, cover_url: e.target.value})} placeholder="/assets/covers/course-02.png"/></div>

        <div className="col-span-2">
          <label className="lbl">Title (override course name — optional)</label>
          <input className="inp" value={f.title||''} onChange={e => setF({...f, title: e.target.value})} placeholder={`${f.course_num} · ${f.course_name}`}/>
        </div>

        <div className="col-span-2">
          <label className="lbl">Description</label>
          <textarea rows="2" className="inp text-xs" value={f.description||''} onChange={e => setF({...f, description: e.target.value})}/>
        </div>

        <div className="col-span-2 border-t border-white/10 pt-3 mt-1">
          <div className="text-xs font-bold uppercase tracking-widest" style={{color:'#E6B84B'}}>ราคา + Early Bird</div>
        </div>
        <div><label className="lbl">ราคาเต็ม (THB) *</label><input type="number" className="inp" value={f.price_thb} onChange={e => setF({...f, price_thb: Number(e.target.value)})}/></div>
        <div><label className="lbl">Early Bird price (THB)</label><input type="number" className="inp" value={f.early_bird_price_thb||''} onChange={e => setF({...f, early_bird_price_thb: e.target.value ? Number(e.target.value) : null})}/></div>
        <div className="col-span-2"><label className="lbl">Early Bird หมดเขต</label><input type="date" className="inp" value={f.early_bird_deadline||''} onChange={e => setF({...f, early_bird_deadline: e.target.value || null})}/></div>

        <div className="col-span-2 border-t border-white/10 pt-3 mt-1">
          <div className="text-xs font-bold uppercase tracking-widest" style={{color:'#E6B84B'}}>ที่นั่ง + Refund</div>
        </div>
        <div><label className="lbl">Min to confirm</label><input type="number" className="inp" value={f.min_to_confirm} onChange={e => setF({...f, min_to_confirm: Number(e.target.value)})}/></div>
        <div><label className="lbl">Max seats</label><input type="number" className="inp" value={f.max_seats} onChange={e => setF({...f, max_seats: Number(e.target.value)})}/></div>
        <div className="col-span-2"><label className="lbl">Refund deadline (วันสุดท้ายที่ refund ได้ถ้าไม่ครบ)</label><input type="date" className="inp" value={f.refund_deadline||''} onChange={e => setF({...f, refund_deadline: e.target.value || null})}/></div>

        <div className="col-span-2 border-t border-white/10 pt-3 mt-1">
          <div className="flex items-center justify-between mb-1">
            <div className="text-xs font-bold uppercase tracking-widest" style={{color:'#E6B84B'}}>📌 จะได้เรียน (bullets)</div>
            <button onClick={() => addBullet('what_you_learn')} className="btn btn-ghost text-xs">+ เพิ่ม</button>
          </div>
          <div className="space-y-1.5">
            {(f.what_you_learn||[]).map((b, i) => (
              <div key={i} className="flex gap-1.5">
                <input className="inp text-xs flex-1" value={b} onChange={e => updBullet('what_you_learn', i, e.target.value)} placeholder="เช่น เข้าใจ AI Agent คืออะไร"/>
                <button onClick={() => delBullet('what_you_learn', i)} className="text-red-400 px-2">✕</button>
              </div>
            ))}
          </div>
        </div>

        <div className="col-span-2 border-t border-white/10 pt-3 mt-1">
          <div className="flex items-center justify-between mb-1">
            <div className="text-xs font-bold uppercase tracking-widest" style={{color:'#E6B84B'}}>🎁 จะได้อะไร (bullets)</div>
            <button onClick={() => addBullet('what_you_get')} className="btn btn-ghost text-xs">+ เพิ่ม</button>
          </div>
          <div className="space-y-1.5">
            {(f.what_you_get||[]).map((b, i) => (
              <div key={i} className="flex gap-1.5">
                <input className="inp text-xs flex-1" value={b} onChange={e => updBullet('what_you_get', i, e.target.value)} placeholder="เช่น Slide + Working code + Certificate"/>
                <button onClick={() => delBullet('what_you_get', i)} className="text-red-400 px-2">✕</button>
              </div>
            ))}
          </div>
        </div>

        <div className="col-span-2 border-t border-white/10 pt-3 mt-1 flex gap-4 text-sm">
          <label className="flex items-center gap-2"><input type="checkbox" checked={!!f.is_published} onChange={e => setF({...f, is_published: e.target.checked})} className="w-4 h-4 accent-yellow-500"/> Published</label>
          <label className="flex items-center gap-2"><input type="checkbox" checked={!!f.is_featured} onChange={e => setF({...f, is_featured: e.target.checked})} className="w-4 h-4 accent-yellow-500"/> ⭐ Featured</label>
        </div>
      </div>

      <div className="flex justify-end gap-2 mt-5">
        <button onClick={onClose} className="btn btn-ghost">Cancel</button>
        <button onClick={save} disabled={saving} className="btn btn-gold">{saving ? '...' : 'Save'}</button>
      </div>
    </Modal>
  );
}

// ──────────────────────────────────────────────────────────
// BOOKINGS · Public + Private
// ──────────────────────────────────────────────────────────
function Bookings({ client, showToast }) {
  const [items, setItems] = useState([]);
  const [filterMode, setFilterMode] = useState('all');
  const [filterStatus, setFilterStatus] = useState('all');

  const load = async () => {
    if (!client) return;
    const { data } = await client.from('bookings').select('*').order('created_at', { ascending: false }).limit(200);
    setItems(data || []);
  };
  useEffect(() => { load(); }, [client]);

  const filtered = useMemo(() => {
    let f = items;
    if (filterMode !== 'all') f = f.filter(b => (b.mode || 'private') === filterMode);
    if (filterStatus !== 'all') f = f.filter(b => b.status === filterStatus);
    return f;
  }, [items, filterMode, filterStatus]);

  const confirmPayment = async (id) => {
    if (!confirm('Confirm ว่าโอนเงินมาแล้ว?')) return;
    await client.from('bookings').update({ status: 'confirmed', confirmed_at: new Date().toISOString() }).eq('id', id);
    showToast('✓ Confirmed'); load();
  };

  const reject = async (id) => {
    const reason = prompt('เหตุผล reject?');
    if (!reason) return;
    await client.from('bookings').update({ status: 'rejected', rejected_at: new Date().toISOString(), rejection_reason: reason }).eq('id', id);
    showToast('Rejected'); load();
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <div>
          <h1 className="font-display font-bold text-2xl">📅 Bookings</h1>
          <p className="text-sm text-slate-400">{items.length} bookings (Public + Private)</p>
        </div>
      </div>

      <div className="flex flex-wrap items-center gap-2 mb-4">
        <div className="flex gap-1 p-0.5 rounded-lg glass-soft">
          {['all','public_cohort','private'].map(m => (
            <button key={m} onClick={() => setFilterMode(m)} className={`pill text-[11px] ${filterMode === m ? 'active' : ''}`}>
              {m === 'all' ? 'ทั้งหมด' : m === 'public_cohort' ? '🎓 Public' : '👤 Private'}
            </button>
          ))}
        </div>
        <div className="flex gap-1 p-0.5 rounded-lg glass-soft">
          {['all','pending_payment','slip_uploaded','confirmed','rejected','cancelled'].map(s => (
            <button key={s} onClick={() => setFilterStatus(s)} className={`pill text-[11px] ${filterStatus === s ? 'active' : ''}`}>{s}</button>
          ))}
        </div>
      </div>

      <div className="glass overflow-hidden">
        <table className="w-full text-sm">
          <thead><tr>
            <th>No.</th><th>Mode</th><th>Customer</th><th>Course</th><th>Date</th><th>Amount</th><th>Slip</th><th>Status</th><th></th>
          </tr></thead>
          <tbody>
            {filtered.map(b => (
              <tr key={b.id}>
                <td className="font-mono text-xs grad-gold">{b.booking_no}</td>
                <td className="text-xs">{(b.mode || 'private') === 'public_cohort' ? '🎓' : '👤'}</td>
                <td>
                  <div className="text-white text-sm">{b.customer_name}</div>
                  <div className="text-[10px] text-slate-500">{b.customer_phone}</div>
                </td>
                <td>
                  <div className="text-white text-xs">{b.course_num} · {b.course_name}</div>
                  <div className="text-[10px] text-slate-500">{b.format_label} · {b.duration_hours || b.hours}ชม.</div>
                </td>
                <td className="text-xs">
                  <div className="text-white">{fmtDate(b.preferred_date)}</div>
                  <div className="text-slate-500">{b.preferred_time}</div>
                </td>
                <td className="font-mono text-xs">
                  ฿{fmtTHB(b.amount)}
                  {b.is_early_bird && <div className="text-[9px]" style={{color:'#F5D67A'}}>EB</div>}
                </td>
                <td>{b.slip_url ? <a href={b.slip_url} target="_blank" rel="noopener" className="text-teal-300 text-xs underline">📎 ดูสลิป</a> : <span className="text-slate-500 text-xs">—</span>}</td>
                <td><span className={`pill-status st-${b.status === 'confirmed' ? 'paid' : b.status === 'rejected' ? 'declined' : b.status === 'slip_uploaded' ? 'accepted' : 'pending'}`}>{b.status}</span></td>
                <td className="text-right space-x-1">
                  {(b.status === 'slip_uploaded' || b.status === 'pending_payment') && (
                    <button onClick={() => confirmPayment(b.id)} className="btn btn-ghost text-xs" style={{color:'#4ADE80', borderColor:'rgba(34,197,94,0.30)'}}>✓ OK</button>
                  )}
                  {b.status !== 'rejected' && b.status !== 'cancelled' && (
                    <button onClick={() => reject(b.id)} className="btn btn-ghost text-xs" style={{color:'#FCA5A5'}}>✕</button>
                  )}
                </td>
              </tr>
            ))}
            {filtered.length === 0 && <tr><td colSpan="9" className="text-center text-slate-500 py-10">ไม่มี bookings ตาม filter</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// MODAL
// ──────────────────────────────────────────────────────────
function Modal({ title, children, onClose, size = 'md' }) {
  const sizeClass = size === 'xl' ? 'max-w-5xl' : size === 'lg' ? 'max-w-3xl' : 'max-w-2xl';
  return (
    <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-start justify-center pt-12 px-4 overflow-y-auto" onClick={onClose}>
      <div className={`glass-strong w-full ${sizeClass} my-12`} onClick={e => e.stopPropagation()}>
        <div className="px-5 py-4 border-b border-white/10 flex items-center justify-between sticky top-0" style={{background:'rgba(8,8,15,0.95)', backdropFilter:'blur(20px)', borderTopLeftRadius: 24, borderTopRightRadius: 24}}>
          <h2 className="font-display font-bold text-lg grad-gold">{title}</h2>
          <button onClick={onClose} className="btn btn-ghost">✕</button>
        </div>
        <div className="p-5 max-h-[75vh] overflow-y-auto scrollable">{children}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
