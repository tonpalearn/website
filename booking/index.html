<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TONPALEARN · จองตารางเรียน</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/promptpay-qr@0.5.0/build/promptpay-qr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html { background: #08080F; }
    body { font-family: 'IBM Plex Sans Thai', sans-serif; background: #08080F; color: #FAFAFA; -webkit-font-smoothing: antialiased; min-height: 100vh; }
    *::selection { background: rgba(230,184,75,0.25); color: #fff; }
    .font-display { font-family: 'Space Grotesk', 'IBM Plex Sans Thai', sans-serif; }
    .font-mono    { font-family: 'JetBrains Mono', monospace; }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
    }

    .grad-text-gold {
      background: linear-gradient(135deg, #F5D67A 0%, #E6B84B 50%, #C8A84B 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .grad-text-teal {
      background: linear-gradient(135deg, #67E8F9 0%, #2DD4BF 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }

    .inp {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-size: 14px;
      transition: border-color 0.15s, background 0.15s;
    }
    .inp:hover { border-color: rgba(230,184,75,0.35); }
    .inp:focus { outline: none; border-color: #E6B84B; background: rgba(255,255,255,0.06); }
    .inp::placeholder { color: rgba(255,255,255,0.3); }

    .step-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px;
      border: 2px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5);
      transition: all 0.3s;
    }
    .step-dot.active { background: linear-gradient(135deg, #F0CC72, #E6B84B); border-color: transparent; color: #08080F; }
    .step-dot.done { background: rgba(45,212,191,0.2); border-color: #2DD4BF; color: #2DD4BF; }

    .slot-btn {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      transition: all 0.15s;
      cursor: pointer;
      text-align: center;
    }
    .slot-btn:hover:not(:disabled) { border-color: rgba(230,184,75,0.4); background: rgba(230,184,75,0.06); }
    .slot-btn.selected { background: linear-gradient(135deg, #F0CC72, #E6B84B); color: #08080F; border-color: transparent; }
    .slot-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .course-card {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.02);
      transition: all 0.15s;
      cursor: pointer;
      text-align: left;
    }
    .course-card:hover { border-color: rgba(230,184,75,0.4); transform: translateY(-2px); }
    .course-card.selected { border-color: #E6B84B; background: rgba(230,184,75,0.06); box-shadow: 0 0 20px -6px rgba(230,184,75,0.4); }

    @keyframes pop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .pop { animation: pop 0.4s ease-out forwards; }

    .mesh-bg {
      background:
        radial-gradient(ellipse 60% 50% at 20% 0%, rgba(124,92,252,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 80% 100%, rgba(45,212,191,0.08) 0%, transparent 55%);
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useMemo, useEffect, useRef } = React;

// ───────────────────────────────────────────────────────────
// COURSES (synced from /AI Course/COURSES.md v7.1 + PRICING.md v3.3)
// ───────────────────────────────────────────────────────────
const COURSES = [
  { num: '01', name: 'AI Basic', emoji: '🌱', hrs: 2, desc: 'จาก 0 ถึง AI ที่ใช้ได้จริง — Prompt + ใช้ AI ในงานจริง',
    prices: { vdo: 990, group: 2000, private: 2500, onsite: 3000 } },
  { num: '02', name: 'AI Agentic', emoji: '⚡', hrs: 4, desc: 'AI User → AI Builder — Setup + Skill + Build Agent', featured: true,
    prices: { vdo: 2500, group: 3500, private: 4500, onsite: 7000 } },
  { num: '03', name: 'MCP Connector', emoji: '🔌', hrs: 5, desc: 'เชื่อม AI กับ Notion · Gmail · Slack · ทุก App',
    prices: { vdo: 2500, group: 3500, private: 4500, onsite: 7000 }, prereq: '02' },
  { num: '04', name: 'LINE ChatBot', emoji: '🤖', hrs: 3, desc: 'ChatBot LINE ของคุณเอง — ตอบลูกค้า 24/7',
    prices: { vdo: 2500, group: 3500, private: 4500, onsite: 7000 }, prereq: '02' },
  { num: '05', name: 'AI for Kids', emoji: '👧', hrs: 3, desc: 'สำหรับเด็ก ม.1–ม.6 — Kid-safe + creative AI',
    prices: { vdo: 990, group: 2000, private: 3000, onsite: 3000 } },
  { num: '06', name: 'AI for Personal Assistant', emoji: '🚀', hrs: 3, desc: 'PA ที่ใช้ AI เป็น — ทำงานเร็วขึ้น 10x',
    prices: { vdo: 1500, group: 2000, private: 3000, onsite: 3000 } },
  { num: '07', name: 'AI for ABOs', emoji: '💼', hrs: 3, desc: 'AI สำหรับนักธุรกิจเครือข่าย · กลุ่ม 5+',
    prices: { vdo: 0, group: 0, private: 0, onsite: 0 }, quote: true },
  { num: '08', name: 'AI Agentic Web Builder', emoji: '🧱', hrs: 5, desc: 'Code ไม่เป็น ก็มี Web เองได้ — Vibe Coding',
    prices: { vdo: 2500, group: 3500, private: 4500, onsite: 7000 } },
  { num: '09', name: 'AI Agentic App Builder', emoji: '📱', hrs: 5, desc: 'Web App + Database + Login + เก็บข้อมูล',
    prices: { vdo: 2500, group: 3500, private: 4500, onsite: 7000 }, prereq: '08' },
  { num: '10', name: 'AI Agentic Orchestra', emoji: '🎼', hrs: 4, desc: 'Multi-Agent — Cowork + Persona + Auto Deploy', isNew: true,
    prices: { vdo: 3500, group: 4500, private: 6000, onsite: 9000 } },
  { num: '11', name: 'AI Content Creator System', emoji: '🎬', hrs: 4, desc: 'YouTube/TikTok + Content OS + Multi-Agent', isNew: true,
    prices: { vdo: 3500, group: 4500, private: 6000, onsite: 9000 } },
  { num: '12', name: 'AI Agentic for IT Audit & Consult', emoji: '🔍', hrs: 4, desc: 'AI Agent สำหรับ IT Auditor / Consultant', isNew: true,
    prices: { vdo: 0, group: 0, private: 0, onsite: 0 }, quote: true },
];

const FORMATS = [
  { key: 'group',   label: 'Online Group', sub: 'สอนสด · 5+ คน · ยอดนิยม', mins: 240 },
  { key: 'private', label: 'Online 1:1',   sub: '1 ต่อ 1 · ยืดหยุ่น',       mins: 240 },
  { key: 'onsite',  label: 'On-site',      sub: '3-10 คน · ไปสอนในสถานที่', mins: 240 },
];

// PromptPay
const PROMPTPAY_ID = '0939149397'; // ต้น's mobile

// API endpoints
const API = {
  slots:   '/api/calendar-slots',
  booking: '/api/bookings',
};

// Format helpers
const fmtTHB = (n) => n.toLocaleString('th-TH');
const fmtThaiDate = (iso) => {
  const d = new Date(iso);
  const m = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const day = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  return `${day[d.getDay()]} ${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()+543}`;
};

// ───────────────────────────────────────────────────────────
// APP
// ───────────────────────────────────────────────────────────
function App() {
  const [step, setStep] = useState(1);
  const [courseNum, setCourseNum] = useState(null);
  const [format,    setFormat]    = useState('group');
  const [attendees, setAttendees] = useState(1);
  const [selectedSlot, setSelectedSlot] = useState(null);

  const [customer, setCustomer] = useState({
    name: '', email: '', phone: '', company: '',
  });

  const [booking, setBooking] = useState(null); // created booking object
  const [slipFile, setSlipFile] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');

  const course = COURSES.find(c => c.num === courseNum);
  const fmtObj = FORMATS.find(f => f.key === format);
  const unitPrice = course && !course.quote ? (course.prices[format] || 0) : 0;
  const total = unitPrice * attendees;

  const canNext1 = courseNum && format && !course?.quote;
  const canNext2 = !!selectedSlot;
  const canNext3 = customer.name && customer.phone;

  return (
    <div className="min-h-screen mesh-bg">
      <Header step={step}/>

      <main className="mx-auto max-w-3xl px-5 py-6">
        {error && (
          <div className="mb-4 panel p-3 border-red-500/40 text-red-300 text-sm">
            ⚠️ {error}
          </div>
        )}

        {step === 1 && (
          <Step1
            courseNum={courseNum} setCourseNum={setCourseNum}
            format={format} setFormat={setFormat}
            attendees={attendees} setAttendees={setAttendees}
            course={course} unitPrice={unitPrice} total={total}
            canNext={canNext1}
            onNext={() => setStep(2)}
          />
        )}

        {step === 2 && (
          <Step2
            course={course} format={fmtObj} attendees={attendees} total={total}
            selectedSlot={selectedSlot} setSelectedSlot={setSelectedSlot}
            canNext={canNext2}
            onBack={() => setStep(1)}
            onNext={() => setStep(3)}
          />
        )}

        {step === 3 && (
          <Step3
            course={course} format={fmtObj} attendees={attendees} total={total}
            selectedSlot={selectedSlot}
            customer={customer} setCustomer={setCustomer}
            canNext={canNext3}
            submitting={submitting}
            onBack={() => setStep(2)}
            onSubmit={async () => {
              setSubmitting(true); setError('');
              try {
                const resp = await fetch(API.booking, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    customer_name: customer.name,
                    customer_email: customer.email,
                    customer_phone: customer.phone,
                    customer_company: customer.company,
                    course_num: course.num,
                    course_name: course.name,
                    format: format,
                    format_label: fmtObj.label,
                    hours: course.hrs,
                    num_attendees: attendees,
                    preferred_date: selectedSlot.date,
                    preferred_time: selectedSlot.time,
                    duration_mins: selectedSlot.duration,
                    amount: total,
                  }),
                });
                if (!resp.ok) throw new Error(await resp.text() || 'Booking failed');
                const data = await resp.json();
                setBooking(data);
                setStep(4);
              } catch (e) {
                setError(e.message || 'เกิดข้อผิดพลาด — ลองใหม่อีกครั้ง');
              } finally {
                setSubmitting(false);
              }
            }}
          />
        )}

        {step === 4 && booking && (
          <Step4
            booking={booking}
            slipFile={slipFile} setSlipFile={setSlipFile}
            onUploadComplete={(updated) => { setBooking(updated); setStep(5); }}
            setError={setError}
          />
        )}

        {step === 5 && booking && (
          <Step5 booking={booking}/>
        )}
      </main>

      <footer className="text-center py-8 text-xs text-slate-500">
        ปัญหา / สอบถาม → <a href="https://line.me/ti/p/@tonpalearn" className="grad-text-gold">@tonpalearn</a> · 093-914-9397
      </footer>
    </div>
  );
}

// ───────────────────────────────────────────────────────────
// HEADER + STEP INDICATOR
// ───────────────────────────────────────────────────────────
function Header({ step }) {
  const labels = ['เลือกคอร์ส', 'เลือกตาราง', 'ข้อมูลลูกค้า', 'ชำระเงิน', 'เสร็จสิ้น'];
  return (
    <header className="border-b border-white/10 bg-ink-950/85 backdrop-blur-xl sticky top-0 z-30">
      <div className="mx-auto max-w-3xl px-5 py-3">
        <div className="flex items-center justify-between mb-3">
          <a href="/" className="font-display font-bold text-base">
            <span className="text-white">TON</span>
            <span className="grad-text-gold">PA</span>
            <span className="grad-text-teal">LEARN</span>
            <span className="text-slate-500 mx-2 text-sm font-normal">·</span>
            <span className="text-sm text-slate-400 font-normal">จองตารางเรียน</span>
          </a>
        </div>
        <div className="flex items-center gap-2">
          {labels.map((l, i) => (
            <React.Fragment key={i}>
              <div className="flex items-center gap-2 flex-shrink-0">
                <div className={`step-dot ${step > i+1 ? 'done' : step === i+1 ? 'active' : ''}`}>
                  {step > i+1 ? '✓' : i+1}
                </div>
                <span className={`text-[11px] hidden sm:inline ${step === i+1 ? 'text-white font-semibold' : 'text-slate-500'}`}>{l}</span>
              </div>
              {i < labels.length - 1 && <div className="flex-1 h-px bg-white/10"/>}
            </React.Fragment>
          ))}
        </div>
      </div>
    </header>
  );
}

// ───────────────────────────────────────────────────────────
// STEP 1 — Course + Format
// ───────────────────────────────────────────────────────────
function Step1({ courseNum, setCourseNum, format, setFormat, attendees, setAttendees, course, unitPrice, total, canNext, onNext }) {
  return (
    <div className="space-y-5 pop">
      <SectionTitle num="1" title="เลือกคอร์ส" sub="คลิกการ์ดเพื่อเลือก"/>

      <div className="grid sm:grid-cols-2 gap-3">
        {COURSES.map(c => (
          <button key={c.num}
            onClick={() => setCourseNum(c.num)}
            className={`course-card ${courseNum === c.num ? 'selected' : ''}`}>
            <div className="flex items-start gap-3">
              <div className="text-3xl flex-shrink-0">{c.emoji}</div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2">
                  <span className="font-mono text-[10px] text-slate-500">{c.num}</span>
                  <div className="font-display font-bold text-base text-white truncate">{c.name}</div>
                  {c.featured && <span className="text-[9px] px-1.5 py-0.5 rounded bg-teal-500 text-black font-bold">⭐</span>}
                  {c.isNew && <span className="text-[9px] px-1.5 py-0.5 rounded bg-violet-500 text-white font-bold">NEW</span>}
                </div>
                <p className="text-xs text-slate-400 mt-1 leading-snug">{c.desc}</p>
                <div className="mt-2 flex items-baseline justify-between">
                  <span className="text-[10px] text-slate-500">⏱ {c.hrs} ชม.</span>
                  <span className="text-xs font-mono text-slate-400">
                    {c.quote ? <em>Corporate · Quote</em> : `฿${fmtTHB(c.prices.group)}+ / คน`}
                  </span>
                </div>
              </div>
            </div>
          </button>
        ))}
      </div>

      {course && course.quote && (
        <div className="panel p-4 border-yellow-500/40">
          <div className="text-sm text-yellow-300 font-semibold">⚠️ คอร์ส {course.num} เป็น Quote-based</div>
          <div className="text-xs text-slate-400 mt-1">
            กรุณาทักผ่าน LINE OA <a href="https://line.me/ti/p/@tonpalearn" className="grad-text-gold">@tonpalearn</a> เพื่อขอใบเสนอราคา · ระบบจองออนไลน์รองรับเฉพาะคอร์สที่มีราคา list
          </div>
        </div>
      )}

      {course && !course.quote && (
        <>
          <SectionTitle num="2" title="รูปแบบการเรียน"/>
          <div className="grid sm:grid-cols-3 gap-3">
            {FORMATS.map(f => (
              <button key={f.key}
                onClick={() => setFormat(f.key)}
                className={`course-card ${format === f.key ? 'selected' : ''}`}>
                <div className="font-display font-bold text-sm text-white">{f.label}</div>
                <div className="text-xs text-slate-400 mt-1">{f.sub}</div>
                <div className="mt-2 font-mono text-sm grad-text-gold">฿{fmtTHB(course.prices[f.key])} / คน</div>
              </button>
            ))}
          </div>

          <SectionTitle num="3" title="จำนวนผู้เรียน"/>
          <div className="panel p-4 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <button onClick={() => setAttendees(Math.max(1, attendees - 1))}
                      className="w-9 h-9 rounded-lg border border-white/20 hover:border-white/40 text-white">−</button>
              <span className="font-display font-bold text-xl w-12 text-center">{attendees}</span>
              <button onClick={() => setAttendees(Math.min(20, attendees + 1))}
                      className="w-9 h-9 rounded-lg border border-white/20 hover:border-white/40 text-white">+</button>
              <span className="text-xs text-slate-400 ml-2">คน</span>
            </div>
            <div className="text-right">
              <div className="text-[10px] text-slate-500">รวม</div>
              <div className="font-display font-bold text-xl grad-text-gold">฿{fmtTHB(total)}</div>
            </div>
          </div>
        </>
      )}

      <div className="flex justify-end gap-3 pt-4">
        <button onClick={onNext} disabled={!canNext}
                className="px-6 py-3 rounded-xl font-display font-bold transition disabled:opacity-30"
                style={{ background: 'linear-gradient(135deg, #F0CC72, #E6B84B)', color: '#08080F' }}>
          ถัดไป — เลือกตารางเวลา →
        </button>
      </div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────
// STEP 2 — Calendar slot picker
// ───────────────────────────────────────────────────────────
function Step2({ course, format, attendees, total, selectedSlot, setSelectedSlot, canNext, onBack, onNext }) {
  const [slots, setSlots] = useState([]);
  const [loading, setLoading] = useState(true);
  const [mockMode, setMockMode] = useState(false);

  // Default range: today+3d → today+45d
  const from = new Date(Date.now() + 3*24*60*60*1000).toISOString().slice(0,10);
  const to   = new Date(Date.now() + 45*24*60*60*1000).toISOString().slice(0,10);

  useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        const resp = await fetch(`${API.slots}?from=${from}&to=${to}`);
        if (!resp.ok) throw new Error('Failed to load slots');
        const data = await resp.json();
        setMockMode(data.mode === 'mock');
        setSlots(data.slots || []);
      } catch (e) {
        // Fallback: generate locally
        setMockMode(true);
        setSlots(generateLocalSlots());
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  // Group slots by date
  const byDate = useMemo(() => {
    const m = {};
    slots.forEach(s => {
      if (!m[s.date]) m[s.date] = [];
      m[s.date].push(s);
    });
    return m;
  }, [slots]);

  const dates = Object.keys(byDate).sort();

  return (
    <div className="space-y-5 pop">
      <BookingSummary course={course} format={format} attendees={attendees} total={total}/>

      <SectionTitle num="•" title="เลือกวันและเวลา" sub="ตารางว่างจาก Google Calendar ของต้น"/>

      {mockMode && (
        <div className="panel p-3 border-amber-500/40 text-xs text-amber-300">
          ⚠️ Mock mode — Google Calendar ยังไม่ได้ setup · slots ทั้งหมดแสดงเป็น available · ตารางจริงจะ sync เมื่อ admin setup เสร็จ
        </div>
      )}

      {loading && <div className="panel p-8 text-center text-slate-400">กำลังโหลดตาราง...</div>}

      {!loading && dates.length === 0 && (
        <div className="panel p-8 text-center text-slate-400">ไม่มีตารางว่างในช่วงนี้ · กรุณาติดต่อ LINE OA</div>
      )}

      <div className="space-y-2 max-h-[480px] overflow-y-auto pr-2">
        {dates.map(d => {
          const daySlots = byDate[d];
          const hasAvailable = daySlots.some(s => s.available);
          return (
            <div key={d} className={`panel p-3 ${!hasAvailable ? 'opacity-50' : ''}`}>
              <div className="text-xs font-display font-semibold text-slate-300 mb-2">{fmtThaiDate(d)}</div>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                {daySlots.map((s, i) => {
                  const sel = selectedSlot?.start === s.start;
                  const [hh, mm] = s.time.split(':');
                  const endH = parseInt(hh) + Math.floor(s.duration / 60);
                  return (
                    <button key={i}
                      disabled={!s.available}
                      onClick={() => setSelectedSlot(s)}
                      className={`slot-btn ${sel ? 'selected' : ''}`}>
                      <div className="font-mono text-xs">
                        {s.time} - {String(endH).padStart(2,'0')}:{mm}
                      </div>
                      <div className="text-[9px] opacity-70 mt-0.5">
                        {!s.available ? 'จองแล้ว' : `${s.duration/60} ชม.`}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      <div className="flex justify-between gap-3 pt-4">
        <button onClick={onBack} className="px-5 py-3 rounded-xl text-slate-400 hover:text-white transition">← ย้อนกลับ</button>

                className="px-6 py-3 rounded-xl font-display font-bold transition disabled:opacity-30"

          ถัดไป — กรอกข้อมูล →
        </button>
      </div>
    </div>
  );
}

function generateLocalSlots() {
  const slots = [];
  const start = new Date(Date.now() + 3*24*60*60*1000);
  for (let i = 0; i < 30; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    if (d.getDay() === 0 || d.getDay() === 6) continue;
    for (const t of [{h:10,m:0},{h:14,m:0}]) {
      const sl = new Date(d);
      sl.setHours(t.h, t.m, 0, 0);
      const el = new Date(sl.getTime() + 4*60*60*1000);
      slots.push({
        date: sl.toISOString().slice(0,10),
        time: `${String(t.h).padStart(2,'0')}:${String(t.m).padStart(2,'0')}`,
        start: sl.toISOString(), end: el.toISOString(), duration: 240, available: true,
      });
    }
  }
  return slots;
}

// ───────────────────────────────────────────────────────────
// STEP 4 — QR Code + Slip Upload
// ───────────────────────────────────────────────────────────
function Step4({ booking, slipFile, setSlipFile, onUploadComplete, setError }) {
  const qrRef = useRef(null);
  const [uploading, setUploading] = useState(false);

  useEffect(() => {
    if (!qrRef.current) return;
    try {
      const payload = window.generatePayload(PROMPTPAY_ID, { amount: booking.amount });
      window.QRCode.toCanvas(qrRef.current, payload, {
        width: 280,
        color: { dark: '#08080F', light: '#FFFFFF' },
        margin: 1,
      });
    } catch (e) {
      console.error('QR generation failed', e);
    }
  }, [booking.amount]);

  const handleUpload = async (file) => {
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { setError('ไฟล์ใหญ่เกิน 5MB'); return; }

    setUploading(true);
    try {
      // Upload to Supabase Storage via fetch
      const formData = new FormData();
      formData.append('file', file);
      formData.append('booking_id', booking.id);

      // Direct upload to Supabase Storage
      const supabaseUrl = 'https://lhrzjkizxjigqeuyposw.supabase.co';
      const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxocnpqa2l6eGppZ3FldXlwb3N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODA0NDgsImV4cCI6MjA5NDc1NjQ0OH0.00JIC-uWcDh9StWQeJPJ-m6tSWDJSakR2tpUHMc_yPU';

      const fileName = `${booking.booking_no}-${Date.now()}.${file.name.split('.').pop()}`;
      const sb = window.supabase.createClient(supabaseUrl, anonKey);

      const { error: upErr } = await sb.storage.from('slips').upload(fileName, file, {
        cacheControl: '3600', upsert: false,
      });
      if (upErr) throw upErr;

      const { data: pub } = sb.storage.from('slips').getPublicUrl(fileName);
      const slipUrl = pub.publicUrl;

      // Update booking with slip url
      const resp = await fetch(`${API.booking}?id=${booking.id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          slip_url: slipUrl,
          slip_uploaded_at: new Date().toISOString(),
          status: 'slip_uploaded',
        }),
      });
      if (!resp.ok) throw new Error('Update failed');
      const updated = await resp.json();
      onUploadComplete(updated);
    } catch (e) {
      setError('Upload ไม่สำเร็จ: ' + (e.message || e));
    } finally {
      setUploading(false);
    }
  };

  return (
    <div className="space-y-5 pop">
      <div className="panel p-5 border-teal-500/40">
        <div className="flex items-center gap-2">
          <span className="text-2xl">✓</span>
          <div>
            <div className="font-display font-bold text-lg text-white">บันทึก booking เรียบร้อย</div>
            <div className="font-mono text-xs grad-text-gold">{booking.booking_no}</div>
          </div>
        </div>
      </div>

      <SectionTitle num="•" title="ชำระเงิน" sub="สแกน QR หรือโอนผ่าน PromptPay"/>

      <div className="panel p-6 text-center">
        <div className="text-xs font-mono text-slate-500 uppercase tracking-widest mb-2">PromptPay · ชัยวัฒน์ ภูวนนท์จิรกวิน</div>
        <div className="text-3xl font-display font-bold grad-text-gold mb-4">฿{fmtTHB(booking.amount)}</div>
        <div className="inline-block p-4 rounded-2xl bg-white">
          <canvas ref={qrRef}></canvas>
        </div>
        <div className="mt-3 font-mono text-xs text-slate-400">เบอร์ {PROMPTPAY_ID.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3')}</div>
        <div className="mt-2 text-xs text-slate-500">หรือโอนเข้า ธ.กสิกร · 745-2-61376-4 · ชัยวัฒน์ ภูวนนท์จิรกวิน</div>
      </div>

      <SectionTitle num="•" title="อัปโหลด Slip" sub="หลังโอนแล้ว · jpg/png/pdf · ≤ 5MB"/>

      <label className="panel p-8 block text-center cursor-pointer hover:border-gold-500/40 transition border-dashed">
        <input type="file" accept="image/*,.pdf" hidden onChange={(e) => { setSlipFile(e.target.files?.[0]); handleUpload(e.target.files?.[0]); }}/>
        <div className="text-4xl mb-2">{uploading ? '⏳' : '📎'}</div>
        <div className="font-display font-bold text-base text-white">
          {uploading ? 'กำลังอัปโหลด...' : 'คลิกเพื่อเลือกไฟล์ slip'}
        </div>
        <div className="text-xs text-slate-400 mt-1">jpg / png / pdf · ≤ 5MB</div>
      </label>
    </div>
  );
}
