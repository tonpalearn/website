const getSession = () => {

const getDeviceFP = () => {
  let fp = localStorage.getItem('tpl_book_fp');
  if (fp) return fp;
  const seed = `${navigator.userAgent}|${navigator.language}|${screen.width}x${screen.height}|${new Date().getTimezoneOffset()}`;
  let h = 0;
  for (let i=0;i<seed.length;i++) { h = ((h<<5)-h) + seed.charCodeAt(i); h |= 0; }
  fp = 'fp_' + Math.abs(h).toString(36);
  localStorage.setItem('tpl_book_fp', fp);
  return fp;
};
const detectSource = (referrer) => {
  if (!referrer) return 'direct';
  try {
    const host = new URL(referrer).hostname.toLowerCase();
    if (host.includes('facebook') || host.includes('fb.')) return 'facebook';
    if (host.includes('line')) return 'line';
    if (host.includes('google') || host.includes('youtube')) return 'google';
    if (host.includes('instagram')) return 'instagram';
    if (host.includes('tiktok')) return 'tiktok';
    if (host.includes('tonpalearn')) return 'internal';

  } catch { return 'direct'; }

// ──────────────────────────────────────────────
// PromptPay QR payload generator (EMV-compliant)
// id: phone (10 digits) or national ID (13 digits)
// amount: optional THB float
// Returns EMV payload string → render with qrcode lib
// ──────────────────────────────────────────────
const PROMPTPAY_ID = '0939149397'; // ต้น's PromptPay (ชัยวัฒน์)

function generatePromptPayPayload(id, amount) {
  const tlv = (tag, value) => tag + String(value.length).padStart(2,'0') + value;
  const target = String(id).replace(/[^0-9]/g, '');
  let typeTag, target15;
  if (target.length === 13) {
    typeTag = '02'; target15 = target;
  } else if (target.length === 10) {
    typeTag = '01'; target15 = '0066' + target.substring(1);
  } else {
    return null;
  }
  let payload = '';
  payload += tlv('00', '01');
  payload += tlv('01', amount ? '12' : '11');
  payload += tlv('29', tlv('00', 'A000000677010111') + tlv(typeTag, target15));
  payload += tlv('53', '764');
  if (amount) payload += tlv('54', Number(amount).toFixed(2));
  payload += tlv('58', 'TH');
  payload += '6304';
  // CRC16-CCITT-FALSE
  let crc = 0xFFFF;
  for (let i = 0; i < payload.length; i++) {
    crc ^= (payload.charCodeAt(i) << 8);
    for (let j = 0; j < 8; j++) {
      crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) : (crc << 1);
      crc &= 0xFFFF;
    }
  }
  return payload + crc.toString(16).toUpperCase().padStart(4, '0');
}

function PromptPayQR({ amount, size = 200 }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current || typeof window.qrcode !== 'function') return;
    const payload = generatePromptPayPayload(PROMPTPAY_ID, amount);
    if (!payload) return;
    const qr = window.qrcode(0, 'M');
    qr.addData(payload);
    qr.make();
    ref.current.innerHTML = qr.createSvgTag({ cellSize: 4, margin: 1, scalable: true });
    const svg = ref.current.querySelector('svg');
    if (svg) {
      svg.style.width = size + 'px';
      svg.style.height = size + 'px';
      svg.style.display = 'block';
      svg.style.background = '#fff';
      svg.style.borderRadius = '8px';
    }
  }, [amount, size]);
  return <div ref={ref} style={{ width: size, height: size, margin: '0 auto' }}/>;
}

function CohortCard({ cohort, onBook }) {
  const cardRef = React.useRef(null);
  const viewedRef = React.useRef(false);

  // Track view once when card enters viewport
  useEffect(() => {
    if (!cardRef.current) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting && !viewedRef.current) {
          viewedRef.current = true;
          track('cohort_view', { cohort_id: cohort.id, course_num: cohort.course_num });
          io.disconnect();
        }
      });
    }, { threshold: 0.4 });
    io.observe(cardRef.current);
    return () => io.disconnect();
  }, [cohort.id]);

  const seats = cohort.seats_taken || 0;
  const minConfirm = cohort.min_to_confirm || 4;
  const maxSeats = cohort.max_seats || 10;
  const isConfirmed = cohort.status === 'confirmed' || cohort.status === 'full' || seats >= minConfirm;
  const isFull = seats >= maxSeats;
  const isCancelled = cohort.status === 'cancelled';

  const ebActive = !!(cohort.early_bird_price_thb && cohort.early_bird_deadline && daysLeft(cohort.early_bird_deadline) > 0);
  const displayPrice = ebActive ? cohort.early_bird_price_thb : cohort.price_thb;

  const seatsToConfirm = Math.max(0, minConfirm - seats);
  const seatsRemaining = Math.max(0, maxSeats - seats);
  const progressPct = Math.min(100, (seats / minConfirm) * 100);

  return (
    <div ref={cardRef} className="glass glass-hover overflow-hidden flex flex-col">
      <div className="cohort-cover" style={cohort.cover_url ? { backgroundImage: `url(${cohort.cover_url})` } : {}}>

          <div className="absolute top-3 left-3 pill text-[10px]" style={{background:'rgba(230,184,75,0.20)', borderColor:'rgba(245,214,122,0.50)', color:'#F5D67A', zIndex:1}}>
            ⭐ ยอดนิยม
          </div>
        )}
        <div className="absolute top-3 right-3" style={{zIndex:1}}>
          {isCancelled && <span className="pill-status st-declined">❌ ยกเลิก</span>}

function PrivateTab({ onBook }) {
  const [courseNum, setCourseNum] = useState('02');
  const [format, setFormat] = useState('private');
  const [duration, setDuration] = useState(4);
  const [date, setDate] = useState(() => {
    const d = new Date();
    d.setDate(d.getDate() + 3);
    return d.toISOString().slice(0,10);
  });
  const [slots, setSlots] = useState([]);
  const [loading, setLoading] = useState(false);
  const [pickedSlot, setPickedSlot] = useState(null);

  const course = COURSES.find(c => c.num === courseNum);
  const price = course?.prices[format] || 0;

  useEffect(() => {
    setLoading(true);
    setPickedSlot(null);
    fetch(`/api/calendar-slots?date=${date}&duration=${duration}&buffer_hours=1`)
      .then(r => r.json())
      .then(data => setSlots(data.slots || []))
      .catch(() => setSlots([]))
      .finally(() => setLoading(false));
  }, [date, duration]);

  const proceed = () => {
    if (!pickedSlot) return;
    onBook({
      mode: 'private',
      course_num: courseNum,
      course_name: course.name,
      format,
      format_label: FORMATS.find(f => f.key === format)?.label,

      duration_hours: duration,
      preferred_date: date,
      preferred_time: pickedSlot.time,

  return (
    <section className="relative pb-16">
      <div className="max-w-5xl mx-auto px-4 sm:px-6">

              </select>
            </div>

            <div>
              <label className="lbl">Format</label>
              <div className="grid grid-cols-3 gap-1 p-0.5 rounded-lg glass-soft">
                {FORMATS.map(f => (

              ดำเนินการต่อ → ฿{fmtTHB(price)}

          </div>
        </div>
      </div>
    </section>
  );

function BookingModal({ payload, onClose }) {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({
    customer_name:'', customer_phone:'', customer_email:'', customer_company:'',
    num_attendees: 1,
  });
  const [slipFile, setSlipFile] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [bookingNo, setBookingNo] = useState(null);
  const [slipStatus, setSlipStatus] = useState('none'); // 'none' | 'uploaded' | 'storage_not_ready' | 'upload_failed'
  const [error, setError] = useState('');

  // Track modal open + step advances
  useEffect(() => { track('modal_open', { mode: payload.mode, cohort_id: payload.cohort_id, course_num: payload.course_num }); }, []);
  useEffect(() => {
    if (step > 1) track('step_advance', { step, mode: payload.mode, cohort_id: payload.cohort_id, course_num: payload.course_num });
  }, [step]);

  const submit = async () => {
    setSubmitting(true); setError('');
    try {
      const now = new Date();
      const yymm = String(now.getFullYear()).slice(2) + String(now.getMonth()+1).padStart(2,'0');
      const rand = Math.floor(Math.random() * 9999).toString().padStart(4,'0');
      const booking_no = `BOOK-${yymm}-${rand}`;

      let slip_url = null;
      let slipWarning = null;
      if (slipFile) {
        const fileName = `${booking_no}-${Date.now()}.${slipFile.name.split('.').pop()}`;
        const { error: upErr } = await sb.storage.from('slips').upload(fileName, slipFile);
        if (upErr) {
          // Graceful fallback — booking still saves, slip can be sent via LINE
          console.warn('Slip upload failed:', upErr.message);
          if (upErr.message?.toLowerCase().includes('bucket')) {
            slipWarning = 'storage_not_ready';
          } else {
            slipWarning = 'upload_failed';
          }
        } else {
          // Store filename (not full URL) — admin generates signed URL on demand.
          // Works for both private and public buckets · slip stays private.
          slip_url = fileName;
        }
      }

      const booking = {
        booking_no,
        status: slip_url ? 'slip_uploaded' : 'pending_payment',
        mode: payload.mode,
        customer_name: form.customer_name,
        customer_phone: form.customer_phone,
        customer_email: form.customer_email || null,
        customer_company: form.customer_company || null,
        course_num: payload.course_num,
        course_name: payload.course_name,
        format: payload.format,
        format_label: payload.format_label,
        hours: payload.hours,
        duration_hours: payload.duration_hours,
        num_attendees: form.num_attendees || 1,
        preferred_date: payload.preferred_date,
        preferred_time: payload.preferred_time,
        amount: payload.amount,
        payment_amount: payload.amount,
        is_early_bird: !!payload.is_early_bird,
        cohort_id: payload.cohort_id || null,
        slip_url,
        slip_uploaded_at: slip_url ? new Date().toISOString() : null,
      };

      const { error: insErr } = await sb.from('bookings').insert(booking);
      if (insErr) throw insErr;

      setBookingNo(booking_no);
      setSlipStatus(slip_url ? 'uploaded' : slipWarning || (slipFile ? 'upload_failed' : 'none'));
      track('submit_success', { mode: payload.mode, cohort_id: payload.cohort_id, course_num: payload.course_num, amount: payload.amount, has_slip: !!slip_url });
      setStep(4);
    } catch (e) {
      console.error(e);
      setError(e.message);
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-start justify-center pt-12 px-4 overflow-y-auto" onClick={onClose}>
      <div className="glass-strong max-w-2xl w-full my-8" onClick={e => e.stopPropagation()}>
        <div className="px-5 py-4 border-b border-white/10 flex items-center justify-between" style={{background:'rgba(8,8,15,0.95)', backdropFilter:'blur(20px)', borderTopLeftRadius:24, borderTopRightRadius:24}}>
          <h2 className="font-display font-bold text-lg grad-gold">
            {step === 1 && 'ข้อมูลผู้จอง'}
            {step === 2 && 'ชำระเงิน'}
            {step === 3 && 'อัพโหลดสลิป'}
            {step === 4 && '✓ จองสำเร็จ'}
          </h2>
          <button onClick={onClose} className="btn btn-ghost text-sm">✕</button>
        </div>

        <div className="p-5 max-h-[75vh] overflow-y-auto scrollable">
          {step === 1 && (
            <div className="space-y-3">
              <div className="glass-gold p-3 mb-3 text-xs">
                <div className="font-semibold text-white">{payload.course_name}</div>
                <div className="text-slate-300 mt-1">{payload.format_label} · {payload.duration_hours || payload.hours} ชม. · ฿{fmtTHB(payload.amount)}</div>
                {payload.is_early_bird && <div className="text-red-300 mt-1">🔥 Early Bird ราคาพิเศษ</div>}
                <div className="text-[10px] text-slate-400 mt-1">📅 {fmtDate(payload.preferred_date)} · {payload.preferred_time}</div>
              </div>

              <div><label className="lbl">ชื่อ-สกุล *</label><input className="inp" value={form.customer_name} onChange={e => setForm({...form, customer_name: e.target.value})}/></div>
              <div><label className="lbl">เบอร์โทร *</label><input className="inp" value={form.customer_phone} onChange={e => setForm({...form, customer_phone: e.target.value})}/></div>
              <div><label className="lbl">Email</label><input className="inp" type="email" value={form.customer_email} onChange={e => setForm({...form, customer_email: e.target.value})}/></div>
              <div><label className="lbl">บริษัท (optional)</label><input className="inp" value={form.customer_company} onChange={e => setForm({...form, customer_company: e.target.value})}/></div>

              <button onClick={() => setStep(2)} disabled={!form.customer_name || !form.customer_phone} className="btn btn-gold w-full justify-center mt-3"

function App() {
  const url = new URLSearchParams(location.search);
  const [mode, setMode] = useState(url.get('mode') || 'public');
  const [cohorts, setCohorts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [bookingPayload, setBookingPayload] = useState(null);

  // Page view + tab switch tracking
  useEffect(() => {
    if (!trackInited) { track('page_view', { mode }); trackInited = true; }
  }, []);
  useEffect(() => {
    if (trackInited) track('tab_switch', { mode });
    const u = new URL(location.href);
    u.searchParams.set('mode', mode);
    history.replaceState(null, '', u);
  }, [mode]);

  useEffect(() => {
    (async () => {
      const { data } = await sb.from('public_cohorts').select('*')
        .eq('is_published', true)
        .gte('start_date', new Date().toISOString().slice(0,10))
        .order('start_date');
      setCohorts(data || []);
      setLoading(false);
    })();
  }, []);

  const handlePublicBook = (cohort, price, isEB) => {
    track('cohort_click', { cohort_id: cohort.id, course_num: cohort.course_num, price, is_early_bird: isEB });
    setBookingPayload({
      mode: 'public_cohort',
      cohort_id: cohort.id,
      course_num: cohort.course_num,
      course_name: cohort.title || cohort.course_name,
      format: cohort.format,
      format_label: cohort.format_label,
      hours: cohort.duration_hours,
      duration_hours: cohort.duration_hours,
      preferred_date: cohort.start_date,
      preferred_time: cohort.start_time,
      amount: price,
      is_early_bird: isEB,
    });
  };

  return (
    <>
      <Nav/>
      <ClassroomMarquee/>
      <Hero mode={mode} setMode={setMode}/>
      {mode === 'public' ? (
        <PublicTab cohorts={cohorts} loading={loading} onBook={handlePublicBook}/>
      ) : (
        <PrivateTab onBook={(p) => { track('private_book_click', { course_num: p.course_num, format: p.format, amount: p.amount }); setBookingPayload(p); }}/>
      )}
      <Testimonials/>
      <Footer/>
      {bookingPayload && <BookingModal payload={bookingPayload} onClose={() => setBookingPayload(null)}/>}
    </>
  );
}
