<script type="text/babel" data-presets="env,react">

const FORMATS = [
  { key: 'vdo',     label: 'VDO (เรียนเอง)' },
  { key: 'group',   label: 'Online Group' },
  { key: 'private', label: 'Online 1:1' },
  { key: 'onsite',  label: 'On-site' },
];

// ──────────────────────────────────────────────────────────
// Defaults
// ──────────────────────────────────────────────────────────
const DEFAULT_SETTINGS = {
  vendorName: '',
  vendorTaxId: '',
  vendorPhone: '',
  vendorEmail: '',
  vendorAddress: '',
  bankName: '',
  bankAccount: '',
  bankAccountName: '',
  defaultWHT: 3,
  signatureName: '',
};

const DEFAULT_CUSTOMER = {
  custType: 'individual', // 'individual' | 'company'
  custName: '',
  custTaxId: '',
  custAddress: '',
  custPhone: '',
  custContact: '',
};

const DEFAULT_TERMS = `ชำระ 50% เพื่อยืนยันการจอง · ชำระ 50% หลังเรียนจบ`;

// ──────────────────────────────────────────────────────────
// Helpers
// ──────────────────────────────────────────────────────────
const fmtTHB = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return Number(n).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
};
const todayISO = () => new Date().toISOString().slice(0, 10);
const plusDays = (iso, days) => {
  const d = new Date(iso); d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
};
const formatThaiDate = (iso) => {
  if (!iso) return '-';
  const d = new Date(iso);
  const monthsTH = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  return `${d.getDate()} ${monthsTH[d.getMonth()]} ${d.getFullYear() + 543}`;
};
const genQuoteNo = (existing = []) => {
  const now = new Date();
  const yymm = String(now.getFullYear()).slice(2) + String(now.getMonth() + 1).padStart(2, '0');
  const sameMonth = existing.filter(q => q.no?.startsWith(`TPL-${yymm}-`)).length;
  const nnn = String(sameMonth + 1).padStart(3, '0');
  return `TPL-${yymm}-${nnn}`;
};

const numToThaiBaht = (num) => {
  if (num === 0 || num === null || isNaN(num)) return 'ศูนย์บาทถ้วน';
  const txt = ['ศูนย์', 'หนึ่ง', 'สอง', 'สาม', 'สี่', 'ห้า', 'หก', 'เจ็ด', 'แปด', 'เก้า', 'สิบ'];
  const places = ['', 'สิบ', 'ร้อย', 'พัน', 'หมื่น', 'แสน', 'ล้าน'];
  const readNum = (n) => {
    n = Math.floor(n);
    if (n === 0) return '';
    if (n > 1000000) return readNum(Math.floor(n / 1000000)) + 'ล้าน' + readNum(n % 1000000);
    let s = '';
    const str = String(n);
    for (let i = 0; i < str.length; i++) {
      const d = parseInt(str[i]);
      const pos = str.length - i - 1;
      if (d === 0) continue;
      if (pos === 0 && d === 1 && str.length > 1) s += 'เอ็ด';
      else if (pos === 1 && d === 2) s += 'ยี่';
      else if (pos === 1 && d === 1) s += '';
      else s += txt[d];
      if (pos > 0) s += places[pos];
    }
    return s;
  };
  const baht = Math.floor(num);
  const satang = Math.round((num - baht) * 100);
  let result = readNum(baht) + 'บาท';
  if (satang > 0) result += readNum(satang) + 'สตางค์';
  else result += 'ถ้วน';
  return result;
};

// ──────────────────────────────────────────────────────────
// Icons
// ──────────────────────────────────────────────────────────
const Icon = {
  Plus:    (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M12 5v14M5 12h14"/></svg>,
  Trash:   (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>,
  Settings:(p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  Download:(p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>,

  Print:   (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
  Save:    (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
  History: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>,

  Chevron: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="m6 9 6 6 6-6"/></svg>,
  X:       (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M18 6 6 18M6 6l12 12"/></svg>,
  Copy:    (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,

// ──────────────────────────────────────────────────────────
// Storage
// ──────────────────────────────────────────────────────────
const KEY_SETTINGS = 'tpl_quotation_settings_v1';
const KEY_HISTORY  = 'tpl_quotation_history_v1';
const KEY_DRAFT    = 'tpl_quotation_draft_v1';

const loadJSON = (key, fallback) => {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
};
const saveJSON = (key, value) => { try { localStorage.setItem(key, JSON.stringify(value)); } catch {} };

// ──────────────────────────────────────────────────────────
// MAIN APP
// ──────────────────────────────────────────────────────────
function App() {
  const [settings, setSettings] = useState(() => ({ ...DEFAULT_SETTINGS, ...loadJSON(KEY_SETTINGS, {}) }));
  const [history, setHistory] = useState(() => loadJSON(KEY_HISTORY, []));

  const draft = loadJSON(KEY_DRAFT, null);
  const [quoteNo, setQuoteNo]   = useState(draft?.quoteNo || genQuoteNo(loadJSON(KEY_HISTORY, [])));
  const [issueDate, setIssueDate] = useState(draft?.issueDate || todayISO());
  const [validDays, setValidDays] = useState(draft?.validDays ?? 30);
  const [customer, setCustomer]   = useState(draft?.customer || { ...DEFAULT_CUSTOMER });
  const [items, setItems]         = useState(draft?.items || []);
  const [discounts, setDiscounts] = useState(draft?.discounts || []);
  const [useWHT, setUseWHT]       = useState(draft?.useWHT ?? false);
  const [whtRate, setWhtRate]     = useState(draft?.whtRate ?? 3);
  const [terms, setTerms]         = useState(draft?.terms || DEFAULT_TERMS);
  const [notes, setNotes]         = useState(draft?.notes || '');

  const [showSettings, setShowSettings] = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  const [toast, setToast] = useState('');
  const [zoom, setZoom] = useState(0.78);

  const validUntil = useMemo(() => plusDays(issueDate, parseInt(validDays) || 30), [issueDate, validDays]);

  // Auto-save draft
  useEffect(() => {
    saveJSON(KEY_DRAFT, { quoteNo, issueDate, validDays, customer, items, discounts, useWHT, whtRate, terms, notes });
  }, [quoteNo, issueDate, validDays, customer, items, discounts, useWHT, whtRate, terms, notes]);

  useEffect(() => { saveJSON(KEY_SETTINGS, settings); }, [settings]);

  // Auto-toggle WHT when customer type changes
  useEffect(() => {
    if (customer.custType === 'company') setUseWHT(true);
  }, [customer.custType]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2200); };

  // ─── Items ───
  const addCourseItem = (courseNum, formatKey) => {
    const c = COURSES.find(c => c.num === courseNum);
    if (!c) return;
    const fmt = FORMATS.find(f => f.key === formatKey);
    setItems([...items, {
      id: Date.now() + Math.random(),
      type: 'course',
      name: `Course ${c.num} · ${c.name} (${fmt.label})`,
      desc: c.desc + ` · ${c.hrs}`,
      qty: 1,
      unit: 'คน',
      price: c.prices[formatKey] || 0,
      discountPct: 0,
    }]);
  };
  const addCustomItem = () => {
    setItems([...items, {
      id: Date.now() + Math.random(),
      type: 'custom',
      name: '',
      desc: '',
      qty: 1,
      unit: 'รายการ',
      price: 0,
      discountPct: 0,
    }]);
  };
  const updateItem = (id, patch) => setItems(items.map(it => it.id === id ? { ...it, ...patch } : it));
  const removeItem = (id) => setItems(items.filter(it => it.id !== id));
  const moveItem = (id, dir) => {
    const idx = items.findIndex(it => it.id === id);
    if (idx < 0) return;
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= items.length) return;
    const copy = [...items];
    [copy[idx], copy[newIdx]] = [copy[newIdx], copy[idx]];
    setItems(copy);
  };

  // ─── Discounts ───
  const addDiscount = () => setDiscounts([...discounts, { id: Date.now() + Math.random(), label: '', pct: 0, amount: 0, mode: 'pct' }]);
  const updateDiscount = (id, patch) => setDiscounts(discounts.map(d => d.id === id ? { ...d, ...patch } : d));
  const removeDiscount = (id) => setDiscounts(discounts.filter(d => d.id !== id));

  // ─── Totals ───
  const totals = useMemo(() => {
    const lineTotals = items.map(it => {
      const sub = (Number(it.qty) || 0) * (Number(it.price) || 0);
      const disc = sub * ((Number(it.discountPct) || 0) / 100);
      return { sub, disc, net: sub - disc };
    });
    const subtotal = lineTotals.reduce((s, l) => s + l.sub, 0);
    const lineDisc = lineTotals.reduce((s, l) => s + l.disc, 0);
    const afterLine = subtotal - lineDisc;

    let extraDisc = 0;
    discounts.forEach(d => {
      if (d.mode === 'pct') extraDisc += afterLine * ((Number(d.pct) || 0) / 100);
      else extraDisc += Number(d.amount) || 0;
    });

    const net = afterLine - extraDisc;
    const wht = useWHT ? (net * (Number(whtRate) || 0) / 100) : 0;
    const grand = net;            // ราคาในใบเสนอราคา = net (ก่อนหัก WHT)
    const toPay = net - wht;      // ยอดที่ลูกค้าโอนจริง

    return { subtotal, lineDisc, afterLine, extraDisc, net, wht, grand, toPay, lineTotals };
  }, [items, discounts, useWHT, whtRate]);

  // ─── Actions ───
  const saveToHistory = () => {
    const snapshot = {
      no: quoteNo, issueDate, validDays, validUntil,
      customer, items, discounts, useWHT, whtRate, terms, notes,
      totals: { net: totals.net, wht: totals.wht, toPay: totals.toPay },
      savedAt: Date.now(),
    };
    const existing = history.filter(h => h.no !== quoteNo);
    const next = [snapshot, ...existing].slice(0, 50);
    setHistory(next);
    saveJSON(KEY_HISTORY, next);
    showToast('✓ บันทึก ' + quoteNo + ' แล้ว');
  };

  const loadFromHistory = (q) => {
    setQuoteNo(q.no);
    setIssueDate(q.issueDate);
    setValidDays(q.validDays);
    setCustomer(q.customer);
    setItems(q.items);
    setDiscounts(q.discounts);
    setUseWHT(q.useWHT);
    setWhtRate(q.whtRate);
    setTerms(q.terms);
    setNotes(q.notes || '');
    setShowHistory(false);
    showToast('โหลด ' + q.no + ' แล้ว');
  };

  const deleteFromHistory = (no) => {
    const next = history.filter(h => h.no !== no);
    setHistory(next);
    saveJSON(KEY_HISTORY, next);
  };

  const resetAll = () => {
    if (!confirm('ล้างฟอร์มและสร้างใบเสนอราคาใหม่?')) return;
    setQuoteNo(genQuoteNo(history));
    setIssueDate(todayISO());
    setValidDays(30);
    setCustomer({ ...DEFAULT_CUSTOMER });
    setItems([]);
    setDiscounts([]);
    setUseWHT(false);
    setWhtRate(settings.defaultWHT);
    setTerms(DEFAULT_TERMS);
    setNotes('');
    showToast('ล้างฟอร์มแล้ว');
  };

  // ─── Export ───
  // Warm up all font weights/sizes used in A4 paper — ensure Google Fonts loaded before capture
  const warmUpFonts = async () => {
    const fontsToLoad = [
      '300 12px "Sarabun"',
      '400 12px "Sarabun"',
      '500 12px "Sarabun"',
      '600 12px "Sarabun"',
      '700 12px "Sarabun"',
      '700 14px "Sarabun"',
      '700 24px "Sarabun"',
      '400 24px "Space Grotesk"',
      '700 24px "Space Grotesk"',
      '700 30px "Space Grotesk"',
    ];
    await Promise.all(fontsToLoad.map(f => document.fonts.load(f).catch(() => null)));
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 250));
  };

  // html-to-image options — SVG foreignObject render (handles Thai script properly)
  // captureSize() returns scroll width/height which includes any overflow
  const captureSize = () => {
    const el = document.querySelector('.a4-paper');
    return {
      width:  el ? Math.max(el.scrollWidth, el.offsetWidth, 794) : 794,
      height: el ? Math.max(el.scrollHeight, el.offsetHeight)    : 1123,
    };
  };
  const imgOptions = () => ({
    pixelRatio: 2,
    backgroundColor: '#ffffff',
    cacheBust: true,
    ...captureSize(),
    style: { transform: 'none', margin: '0', boxShadow: 'none' },
    skipFonts: false,
  });

  const exportPDF = async () => {
    showToast('กำลังเตรียมฟอนต์...');
    await warmUpFonts();
    showToast('กำลังสร้าง PDF...');
    const el = document.querySelector('.a4-paper');
    const orig = { transform: el.style.transform };
    el.style.transform = 'none';
    try {
      // 2-pass capture (first warms font cache · second renders)
      await htmlToImage.toPng(el, imgOptions());
      const dataUrl = await htmlToImage.toPng(el, imgOptions());

      // Get image dimensions to compute multi-page split
      const img = new Image();
      img.src = dataUrl;
      await new Promise(r => { img.onload = r; });

      const A4_W = 210, A4_H = 297; // mm
      const imgW = A4_W;
      const imgH = (img.height * A4_W) / img.width; // scale to fit A4 width

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });

      let heightLeft = imgH;
      let position = 0;
      pdf.addImage(dataUrl, 'PNG', 0, position, imgW, imgH);
      heightLeft -= A4_H;
      while (heightLeft > 0.5) {
        position -= A4_H;
        pdf.addPage();
        pdf.addImage(dataUrl, 'PNG', 0, position, imgW, imgH);
        heightLeft -= A4_H;
      }

      pdf.save(`${quoteNo}-${customer.custName || 'quotation'}.pdf`);
      showToast('✓ Export PDF แล้ว');
    } catch (err) {
      console.error(err);
      showToast('Export ไม่สำเร็จ — ลองกด Print แทน');
    } finally {
      el.style.transform = orig.transform;
    }
  };

  const exportPNG = async () => {
    showToast('กำลังเตรียมฟอนต์...');
    await warmUpFonts();
    showToast('กำลังสร้างรูป...');
    const el = document.querySelector('.a4-paper');
    const orig = { transform: el.style.transform };
    el.style.transform = 'none';
    try {
      await htmlToImage.toPng(el, imgOptions());
      const dataUrl = await htmlToImage.toPng(el, imgOptions());
      const link = document.createElement('a');
      link.download = `${quoteNo}-${customer.custName || 'quotation'}.png`;
      link.href = dataUrl;
      link.click();
      showToast('✓ Export PNG แล้ว');
    } catch (err) {
      console.error(err);
      showToast('Export ไม่สำเร็จ — ลองกด Print แทน');
    } finally {
      el.style.transform = orig.transform;
    }
  };

  return (
    <div className="min-h-screen mesh-bg">
      {/* Top toolbar */}
      <Toolbar
        quoteNo={quoteNo}
        onSettings={() => setShowSettings(!showSettings)}
        onHistory={() => setShowHistory(true)}
        onSave={saveToHistory}
        onPNG={exportPNG}
        onPDF={exportPDF}
        onPrint={() => window.print()}
        onReset={resetAll}
        zoom={zoom}
        onZoom={setZoom}
      />

      {/* Settings drawer */}
      {showSettings && (
        <SettingsPanel
          settings={settings}
          setSettings={setSettings}
          onClose={() => setShowSettings(false)}
        />
      )}

      {/* History drawer */}
      {showHistory && (
        <HistoryDrawer
          history={history}
          onLoad={loadFromHistory}
          onDelete={deleteFromHistory}
          onClose={() => setShowHistory(false)}
        />
      )}

      <div className="mx-auto max-w-[1500px] px-4 py-5 grid grid-cols-12 gap-5">
        {/* LEFT — Form */}
        <div className="col-span-12 lg:col-span-5 xl:col-span-4 scrollable" style={{ maxHeight: 'calc(100vh - 84px)', overflowY: 'auto', paddingRight: 8 }}>
          <FormPanel
            quoteNo={quoteNo} setQuoteNo={setQuoteNo}
            issueDate={issueDate} setIssueDate={setIssueDate}
            validDays={validDays} setValidDays={setValidDays}
            customer={customer} setCustomer={setCustomer}
            items={items} updateItem={updateItem} removeItem={removeItem} moveItem={moveItem}
            addCourseItem={addCourseItem} addCustomItem={addCustomItem}
            discounts={discounts} addDiscount={addDiscount} updateDiscount={updateDiscount} removeDiscount={removeDiscount}
            useWHT={useWHT} setUseWHT={setUseWHT} whtRate={whtRate} setWhtRate={setWhtRate}
            terms={terms} setTerms={setTerms}
            notes={notes} setNotes={setNotes}
            totals={totals}
          />
        </div>

        {/* RIGHT — A4 Preview */}
        <div className="col-span-12 lg:col-span-7 xl:col-span-8">
          <div className="scrollable" style={{ maxHeight: 'calc(100vh - 84px)', overflowY: 'auto' }}>
            <div className="flex justify-center pb-10">
              <div className="preview-zoom" style={{ transform: `scale(${zoom})` }}>
                <A4Preview
                  settings={settings}
                  quoteNo={quoteNo}
                  issueDate={issueDate}
                  validUntil={validUntil}
                  customer={customer}
                  items={items}
                  discounts={discounts}
                  useWHT={useWHT}
                  whtRate={whtRate}
                  terms={terms}
                  notes={notes}
                  totals={totals}
                />
              </div>
            </div>
          </div>
        </div>
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

      <Section title={`ส่วนลดเพิ่มเติม (${discounts.length})`}>
        <button onClick={addDiscount} className="btn btn-ghost w-full justify-center mb-2 text-xs">
          <Icon.Plus className="w-3.5 h-3.5"/> เพิ่มส่วนลด (Early Bird / Alumni / Group)
        </button>
        {discounts.map(d => (
          <div key={d.id} className="panel p-3 mb-2 bg-white/[0.02]">
            <div className="grid grid-cols-12 gap-2 items-end">
              <div className="col-span-6"><label className="lbl">ชื่อส่วนลด</label><input className="inp text-sm" value={d.label} onChange={e => updateDiscount(d.id, { label: e.target.value })} placeholder="Early Bird / Alumni / ส่วนลดทีม"/></div>
              <div className="col-span-2"><label className="lbl">โหมด</label>
                <select className="inp text-sm" value={d.mode} onChange={e => updateDiscount(d.id, { mode: e.target.value })}>
                  <option value="pct" className="bg-ink-900">%</option>
                  <option value="amt" className="bg-ink-900">฿</option>
                </select>
              </div>
              <div className="col-span-3">
                <label className="lbl">{d.mode === 'pct' ? 'เปอร์เซ็นต์' : 'จำนวน'}</label>
                <input className="inp text-sm text-right" type="number" value={d.mode === 'pct' ? d.pct : d.amount} onChange={e => updateDiscount(d.id, d.mode === 'pct' ? { pct: e.target.value } : { amount: e.target.value })}/>
              </div>
              <div className="col-span-1"><button onClick={() => removeDiscount(d.id)} className="btn btn-ghost btn-danger w-full justify-center"><Icon.Trash className="w-4 h-4"/></button></div>
            </div>
          </div>
        ))}
      </Section>

      {/* WHT */}
      <Section title="ภาษีหัก ณ ที่จ่าย">
        <div className="flex items-center gap-3">
          <label className="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" checked={useWHT} onChange={e => setUseWHT(e.target.checked)} className="w-4 h-4 accent-gold-500"/>
            <span className="text-sm">ลูกค้าจะหัก ณ ที่จ่าย</span>
          </label>
          <input type="number" className="inp w-20 text-right" value={whtRate} onChange={e => setWhtRate(e.target.value)} disabled={!useWHT}/>
          <span className="text-sm text-slate-400">%</span>
        </div>
        <div className="text-xs text-slate-500 mt-2">เปิดอัตโนมัติเมื่อเลือกประเภท "นิติบุคคล"</div>
      </Section>

      {/* Terms & Notes */}
      <Section title="เงื่อนไขชำระเงิน">
        <textarea rows="2" className="inp text-sm" value={terms} onChange={e => setTerms(e.target.value)}/>
      </Section>

      <Section title="หมายเหตุเพิ่มเติม (Optional)">
        <textarea rows="3" className="inp text-sm" value={notes} onChange={e => setNotes(e.target.value)} placeholder="เช่น สถานที่สอน, อุปกรณ์ที่ใช้, วันที่นัดหมาย ฯลฯ"/>
      </Section>

      {/* Mini totals */}
      <Section title="ยอดสรุป (Preview)">
        <div className="space-y-1.5 text-sm font-mono">
          <Row k="ราคารวม" v={fmtTHB(totals.subtotal)}/>
          {totals.lineDisc > 0 && <Row k="หักส่วนลดในรายการ" v={'-' + fmtTHB(totals.lineDisc)} red/>}
          {totals.extraDisc > 0 && <Row k="หักส่วนลดเพิ่มเติม" v={'-' + fmtTHB(totals.extraDisc)} red/>}
          <Row k="ยอดสุทธิ" v={fmtTHB(totals.net)} bold/>
          {useWHT && <Row k={`หัก ณ ที่จ่าย ${whtRate}%`} v={'-' + fmtTHB(totals.wht)} red/>}
          {useWHT && <Row k="ยอดโอนจริง" v={fmtTHB(totals.toPay)} bold gold/>}
        </div>
      </Section>
    </div>
  );
}

function Section({ title, children }) {
  return (
    <div className="panel p-4">
      <div className="text-xs font-semibold gradient-text-gold-dark uppercase tracking-widest mb-3 font-display">{title}</div>
      {children}
    </div>
  );
}

function Row({ k, v, bold, gold, red }) {
  return (
    <div className="flex justify-between items-center">
      <span className={`text-slate-400 ${bold ? 'text-white font-bold' : ''}`}>{k}</span>
      <span className={`${bold ? 'text-white font-bold text-base' : ''} ${gold ? 'gradient-text-gold-dark' : ''} ${red ? 'text-red-400' : ''}`}>{v}</span>
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// ITEM ROW
// ──────────────────────────────────────────────────────────
function ItemRow({ item, idx, total, update, remove, move }) {
  const sub = (Number(item.qty) || 0) * (Number(item.price) || 0);
  const disc = sub * ((Number(item.discountPct) || 0) / 100);
  const net = sub - disc;

  return (
    <div className="panel p-3 bg-white/[0.02]">
      <div className="flex items-start gap-2">
        <div className="flex flex-col gap-1">
          <button onClick={() => move(-1)} disabled={idx === 0} className="text-slate-500 hover:text-white disabled:opacity-20 text-xs">▲</button>
          <span className="text-xs font-mono text-slate-500 text-center">{idx + 1}</span>
          <button onClick={() => move(1)} disabled={idx === total - 1} className="text-slate-500 hover:text-white disabled:opacity-20 text-xs">▼</button>
        </div>
        <div className="flex-1 space-y-2">
          <input className="inp text-sm font-semibold" value={item.name} onChange={e => update({ name: e.target.value })} placeholder="ชื่อรายการ"/>
          <textarea rows="2" className="inp text-xs" value={item.desc} onChange={e => update({ desc: e.target.value })} placeholder="รายละเอียด"/>
          <div className="grid grid-cols-12 gap-1.5">
            <div className="col-span-2">
              <label className="lbl">จน.</label>
              <input className="inp text-sm text-center" type="number" value={item.qty} onChange={e => update({ qty: e.target.value })}/>
            </div>
            <div className="col-span-2">
              <label className="lbl">หน่วย</label>
              <input className="inp text-sm" value={item.unit} onChange={e => update({ unit: e.target.value })}/>
            </div>
            <div className="col-span-4">
              <label className="lbl">ราคา/หน่วย</label>
              <input className="inp text-sm text-right font-mono" type="number" value={item.price} onChange={e => update({ price: e.target.value })}/>
            </div>
            <div className="col-span-2">
              <label className="lbl">ลด %</label>
              <input className="inp text-sm text-right" type="number" value={item.discountPct} onChange={e => update({ discountPct: e.target.value })}/>
            </div>
            <div className="col-span-2 flex items-end">
              <button onClick={remove} className="btn btn-ghost btn-danger w-full justify-center"><Icon.Trash className="w-4 h-4"/></button>
            </div>
          </div>
          <div className="text-xs text-right text-slate-400 pt-1 border-t border-white/5">
            รวม: <span className="gradient-text-gold-dark font-bold font-mono">฿{fmtTHB(net)}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// A4 PREVIEW (จะถูก capture เป็น PDF/PNG)
// ──────────────────────────────────────────────────────────
function A4Preview({ settings, quoteNo, issueDate, validUntil, customer, items, discounts, useWHT, whtRate, terms, notes, totals }) {
  return (
    <div className="a4-paper">
      {/* HEADER */}
      <div className="flex items-start justify-between gap-4 pb-4 border-b-2 border-gray-900">
        <div className="min-w-0">
          <div className="font-bold text-3xl tracking-tight whitespace-nowrap" style={{ fontFamily: "'Space Grotesk', sans-serif" }}>
            <span className="text-gray-900">TON</span>
            <span className="gradient-text-gold">PA</span>
            <span className="gradient-text-teal">LEARN</span>
          </div>
          <div className="text-[10px] text-gray-500 mt-0.5 tracking-wide" style={{ fontFamily: "'Sarabun', sans-serif" }}>AI ง่ายขึ้น เมื่อมีต้นพาไป</div>
        </div>
        <div className="text-right flex-shrink-0">
          <div className="font-bold text-2xl text-gray-900 whitespace-nowrap" style={{ fontFamily: "'Sarabun', sans-serif", letterSpacing: '-0.01em' }}>ใบเสนอราคา</div>
          <div className="text-[10px] text-gray-500 tracking-widest whitespace-nowrap" style={{ fontFamily: "'Space Grotesk', sans-serif" }}>QUOTATION</div>
        </div>
      </div>

      {/* META */}
      <div className="grid grid-cols-3 gap-4 mt-4 text-[10px]">
        <div>
          <div className="text-gray-500">เลขที่ / No.</div>
          <div className="font-bold text-gray-900 font-mono text-[12px]">{quoteNo}</div>
        </div>
        <div>
          <div className="text-gray-500">วันที่ออก / Date</div>
          <div className="font-semibold text-gray-900 text-[11px]">{formatThaiDate(issueDate)}</div>
        </div>
        <div>
          <div className="text-gray-500">ยืนราคาถึง / Valid Until</div>
          <div className="font-semibold text-gray-900 text-[11px]">{formatThaiDate(validUntil)}</div>
        </div>
      </div>

      {/* FROM / TO */}
      <div className="grid grid-cols-2 gap-4 mt-5">
        <div className="border border-line p-3 rounded-md" style={{ background: '#FAFAF7' }}>
          <div className="text-[9px] text-gray-500 tracking-widest font-bold uppercase mb-1.5">จาก · From</div>
          <div className="font-bold text-[12px] text-gray-900">{settings.vendorName}</div>
          <div className="text-[10px] text-gray-700 leading-relaxed mt-1 whitespace-pre-line">
            {settings.vendorAddress || <span className="text-gray-400 italic">[กรุณาแก้ที่อยู่ใน Settings]</span>}
          </div>
          <div className="text-[10px] text-gray-700 mt-1.5 space-y-0.5">
            <div>เลขผู้เสียภาษี: <span className="font-mono font-semibold">{settings.vendorTaxId}</span></div>
            <div>โทร: <span className="font-mono">{settings.vendorPhone}</span></div>
            {settings.vendorEmail && <div>Email: {settings.vendorEmail}</div>}
          </div>
        </div>
        <div className="border border-line p-3 rounded-md" style={{ background: '#FAFAF7' }}>
          <div className="text-[9px] text-gray-500 tracking-widest font-bold uppercase mb-1.5">ถึง · To</div>
          {customer.custName ? (
            <>
              <div className="font-bold text-[12px] text-gray-900">{customer.custName}</div>
              {customer.custAddress && <div className="text-[10px] text-gray-700 leading-relaxed mt-1 whitespace-pre-line">{customer.custAddress}</div>}
              <div className="text-[10px] text-gray-700 mt-1.5 space-y-0.5">
                {customer.custTaxId && <div>เลขผู้เสียภาษี: <span className="font-mono">{customer.custTaxId}</span></div>}
                {customer.custPhone && <div>โทร: <span className="font-mono">{customer.custPhone}</span></div>}
                {customer.custContact && <div>ผู้ติดต่อ: {customer.custContact}</div>}
              </div>
            </>
          ) : (
            <div className="text-[11px] text-gray-400 italic">[กรุณากรอกข้อมูลลูกค้า]</div>
          )}
        </div>
      </div>

      {/* ITEMS TABLE */}
      <div className="mt-5">
        <table className="w-full text-[10px] border-collapse">
          <thead>
            <tr style={{ background: 'linear-gradient(135deg, #1a1a2a, #0D0D14)', color: '#F5D67A' }}>
              <th className="py-2 px-2 text-center w-8 font-bold tracking-wider">#</th>
              <th className="py-2 px-2 text-left font-bold tracking-wider">รายการ / Description</th>
              <th className="py-2 px-2 text-center w-14 font-bold tracking-wider">จำนวน</th>
              <th className="py-2 px-2 text-right w-20 font-bold tracking-wider">ราคา/หน่วย</th>
              <th className="py-2 px-2 text-right w-14 font-bold tracking-wider">ลด</th>
              <th className="py-2 px-2 text-right w-24 font-bold tracking-wider">รวม (THB)</th>
            </tr>
          </thead>
          <tbody>
            {items.length === 0 && (
              <tr><td colSpan="6" className="text-center py-8 text-gray-400 italic border border-line">[ยังไม่มีรายการ]</td></tr>
            )}
            {items.map((it, idx) => {
              const sub = (Number(it.qty) || 0) * (Number(it.price) || 0);
              const disc = sub * ((Number(it.discountPct) || 0) / 100);
              const net = sub - disc;
              return (
                <tr key={it.id} className="border-b border-line align-top">
                  <td className="py-2.5 px-2 text-center text-gray-600 font-mono">{idx + 1}</td>
                  <td className="py-2.5 px-2">
                    <div className="font-semibold text-gray-900">{it.name || <span className="text-gray-400 italic">(ไม่ระบุ)</span>}</div>
                    {it.desc && <div className="text-[9px] text-gray-600 mt-0.5 leading-snug">{it.desc}</div>}
                  </td>
                  <td className="py-2.5 px-2 text-center text-gray-700">{it.qty} {it.unit}</td>
                  <td className="py-2.5 px-2 text-right font-mono text-gray-700">{fmtTHB(it.price)}</td>
                  <td className="py-2.5 px-2 text-right font-mono text-gray-600">{it.discountPct > 0 ? `${it.discountPct}%` : '-'}</td>
                  <td className="py-2.5 px-2 text-right font-mono font-bold text-gray-900">{fmtTHB(net)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* TOTALS */}
      <div className="mt-4 flex justify-end">
        <div className="w-[55%] text-[11px]">
          <div className="space-y-1">
            <PreviewRow label="ราคารวม / Subtotal" value={fmtTHB(totals.subtotal)}/>
            {totals.lineDisc > 0 && <PreviewRow label="หักส่วนลดในรายการ" value={'-' + fmtTHB(totals.lineDisc)} red/>}
            {discounts.map(d => {
              const v = d.mode === 'pct'
                ? totals.afterLine * ((Number(d.pct) || 0) / 100)
                : Number(d.amount) || 0;
              if (v === 0 && !d.label) return null;
              return <PreviewRow key={d.id} label={`หัก: ${d.label || 'ส่วนลด'} ${d.mode === 'pct' ? `(${d.pct}%)` : ''}`} value={'-' + fmtTHB(v)} red/>;
            })}
            <div className="border-t border-gray-300 pt-1">
              <PreviewRow label="ยอดสุทธิ / Net Total" value={fmtTHB(totals.net)} bold/>
            </div>
            {useWHT && totals.wht > 0 && (
              <>
                <PreviewRow label={`หัก ณ ที่จ่าย / WHT (${whtRate}%)`} value={'-' + fmtTHB(totals.wht)} red small/>
                <div className="border-t border-gray-400 pt-1">
                  <PreviewRow label="ยอดโอนจริง / Net Payable" value={fmtTHB(totals.toPay)} bold gold/>
                </div>
              </>
            )}
          </div>
          <div className="mt-2 pt-2 border-t border-gray-200 text-right text-[9px] text-gray-600 italic">
            ({numToThaiBaht(useWHT ? totals.toPay : totals.net)})
          </div>
        </div>
      </div>

      {/* PAYMENT TERMS + BANK */}
      <div className="mt-5 grid grid-cols-2 gap-3">
        <div className="border-l-4 p-3 rounded-r-md" style={{ background: 'linear-gradient(90deg, #FEF7E6, #FFFFFF)', borderColor: '#C8A84B' }}>
          <div className="text-[9px] text-gray-500 tracking-widest font-bold uppercase mb-1.5">เงื่อนไขชำระเงิน · Payment Terms</div>
          <div className="text-[10px] text-gray-800 leading-relaxed whitespace-pre-line">{terms}</div>
        </div>
        <div className="border-l-4 p-3 rounded-r-md" style={{ background: 'linear-gradient(90deg, #E6FAF7, #FFFFFF)', borderColor: '#14B8A6' }}>
          <div className="text-[9px] text-gray-500 tracking-widest font-bold uppercase mb-1.5">บัญชีรับเงิน · Bank Transfer</div>
          <div className="text-[10px] text-gray-800 space-y-0.5">
            <div className="font-semibold">{settings.bankName}</div>
            <div className="font-mono text-[12px] font-bold text-gray-900">{settings.bankAccount}</div>
            <div>{settings.bankAccountName}</div>
          </div>
        </div>
      </div>

      {/* NOTES */}
      {notes && (
        <div className="mt-3 text-[10px] text-gray-700 leading-relaxed border-t border-gray-200 pt-2">
          <span className="font-bold text-gray-600">หมายเหตุ: </span>{notes}
        </div>
      )}

      {/* SIGNATURE */}
      <div className="mt-8 grid grid-cols-2 gap-6 text-[10px]">
        <div className="text-center">
          <img
            src="/signature-ton.png"
            alt="Signature"
            className="mx-auto mb-1 object-contain"
            style={{ height: '40px', maxWidth: '180px' }}
            onError={(e) => { e.target.style.display='none'; }}
          />
          <div className="border-b border-gray-700 pb-0.5 mb-1"></div>
          <div className="text-gray-600">ผู้เสนอราคา</div>
          <div className="font-semibold text-gray-900 mt-0.5">({settings.signatureName})</div>
          <div className="text-gray-500 text-[9px] mt-0.5">วันที่: {formatThaiDate(issueDate)}</div>
        </div>
        <div className="text-center">
          <div className="border-b border-gray-700 pb-1 mb-1 h-10"></div>
          <div className="text-gray-600">ผู้อนุมัติ / ลูกค้า</div>
          <div className="font-semibold text-gray-900 mt-0.5">({customer.custName || '...........................'})</div>
          <div className="text-gray-500 text-[9px] mt-0.5">วันที่: ......./......./..........</div>
        </div>
      </div>

      {/* FOOTER */}
      <div className="absolute bottom-4 inset-x-0 text-center text-[8px] text-gray-400 tracking-widest">
        TONPALEARN · ใบเสนอราคานี้สร้างจากระบบ · {quoteNo}
      </div>
    </div>
  );
}

function PreviewRow({ label, value, bold, gold, red, small }) {
  return (
    <div className={`flex justify-between items-baseline ${small ? 'text-[10px]' : ''}`}>
      <span className={`${bold ? 'font-bold text-gray-900' : 'text-gray-700'}`}>{label}</span>
      <span className={`font-mono ${bold ? 'font-bold text-gray-900 text-[13px]' : 'text-gray-700'} ${gold ? 'gradient-text-gold' : ''} ${red ? 'text-red-700' : ''}`}>฿{value}</span>
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// MOUNT
// ──────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
