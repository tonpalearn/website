<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name List Builder — UP Wellness</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', sans-serif; box-sizing: border-box; }
    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    :root {
      --rose: #8C4C4C; --green: #396755; --mint: #BBEED6;
      --cream: #FFF8F7; --dark: #2C1810; --amber: #B8860B;
    }
  </style>
</head>
<body style="background:var(--cream); margin:0;">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── CONSTANTS ── */
const CATEGORIES = [
  { id:'family',   label:'ครอบครัว & ญาติ',    icon:'🏠', color:'#8C4C4C',
    triggers:['พ่อ แม่ พี่น้อง ลูกพี่ลูกน้อง','ญาติที่เจอในงานแต่งงาน/งานศพ','น้าอา ลุงป้า ที่ยังติดต่ออยู่'] },
  { id:'school',   label:'เพื่อนสมัยเรียน',     icon:'🎓', color:'#396755',
    triggers:['เพื่อนประถม มัธยม มหาวิทยาลัย','เพื่อนร่วมชมรม/กิจกรรมในโรงเรียน','เพื่อนที่ยัง follow กันใน FB/IG'] },
  { id:'work',     label:'เพื่อนร่วมงาน',       icon:'💼', color:'#4A7C68',
    triggers:['เพื่อนร่วมงานปัจจุบัน','อดีตเพื่อนร่วมงานที่ยังคุยกัน','ลูกค้าหรือคู่ค้าที่รู้จักดี'] },
  { id:'social',   label:'Social Media',        icon:'📱', color:'#A05050',
    triggers:['คนที่ active ใน FB/LINE ของคุณ','คนที่ชอบ like/comment โพสต์','เพื่อนออนไลน์ที่คุยประจำ'] },
  { id:'activity', label:'กิจกรรม & ชมรม',      icon:'⚽', color:'#5A7A3A',
    triggers:['เพื่อนออกกำลังกาย/ฟิตเนส','คนในกลุ่ม LINE ชมรมต่างๆ','คนที่เจอใน event/สัมมนา'] },
  { id:'other',    label:'อื่นๆ',               icon:'✨', color:'#687080',
    triggers:['เพื่อนบ้าน/คนในย่านเดียวกัน','คนที่เพิ่งนึกถึงตอนนี้','ใครก็ตามที่รู้จัก อย่าคัด!'] },
];

const FORM_ITEMS = [
  { key:'F', label:'Family', icon:'👨‍👩‍👧', question:'ภาระครอบครัว/ค่าใช้จ่ายที่ต้องดูแล?',
    opts:['น้อย/ไม่มี','ปานกลาง','เยอะ/หนักมาก'],
    whyHigh:'ภาระสูง → ต้องการรายได้เสริมเพิ่มแน่นอน' },
  { key:'O', label:'Occupation', icon:'💼', question:'ความพอใจในงาน/รายได้ปัจจุบัน?',
    opts:['พอใจมาก','ก็ได้/เฉยๆ','ไม่พอใจ/อยากเปลี่ยน'],
    whyHigh:'ไม่พอใจงาน → กำลังมองหาทางเลือก timing ดีมาก' },
  { key:'R', label:'Recreation', icon:'🌿', question:'ให้ความสำคัญกับสุขภาพ/ไลฟ์สไตล์?',
    opts:['ไม่ค่อยสนใจ','บ้างบางครั้ง','ใส่ใจมาก'],
    whyHigh:'ใส่ใจสุขภาพ → เปิดรับข้อมูล Nutrilite ได้ทันที' },
  { key:'M', label:'Money', icon:'💰', question:'ต้องการรายได้เพิ่มหรือมีเป้าหมายการเงิน?',
    opts:['ไม่จำเป็น','อยากได้เพิ่มบ้าง','ต้องการมาก'],
    whyHigh:'ต้องการเงินเพิ่ม → นี่คือคนที่รอให้คุณไปหาอยู่แล้ว' },
];

const WHY_2026 = [
  { icon:'📉', title:'เศรษฐกิจ 2026', desc:'ค่าครองชีพสูงขึ้นต่อเนื่อง คนไทยส่วนใหญ่กำลังมองหารายได้เสริม — คนในรายชื่อคุณก็ไม่ต่างกัน' },
  { icon:'💚', title:'สุขภาพเป็น Priority', desc:'Post-COVID ทุกคนตระหนักเรื่องสุขภาพมากขึ้น Wellness market ไทยโต 15%/ปี — ทุกคนพร้อมฟัง' },
  { icon:'🤝', title:'วิธีเราต่างกัน', desc:'เราใช้ Preview Sponsor — permission-based ไม่กดดัน ไม่ hard sell แค่แชร์ opportunity ให้เค้าตัดสินใจเอง' },
  { icon:'🎯', title:'"คนรวย" ก็ต้องการ', desc:'งานวิจัยพบว่าคนที่ดูรวย/ดูยุ่ง มักตัดสินใจเร็วที่สุด เพราะมีเป้าหมายชัดและเชื่อในการลงทุนตัวเอง' },
];

function calcPriority(form) {
  const t = (form.F||0)+(form.O||0)+(form.R||0)+(form.M||0);
  if(t>=9) return 'high'; if(t>=5) return 'medium'; return 'low';
}
function calcApproach(form) {
  const h=form.R||0, b=(form.O||0)+(form.M||0)+(form.F||0);
  if(h>=2&&b>=4) return 'both';
  if(h>=2) return 'health';
  if(b>=4) return 'business';
  return 'explore';
}
function whyOK(person) {
  const {F=0,O=0,R=0,M=0}=person.form;
  const r=[];
  if(!F&&!O&&!R&&!M) return 'ยังไม่ได้วิเคราะห์ FORM · บริบทเศรษฐกิจ 2026 ทำให้ทุกคนเปิดรับมากกว่าที่คิด';
  if(F>=2) r.push('มีภาระครอบครัวสูง → ต้องการรายได้เสริม');
  if(O>=2) r.push('ไม่พอใจงาน → กำลังมองหาทางเลือก');
  if(R>=2) r.push('ใส่ใจสุขภาพ → เปิดรับ Nutrilite ทันที');
  if(M>=2) r.push('ต้องการรายได้เพิ่ม → รอให้คุณไปหาอยู่แล้ว');
  if(!r.length) return 'FORM ยังต่ำ แต่ทุกคนมีสิทธิ์ได้รู้ข้อมูล — ลอง explore conversation ก่อน';
  return r.join(' · ');
}

/* ── HEADER ── */
function Header({step,setStep,count}) {
  const steps=[{n:1,icon:'📋',lab:'List รายชื่อ'},{n:2,icon:'🔍',lab:'FORM Analysis'},{n:3,icon:'🎯',lab:'Action Plan'}];
  return (
    <div style={{background:'var(--rose)'}}>
      <div className="max-w-2xl mx-auto px-4 py-2 flex items-center gap-3">
        <div className="w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm flex-shrink-0"
             style={{background:'rgba(255,255,255,0.2)',color:'white'}}>UP</div>
        <span className="text-white font-semibold hidden sm:block">Name List Builder</span>
        <div className="flex gap-1 flex-1 justify-center">
          {steps.map((s,i)=>(
            <React.Fragment key={s.n}>
              <button onClick={()=>count>0&&setStep(s.n)}
                className={`flex items-center gap-1 px-3 py-1 rounded-full text-sm transition-all ${step===s.n?'bg-white font-bold':'text-white/70 hover:text-white'}`}
                style={step===s.n?{color:'var(--rose)'}:{}}>
                {s.icon}<span className="hidden sm:inline">{s.lab}</span><span className="sm:hidden">{s.n}</span>
              </button>
              {i<2&&<div className="w-4 h-0.5 self-center" style={{background:'rgba(255,255,255,0.3)'}}/>}
            </React.Fragment>
          ))}
        </div>
        <span className="text-white/80 text-sm font-mono ml-auto">{count} คน</span>
      </div>
    </div>
  );
}

/* ── STEP 1: LIST ── */
function Step1({people,setPeople,onNext}) {
  const [cat,setCat]=useState('family');
  const [name,setName]=useState('');
  const ref=useRef();
  const catObj=CATEGORIES.find(c=>c.id===cat);

  function add(){
    const n=name.trim();
    if(!n)return;
    setPeople(p=>[...p,{id:Date.now()+Math.random(),name:n,category:cat,form:{F:0,O:0,R:0,M:0},notes:''}]);
    setName('');
    ref.current?.focus();
  }

  return (
    <div className="max-w-2xl mx-auto px-4 py-5 space-y-5">
      {/* Anti-judge banner */}
      <div className="rounded-xl p-4 border-l-4 fade-in"
           style={{background:'#FFF7E6',borderColor:'var(--amber)'}}>
        <p className="font-bold text-amber-900">🚫 กฎเหล็ก: ห้ามคิดแทนคนอื่น</p>
        <p className="text-sm text-amber-800 mt-0.5">ใส่ชื่อทุกคนที่นึกถึง ไม่ว่าจะคิดว่าเค้า "เอา" หรือ "ไม่เอา" — วิเคราะห์ขั้นต่อไป</p>
      </div>

      {/* Category tabs */}
      <div className="flex flex-wrap gap-2">
        {CATEGORIES.map(c=>{
          const cnt=people.filter(p=>p.category===c.id).length;
          return (
            <button key={c.id} onClick={()=>setCat(c.id)}
              className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm border-2 transition-all"
              style={cat===c.id
                ?{background:c.color,borderColor:c.color,color:'white'}
                :{background:'white',borderColor:'#E5E7EB',color:'#555'}}>
              {c.icon} {c.label}
              {cnt>0&&<span className={`text-xs rounded-full px-1.5 font-bold ${cat===c.id?'bg-white/30 text-white':'bg-gray-100 text-gray-600'}`}>{cnt}</span>}
            </button>
          );
        })}
      </div>

      {/* Trigger hints */}
      <div className="rounded-xl p-3 border" style={{background:'#F0FAF5',borderColor:'var(--mint)'}}>
        <p className="text-xs font-bold mb-2" style={{color:'var(--green)'}}>💡 นึกถึงใครบ้างในกลุ่มนี้?</p>
        {catObj.triggers.map((t,i)=><p key={i} className="text-sm text-gray-600">• {t}</p>)}
      </div>

      {/* Input */}
      <div className="flex gap-2">
        <input ref={ref} type="text" value={name}
          onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}
          placeholder="ชื่อ-นามสกุล หรือชื่อเล่น..."
          className="flex-1 border-2 rounded-xl px-4 py-3 text-base outline-none"
          style={{borderColor:name?'var(--green)':'#E5E7EB',fontFamily:'Sarabun'}}/>
        <button onClick={add} disabled={!name.trim()}
          className="px-5 py-3 rounded-xl text-white font-bold disabled:opacity-40"
          style={{background:'var(--green)'}}>+ เพิ่ม</button>
      </div>

      {/* List in this category */}
      {people.filter(p=>p.category===cat).length>0&&(
        <div className="space-y-2">
          <p className="text-xs font-bold text-gray-400 uppercase tracking-wide">รายชื่อในกลุ่มนี้</p>
          {people.filter(p=>p.category===cat).map(p=>(
            <div key={p.id} className="flex items-center gap-3 bg-white rounded-xl px-4 py-2.5 border border-gray-100 fade-in">
              <span className="flex-1 font-medium">{p.name}</span>
              <button onClick={()=>setPeople(prev=>prev.filter(x=>x.id!==p.id))}
                className="text-gray-300 hover:text-red-400 transition-colors text-xl leading-none">×</button>
            </div>
          ))}
        </div>
      )}

      {/* Total summary */}
      {people.length>0&&(
        <div className="rounded-xl p-4 border" style={{background:'white',borderColor:'var(--mint)'}}>
          <p className="text-sm font-bold mb-2" style={{color:'var(--green)'}}>📊 รายชื่อทั้งหมด ({people.length} คน)</p>
          <div className="flex flex-wrap gap-2">
            {CATEGORIES.filter(c=>people.some(p=>p.category===c.id)).map(c=>(
              <span key={c.id} className="text-sm px-2.5 py-1 rounded-full bg-gray-50 border">
                {c.icon} {c.label} <strong>{people.filter(p=>p.category===c.id).length}</strong>
              </span>
            ))}
          </div>
        </div>
      )}

      {/* CTA */}
      {people.length>=5
        ?<button onClick={onNext} className="w-full py-4 rounded-xl text-white font-bold text-lg fade-in"
            style={{background:'var(--rose)'}}>
            วิเคราะห์ FORM → ({people.length} คน)
          </button>
        :people.length>0
          ?<p className="text-center text-sm text-gray-400">เพิ่มอีก {5-people.length} คน เพื่อไปขั้นต่อไป (แนะนำ 25+ คน)</p>
          :<p className="text-center text-sm text-gray-400">เริ่มเพิ่มชื่อในกลุ่มด้านบนได้เลย</p>
      }
    </div>
  );
}

/* ── STEP 2: FORM ── */
function Step2({people,setPeople,onNext,onBack}) {
  const [idx,setIdx]=useState(0);
  const person=people[idx];
  if(!person) return null;

  function setScore(key,val){
    setPeople(prev=>prev.map((p,i)=>i===idx?{...p,form:{...p.form,[key]:val}}:p));
  }

  const cat=CATEGORIES.find(c=>c.id===person.category);
  const progress=Math.round(((idx+1)/people.length)*100);

  return (
    <div className="max-w-2xl mx-auto px-4 py-5 space-y-4">
      {/* Person header */}
      <div className="bg-white rounded-2xl p-4 border border-gray-100">
        <div className="flex items-start justify-between">
          <div>
            <p className="text-xs text-gray-400 mb-0.5">คนที่ {idx+1} / {people.length}</p>
            <p className="text-2xl font-bold" style={{color:'var(--dark)'}}>{person.name}</p>
            <p className="text-sm text-gray-500">{cat?.icon} {cat?.label}</p>
          </div>
          <div className="text-right">
            <div className="text-xs text-gray-400 mb-1">{progress}% เสร็จ</div>
            <div className="flex flex-wrap gap-1 max-w-[80px] justify-end">
              {people.map((p,i)=>(
                <button key={p.id} onClick={()=>setIdx(i)}
                  className="w-3 h-3 rounded-full transition-all"
                  style={{
                    background:i===idx?'var(--rose)':'var(--green)',
                    opacity:Object.values(p.form).some(v=>v>0)?1:0.25,
                    transform:i===idx?'scale(1.3)':'scale(1)'
                  }}/>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* FORM Questions */}
      {FORM_ITEMS.map(item=>(
        <div key={item.key} className="bg-white rounded-xl p-4 border border-gray-100">
          <div className="flex items-center gap-2 mb-3">
            <span className="text-xl">{item.icon}</span>
            <div>
              <p className="font-bold text-sm">{item.key} — {item.label}</p>
              <p className="text-sm text-gray-500">{item.question}</p>
            </div>
          </div>
          <div className="flex gap-2">
            {item.opts.map((opt,vi)=>{
              const v=vi+1;
              const active=person.form[item.key]===v;
              const bg=v===1?'#9CA3AF':v===2?'var(--green)':'var(--rose)';
              return (
                <button key={v} onClick={()=>setScore(item.key,active?0:v)}
                  className="flex-1 py-2.5 rounded-lg text-sm font-medium border-2 transition-all"
                  style={active?{background:bg,borderColor:bg,color:'white'}:{background:'white',borderColor:'#E5E7EB',color:'#555'}}>
                  {opt}
                </button>
              );
            })}
          </div>
          {person.form[item.key]===3&&(
            <p className="text-xs mt-2 font-semibold fade-in" style={{color:'var(--rose)'}}>✓ {item.whyHigh}</p>
          )}
        </div>
      ))}

      {/* Navigation */}
      <div className="flex gap-3">
        <button onClick={()=>setIdx(Math.max(0,idx-1))} disabled={idx===0}
          className="flex-1 py-3 rounded-xl border-2 border-gray-200 font-medium text-gray-600 disabled:opacity-30">
          ← ก่อนหน้า
        </button>
        {idx<people.length-1
          ?<button onClick={()=>setIdx(idx+1)} className="flex-1 py-3 rounded-xl text-white font-bold"
              style={{background:'var(--green)'}}>ถัดไป →</button>
          :<button onClick={onNext} className="flex-1 py-3 rounded-xl text-white font-bold"
              style={{background:'var(--rose)'}}>ดู Action Plan 🎯</button>
        }
      </div>
      <button onClick={onNext} className="w-full text-sm text-gray-400 underline py-1">
        ข้ามไป Action Plan เลย →
      </button>
    </div>
  );
}

/* ── STEP 3: ACTION PLAN ── */
function Step3({people,onBack}) {
  const enriched=people.map(p=>({...p,priority:calcPriority(p.form),approach:calcApproach(p.form),reason:whyOK(p)}));
  const high=enriched.filter(p=>p.priority==='high');
  const medium=enriched.filter(p=>p.priority==='medium');
  const low=enriched.filter(p=>p.priority==='low');

  const AP={
    health:  {lab:'สุขภาพ',  color:'var(--green)',  icon:'🌿', desc:'เริ่มจากสุขภาพก่อน — แชร์ข้อมูล Nutrilite'},
    business:{lab:'ธุรกิจ',  color:'var(--rose)',   icon:'💼', desc:'เน้น opportunity และรายได้เสริม'},
    both:    {lab:'ทั้งคู่', color:'#7B5EA7',       icon:'⭐', desc:'Dual axis — สุขภาพ + ธุรกิจ'},
    explore: {lab:'สำรวจ',   color:'#6B7280',       icon:'💬', desc:'เริ่ม conversation ก่อน ยังไม่ต้อง pitch'},
  };

  function exportList(){
    const lines=['📋 NAME LIST — UP Wellness\n','สร้างโดย Name List Builder · UP Wellness 2026\n'];
    [[high,'🔴 Priority สูง'],[medium,'🟡 Priority กลาง'],[low,'🔵 สำรวจเพิ่มเติม']].forEach(([list,label])=>{
      if(!list.length)return;
      lines.push(`\n${label} (${list.length} คน)`);
      list.forEach(p=>{
        const cat=CATEGORIES.find(c=>c.id===p.category);
        lines.push(`• ${p.name} [${cat?.label}] → ${AP[p.approach]?.lab}`);
        lines.push(`  ✓ ${p.reason}`);
      });
    });
    navigator.clipboard?.writeText(lines.join('\n'));
    alert('คัดลอกแล้ว! วางใน LINE, Notes หรือ Google Docs ได้เลย 📋');
  }

  function PersonRow({person}){
    const [open,setOpen]=useState(false);
    const cat=CATEGORIES.find(c=>c.id===person.category);
    const ap=AP[person.approach];
    return (
      <div className="bg-white rounded-xl border border-gray-100 overflow-hidden fade-in">
        <div className="flex items-center gap-3 p-3 cursor-pointer" onClick={()=>setOpen(!open)}>
          <div className="flex-1 min-w-0">
            <div className="flex flex-wrap items-center gap-1.5">
              <span className="font-semibold">{person.name}</span>
              <span className="text-xs text-gray-400">{cat?.icon} {cat?.label}</span>
            </div>
            <div className="flex flex-wrap items-center gap-1.5 mt-1">
              <span className="text-xs px-2 py-0.5 rounded-full text-white font-medium" style={{background:ap.color}}>
                {ap.icon} {ap.lab}
              </span>
              {Object.entries(person.form).map(([k,v])=>v>0&&(
                <span key={k} className={`text-xs px-1.5 py-0.5 rounded font-mono font-bold ${
                  v===3?'bg-red-100 text-red-700':v===2?'bg-amber-100 text-amber-700':'bg-gray-100 text-gray-500'
                }`}>{k}{v}</span>
              ))}
            </div>
          </div>
          <span className="text-gray-300 text-sm flex-shrink-0">{open?'▲':'▼'}</span>
        </div>
        {open&&(
          <div className="px-3 pb-3 pt-2 border-t border-gray-50 fade-in" style={{background:'var(--cream)'}}>
            <p className="text-xs font-bold mb-1" style={{color:'var(--green)'}}>✓ ทำไมคนนี้ถึง OK</p>
            <p className="text-sm text-gray-700 leading-relaxed">{person.reason}</p>
            <p className="text-xs text-gray-500 mt-2 border-t border-gray-200 pt-2">{ap.icon} แนวทาง: {ap.desc}</p>
          </div>
        )}
      </div>
    );
  }

  function Section({title,color,list,icon}){
    if(!list.length)return null;
    return (
      <div className="space-y-2">
        <div className="flex items-center gap-2">
          <div className="w-3 h-3 rounded-full flex-shrink-0" style={{background:color}}/>
          <p className="font-bold text-sm">{icon} {title} <span className="font-normal text-gray-500">({list.length} คน)</span></p>
        </div>
        {list.map(p=><PersonRow key={p.id} person={p}/>)}
      </div>
    );
  }

  return (
    <div className="max-w-2xl mx-auto px-4 py-5 space-y-5">
      {/* Stats */}
      <div className="grid grid-cols-4 gap-2">
        {[
          {lab:'ทั้งหมด', val:people.length, color:'var(--dark)'},
          {lab:'Priority สูง', val:high.length, color:'#DC2626'},
          {lab:'Priority กลาง', val:medium.length, color:'#D97706'},
          {lab:'สำรวจ', val:low.length, color:'#6B7280'},
        ].map(s=>(
          <div key={s.lab} className="bg-white rounded-xl p-3 text-center border border-gray-100">
            <p className="text-2xl font-bold" style={{color:s.color}}>{s.val}</p>
            <p className="text-xs text-gray-500 mt-0.5">{s.lab}</p>
          </div>
        ))}
      </div>

      {/* 2026 Reassurance */}
      <div className="rounded-xl p-4 border" style={{background:'#F0FAF5',borderColor:'var(--mint)'}}>
        <p className="font-bold text-sm mb-3" style={{color:'var(--green)'}}>💚 ทำไม List นี้ถึง OK — บริบทปี 2026</p>
        <div className="space-y-2.5">
          {WHY_2026.map((r,i)=>(
            <div key={i} className="flex gap-2.5 items-start">
              <span className="text-lg flex-shrink-0">{r.icon}</span>
              <div>
                <p className="text-sm font-semibold text-gray-800">{r.title}</p>
                <p className="text-xs text-gray-600 leading-relaxed">{r.desc}</p>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Priority Lists */}
      <Section title="Priority สูง — ติดต่อก่อน" color="#DC2626" list={high} icon="🔴"/>
      <Section title="Priority กลาง — วางแผนติดต่อ" color="#D97706" list={medium} icon="🟡"/>
      <Section title="สำรวจเพิ่มเติม" color="#6B7280" list={low} icon="🔵"/>

      {/* Actions */}
      <div className="space-y-2 pt-2">
        <button onClick={exportList}
          className="w-full py-3.5 rounded-xl font-bold text-sm border-2 transition-all hover:opacity-80"
          style={{borderColor:'var(--green)',color:'var(--green)'}}>
          📋 คัดลอก List ทั้งหมด
        </button>
        <button onClick={()=>window.print()}
          className="w-full py-3 rounded-xl font-medium text-sm border border-gray-200 text-gray-500 hover:bg-gray-50">
          🖨 พิมพ์ / Export PDF
        </button>
        <button onClick={onBack} className="w-full text-sm text-gray-400 underline py-1">
          ← กลับแก้ไข List
        </button>
      </div>
    </div>
  );
}

/* ── APP ── */
function App(){
  const [step,setStep]=useState(1);
  const [people,setPeople]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('upwellness-namelist')||'[]');}
    catch{return [];}
  });

  useEffect(()=>{ localStorage.setItem('upwellness-namelist',JSON.stringify(people)); },[people]);

  return (
    <div style={{background:'var(--cream)',minHeight:'100vh'}}>
      <Header step={step} setStep={setStep} count={people.length}/>
      {step===1&&<Step1 people={people} setPeople={setPeople} onNext={()=>setStep(2)}/>}
      {step===2&&<Step2 people={people} setPeople={setPeople} onNext={()=>setStep(3)} onBack={()=>setStep(1)}/>}
      {step===3&&<Step3 people={people} onBack={()=>setStep(1)}/>}
      <footer className="text-center py-8 text-xs text-gray-400 space-y-1">
        <p>UP Wellness · Name List Builder · 2026</p>
        <p>ข้อมูลทั้งหมดเก็บในเครื่องของคุณเท่านั้น ไม่มีการส่งออก</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
