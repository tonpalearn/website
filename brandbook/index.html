<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TONPALEARN · Brand Book</title>
  <meta name="description" content="TONPALEARN brand book — design system, color palette, typography, components, voice & tone. Reference for all touchpoints." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Great+Vibes&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html { background: #08080F; }
    body { font-family: 'IBM Plex Sans Thai', sans-serif; background: #08080F; color: #FAFAFA; -webkit-font-smoothing: antialiased; min-height: 100vh; }
    *::selection { background: rgba(230,184,75,0.25); color: #fff; }
    .font-display { font-family: 'Space Grotesk', 'IBM Plex Sans Thai', sans-serif; }
    .font-serif   { font-family: 'Cormorant Garamond', serif; }
    .font-sarabun { font-family: 'Sarabun', sans-serif; }
    .font-mono    { font-family: 'JetBrains Mono', monospace; }
    .font-script  { font-family: 'Great Vibes', cursive; }

    .scrollable::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollable::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
    .scrollable::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 4px; }
    .scrollable::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.35); }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border-radius: 14px;
    }

    .grad-text-gold {
      background: linear-gradient(135deg, #F5D67A 0%, #E6B84B 50%, #C8A84B 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .grad-text-teal {
      background: linear-gradient(135deg, #67E8F9 0%, #2DD4BF 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .grad-text-violet {
      background: linear-gradient(135deg, #C4B5FD 0%, #7C5CFC 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }

    .mesh-bg {
      background:
        radial-gradient(ellipse 80% 60% at 70% 20%, rgba(124,92,252,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 15% 80%, rgba(45,212,191,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 50% 45% at 85% 75%, rgba(230,184,75,0.08) 0%, transparent 55%);
    }
    .grid-bg {
      background-image:
        linear-gradient(rgba(230,184,75,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(230,184,75,0.04) 1px, transparent 1px);
      background-size: 56px 56px;
    }
    .noise {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3CfeColorMatrix values='0 0 0 0 0.95 0 0 0 0 0.85 0 0 0 0 0.5 0 0 0 0.55 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.025; mix-blend-mode: overlay;
    }

    .shine { position: relative; overflow: hidden; }
    .shine::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
      transform: translateX(-100%); transition: transform 0.8s;
    }
    .shine:hover::after { transform: translateX(100%); }

    /* Copy badge */
    @keyframes copyPing {
      0%   { transform: translateY(0) scale(1);   opacity: 1; }
      100% { transform: translateY(-12px) scale(1.05); opacity: 0; }
    }
    .copy-ping { animation: copyPing 0.6s ease-out forwards; }

    /* Nav sticky highlight */
    .nav-active { background: rgba(230,184,75,0.10); color: #F5D67A; border-left-color: #E6B84B; }

    /* Demo card hover */
    .card-glass-hover { transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s; }
    .card-glass-hover:hover { transform: translateY(-3px); border-color: rgba(230,184,75,0.30); box-shadow: 0 16px 40px -16px rgba(230,184,75,0.20); }

    /* Logo seal */
    .logo-seal {
      background: radial-gradient(circle at 30% 30%, #F5D67A, #C8A84B 50%, #9A7A2B 100%);
      box-shadow: 0 8px 24px -8px rgba(230,184,75,0.50), inset 0 -6px 16px rgba(106,84,25,0.35);
    }

    @media print {
      .no-print, aside { display: none !important; }
      main { padding-left: 0 !important; }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef } = React;

// ───────────────────────────────────────────────────────────
// COLORS — the source of truth
// ───────────────────────────────────────────────────────────
const PALETTE = {
  ink: {
    label: 'Ink (Dark base)',
    role:  'Backgrounds · primary surfaces',
    shades: [
      { name: '950', hex: '#08080F', use: 'page background' },
      { name: '900', hex: '#0D0D14', use: 'subtle layer' },
      { name: '850', hex: '#101019', use: 'panel raised' },
      { name: '800', hex: '#12121E', use: 'card depth' },
      { name: '700', hex: '#1A1A2A', use: 'border / divider' },
      { name: '600', hex: '#23233A', use: 'high contrast border' },
    ],
  },
  gold: {
    label: 'Gold (Primary accent)',
    role:  'CTAs · headings · brand highlight',
    shades: [
      { name: '300', hex: '#F5D67A', use: 'light text / hover' },
      { name: '400', hex: '#F0CC72', use: 'gradient stop' },
      { name: '500', hex: '#E6B84B', use: 'primary CTA' },
      { name: '600', hex: '#C8A84B', use: 'border / line' },
      { name: '700', hex: '#9A7A2B', use: 'deep accent' },
    ],
  },
  teal: {
    label: 'Teal (Secondary accent)',
    role:  'Tertiary CTAs · success · info',
    shades: [
      { name: '300', hex: '#67E8F9', use: 'light highlight' },
      { name: '400', hex: '#2DD4BF', use: 'primary teal' },
      { name: '500', hex: '#14B8A6', use: 'mid teal' },
      { name: '600', hex: '#0D9488', use: 'deep teal' },
    ],
  },
  violet: {
    label: 'Violet (Tertiary accent)',
    role:  'Decorative · gradient depth · creator mood',
    shades: [
      { name: '300', hex: '#C4B5FD', use: 'light violet' },
      { name: '400', hex: '#A78BFA', use: 'primary violet' },
      { name: '500', hex: '#7C5CFC', use: 'deep violet' },
      { name: '600', hex: '#5B21B6', use: 'darkest' },
    ],
  },
};

// ───────────────────────────────────────────────────────────
// TYPOGRAPHY SCALE
// ───────────────────────────────────────────────────────────
const TYPE_SCALE = [
  { name: 'Display XL', size: '72px', weight: '700', family: 'display', use: 'Hero title · landing page', sample: 'AI ง่ายขึ้น' },
  { name: 'Display L',  size: '60px', weight: '700', family: 'display', use: 'Section hero',           sample: 'เรียนได้ทุกระดับ' },
  { name: 'Display M',  size: '48px', weight: '600', family: 'display', use: 'Page title',             sample: 'หลักสูตร 12 คอร์ส' },
  { name: 'Serif Display', size: '60px', weight: '500', family: 'serif', use: 'Certificate · profile name', sample: 'Chaiwat' },
  { name: 'Heading 1',  size: '36px', weight: '700', family: 'display', use: 'Section heading',         sample: 'About TONPALEARN' },
  { name: 'Heading 2',  size: '28px', weight: '600', family: 'display', use: 'Subsection',             sample: 'หลักสูตร AI Agentic' },
  { name: 'Heading 3',  size: '20px', weight: '600', family: 'body',    use: 'Card title',              sample: 'AI Agentic' },
  { name: 'Body L',     size: '16px', weight: '400', family: 'body',    use: 'Lead paragraph',          sample: 'AI ที่ใช้ได้จริง — สอนโดยต้น' },
  { name: 'Body',       size: '14px', weight: '400', family: 'body',    use: 'Default text',            sample: 'เรียนรู้ AI ที่ใช้งานได้จริง' },
  { name: 'Body S',     size: '12px', weight: '400', family: 'body',    use: 'Caption',                 sample: 'ปรึกษาฟรี · ไม่มีข้อผูกมัด' },
  { name: 'Mono',       size: '11px', weight: '500', family: 'mono',    use: 'Code · numbers · meta',   sample: 'TPL-2605-001' },
];

// ───────────────────────────────────────────────────────────
// SPACING / RADIUS / SHADOW tokens
// ───────────────────────────────────────────────────────────
const SPACING = [
  { name: '0',  px: '0px',  rem: '0',     use: 'no space' },
  { name: '1',  px: '4px',  rem: '0.25rem', use: 'tight' },
  { name: '2',  px: '8px',  rem: '0.5rem',  use: 'icon gap' },
  { name: '3',  px: '12px', rem: '0.75rem', use: 'inline elements' },
  { name: '4',  px: '16px', rem: '1rem',    use: 'default gap' },
  { name: '5',  px: '20px', rem: '1.25rem', use: 'card padding' },
  { name: '6',  px: '24px', rem: '1.5rem',  use: 'section gap' },
  { name: '8',  px: '32px', rem: '2rem',    use: 'panel padding' },
  { name: '12', px: '48px', rem: '3rem',    use: 'block gap' },
  { name: '16', px: '64px', rem: '4rem',    use: 'section gap' },
  { name: '20', px: '80px', rem: '5rem',    use: 'hero padding' },
  { name: '24', px: '96px', rem: '6rem',    use: 'page section' },
];

const RADIUS = [
  { name: 'sm',   px: '6px',  use: 'small chips' },
  { name: 'md',   px: '8px',  use: 'inputs · buttons small' },
  { name: 'lg',   px: '12px', use: 'cards' },
  { name: 'xl',   px: '16px', use: 'panels' },
  { name: '2xl',  px: '24px', use: 'hero panels' },
  { name: '3xl',  px: '32px', use: 'bento cells' },
  { name: 'full', px: '999px',use: 'pills · avatars' },
];

const SHADOWS = [
  { name: 'glow',     css: '0 0 40px -10px rgba(230,184,75,0.35)',  use: 'gold CTA hover' },
  { name: 'glowTeal', css: '0 0 40px -10px rgba(45,212,191,0.35)',  use: 'teal accent hover' },
  { name: 'glowVio',  css: '0 0 50px -10px rgba(167,139,250,0.35)', use: 'violet accent hover' },
  { name: 'lift',     css: '0 18px 50px -20px rgba(0,0,0,0.55)',    use: 'elevated panel' },
];

// ───────────────────────────────────────────────────────────
// NAV
// ───────────────────────────────────────────────────────────
const NAV = [
  { id: 'brand',      label: 'Brand Essence' },
  { id: 'logo',       label: 'Logo' },
  { id: 'colors',     label: 'Colors' },
  { id: 'typography', label: 'Typography' },
  { id: 'spacing',    label: 'Spacing · Radius · Shadow' },
  { id: 'gradients',  label: 'Gradients & Effects' },
  { id: 'buttons',    label: 'Buttons' },
  { id: 'cards',      label: 'Cards' },
  { id: 'badges',     label: 'Badges · Chips' },
  { id: 'inputs',     label: 'Inputs' },
  { id: 'voice',      label: 'Voice & Tone' },
  { id: 'donts',      label: "Don'ts" },
  { id: 'code',       label: 'Code Tokens' },
];

// ───────────────────────────────────────────────────────────
// MAIN APP
// ───────────────────────────────────────────────────────────
function App() {
  const [active, setActive] = useState('brand');
  const [copied, setCopied] = useState(null);

  const copy = async (text, key) => {
    try {
      await navigator.clipboard.writeText(text);
    } catch {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }
    setCopied(key);
    setTimeout(() => setCopied(null), 1200);
  };

  // Active section based on scroll
  useEffect(() => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) setActive(e.target.id);
      });
    }, { threshold: 0.3, rootMargin: '-80px 0px -50% 0px' });
    NAV.forEach(n => {
      const el = document.getElementById(n.id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, []);

  return (
    <div className="min-h-screen relative" style={{ background: '#08080F' }}>
      <div className="absolute inset-0 grid-bg opacity-20 pointer-events-none"/>

      <TopNav/>

      <div className="relative mx-auto max-w-[1500px] flex gap-6 px-6 pt-6">
        <SideNav active={active}/>

        <main className="flex-1 min-w-0 pb-32">
          <Brand/>
          <Logo copy={copy} copied={copied}/>
          <Colors copy={copy} copied={copied}/>
          <Typography/>
          <Spacing copy={copy} copied={copied}/>
          <Gradients copy={copy} copied={copied}/>
          <Buttons/>
          <Cards/>
          <Badges/>
          <Inputs/>
          <Voice/>
          <Donts/>
          <CodeTokens copy={copy} copied={copied}/>

          <footer className="mt-24 pt-8 border-t border-white/10 text-center text-xs text-slate-500">
            <div className="font-mono uppercase tracking-widest mb-2">TONPALEARN · Brand Book</div>
            <div>© 2026 ชัยวัฒน์ ภูวนนท์จิรกวิน · Updated 20 พ.ค. 2569</div>
            <div className="mt-1">Reference at <a href="https://tonpalearn.com/brandbook/" className="grad-text-gold">tonpalearn.com/brandbook</a></div>
          </footer>
        </main>
      </div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────
// TOP NAV
// ───────────────────────────────────────────────────────────
function TopNav() {
  return (
    <header className="no-print sticky top-0 z-40 border-b border-white/10 bg-ink-950/85 backdrop-blur-xl">
      <div className="mx-auto max-w-[1500px] px-6 h-16 flex items-center justify-between">
        <a href="/" className="font-display font-bold text-lg tracking-tight">
          <span className="text-white">TON</span>
          <span className="grad-text-gold">PA</span>
          <span className="grad-text-teal">LEARN</span>
        </a>
        <div className="font-mono text-[10px] tracking-widest text-slate-500 uppercase">Brand Book · v1.0</div>
        <a href="/" className="text-sm text-slate-400 hover:text-white transition-colors">← Home</a>
      </div>
    </header>
  );
}

// ───────────────────────────────────────────────────────────
// SIDE NAV
// ───────────────────────────────────────────────────────────
function SideNav({ active }) {
  return (
    <aside className="no-print w-56 flex-shrink-0 hidden lg:block">
      <div className="sticky top-24">
        <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500 mb-3 px-4">Contents</div>
        <nav className="space-y-0.5">
          {NAV.map((item, i) => (
            <a key={item.id} href={`#${item.id}`}
               className={`block pl-4 pr-3 py-2 text-sm border-l-2 transition ${
                 active === item.id
                   ? 'nav-active font-semibold'
                   : 'border-transparent text-slate-400 hover:text-white hover:bg-white/[0.03]'
               }`}>
              <span className="font-mono text-[10px] text-slate-500 mr-2">{String(i+1).padStart(2,'0')}</span>
              {item.label}
            </a>
          ))}
        </nav>
      </div>
    </aside>
  );
}

// ───────────────────────────────────────────────────────────
// SECTION WRAPPER
// ───────────────────────────────────────────────────────────
function Section({ id, num, title, sub, children }) {
  return (
    <section id={id} className="scroll-mt-24 mb-24">
      <div className="mb-8 pb-4 border-b border-white/10">
        <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500">Section {num}</div>
        <h2 className="mt-1 font-serif text-4xl text-white">{title}</h2>
        {sub && <p className="mt-2 text-sm text-slate-400 max-w-2xl">{sub}</p>}
      </div>
      <div className="space-y-6">{children}</div>
    </section>
  );
}

function Sub({ title, children }) {
  return (
    <div>
      <h3 className="font-display font-semibold text-xs uppercase tracking-widest text-gold-400 mb-3" style={{ color: '#E6B84B' }}>{title}</h3>
      <div>{children}</div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────
// 1. BRAND ESSENCE
// ───────────────────────────────────────────────────────────
function Brand() {
  return (
    <Section id="brand" num="01" title="Brand Essence" sub="The soul of TONPALEARN — what we stand for in one breath">
      <div className="panel p-8 md:p-12">
        <div className="text-[10px] font-mono uppercase tracking-widest text-gold-400 mb-3" style={{ color: '#E6B84B' }}>Mission</div>
        <p className="font-serif italic text-2xl text-white leading-snug">
          สอน AI ให้คนใช้ได้จริง — เปลี่ยนความรู้เป็น <span className="grad-text-gold not-italic font-semibold">รายได้ + เวลา + อิสระ</span>
        </p>

        <div className="grid md:grid-cols-3 gap-6 mt-10">
          <BrandKV k="Tagline"  v="AI ง่ายขึ้น เมื่อมีต้นพาไป"/>
          <BrandKV k="Audience" v="คนทำงาน · เจ้าของธุรกิจ · องค์กร — ไม่ต้องพื้นฐาน IT"/>
          <BrandKV k="Promise"  v="Hands-on · ใช้งานได้จริง · ไม่ใช่ทฤษฎี"/>
        </div>

        <div className="mt-8 pt-8 border-t border-white/10 grid md:grid-cols-2 gap-6">
          <div>
            <div className="text-[10px] font-mono uppercase tracking-widest text-teal-400 mb-2" style={{ color: '#2DD4BF' }}>Personality (DISC)</div>
            <p className="text-sm text-slate-300 leading-relaxed">
              <b className="text-white">🔴 D — Dominant</b> primary · <b className="text-white">🔵 C — Conscientious</b> secondary<br/>
              ตรงประเด็น · ตัดสินใจเร็ว · ข้อมูลแม่น · flag ความไม่แน่ใจชัดเจน
            </p>
          </div>
          <div>
            <div className="text-[10px] font-mono uppercase tracking-widest text-teal-400 mb-2" style={{ color: '#2DD4BF' }}>Archetype</div>
            <p className="text-sm text-slate-300 leading-relaxed">
              <b className="text-white">🎨 Creator</b> 70% · <b className="text-white">🦉 Sage</b> 20% · <b className="text-white">👥 Everyman</b> 10%<br/>
              สร้างสิ่งใหม่ · อ้างอิงข้อมูลจริง · พูดเหมือนคนคุยกัน
            </p>
          </div>
        </div>
      </div>
    </Section>
  );
}

function BrandKV({ k, v }) {
  return (
    <div>
      <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500">{k}</div>
      <div className="mt-1 text-base text-white font-semibold">{v}</div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────
// 2. LOGO
// ───────────────────────────────────────────────────────────
function Logo({ copy, copied }) {
  return (
    <Section id="logo" num="02" title="Logo" sub="TONPALEARN wordmark uses a tri-gradient letter split — TON (white) · PA (gold) · LEARN (teal)">
      <div className="grid md:grid-cols-2 gap-6">
        <div className="panel p-8 flex items-center justify-center" style={{ minHeight: 200 }}>
          <div className="font-display font-bold text-5xl tracking-tight">
            <span className="text-white">TON</span>
            <span className="grad-text-gold">PA</span>
            <span className="grad-text-teal">LEARN</span>
          </div>
        </div>

        <div className="panel p-8 flex items-center justify-center bg-white" style={{ minHeight: 200 }}>
          <div className="font-display font-bold text-5xl tracking-tight">
            <span style={{ color: '#1A1A2A' }}>TON</span>
            <span style={{ background: 'linear-gradient(135deg, #C8A84B, #9A7A2B)', WebkitBackgroundClip: 'text', backgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>PA</span>
            <span style={{ background: 'linear-gradient(135deg, #14B8A6, #0D9488)', WebkitBackgroundClip: 'text', backgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>LEARN</span>
          </div>
        </div>
      </div>

      <Sub title="Letter Seal · 'T'">
        <div className="grid md:grid-cols-4 gap-4">
          {[24, 40, 60, 80].map(sz => (
            <div key={sz} className="panel p-6 flex flex-col items-center justify-center">
              <div className="logo-seal flex items-center justify-center font-display font-bold text-white"
                   style={{ width: sz*2, height: sz*2, borderRadius: sz/3, fontSize: sz*0.6 }}>
                T
              </div>
              <div className="mt-3 text-[10px] font-mono text-slate-500">{sz*2}×{sz*2}px</div>
            </div>
          ))}
        </div>
      </Sub>

      <Sub title="Clear space + don'ts">
        <div className="panel p-6 text-sm text-slate-300 space-y-2 leading-relaxed">
          <p>✅ Always keep clear space equal to the "TON" letter width around the logo.</p>
          <p>✅ Use white on dark · use ink-on-light for printed material (certificates, paper).</p>
          <p>❌ Don't rotate, stretch, or recolor the wordmark.</p>
          <p>❌ Don't drop a single segment (e.g. show only "PA" alone) outside of icon/seal use.</p>

              <div className="text-xs font-display font-bold uppercase tracking-widest" style={{ color: v.c }}>{v.k}</div>
              <div className="mt-2 text-base text-white">{v.v}</div>
            </div>
          ))}
        </div>
      </Sub>

      <Sub title="Sample copy — same content, three tones">
        <div className="grid md:grid-cols-3 gap-4">
          <VoiceSample title="Hero" tone="Direct">
            "AI ง่ายขึ้น เมื่อมีต้นพาไป"
            <br/><br/>
            <span className="text-xs text-slate-400 italic">เรียนรู้ AI ที่ใช้งานได้จริง — สอนโดยต้น วิศวกรคอมพิวเตอร์ PM 15 ปี</span>
          </VoiceSample>
          <VoiceSample title="FAQ" tone="Knowing">
            <b className="text-white">ถ้าไม่มีพื้นฐาน IT เรียนได้มั้ย?</b>
            <br/><br/>
            ได้แน่นอน — คอร์สส่วนใหญ่ออกแบบสำหรับคนที่ไม่เคยเขียนโค้ด · เริ่มจาก 0 ได้เลย
          </VoiceSample>
          <VoiceSample title="CTA" tone="Human">
            พร้อมให้<span className="grad-text-gold font-semibold">ต้นพาไป</span>แล้วหรือยัง?
            <br/><br/>
            <span className="text-xs text-slate-400">ทักมาคุยฟรี — บอกว่าต้องการอะไร ต้นจะแนะนำหลักสูตรที่เหมาะ</span>
          </VoiceSample>
        </div>
      </Sub>

      <Sub title="Signature phrases (✅ use)">
        <div className="panel p-5 flex flex-wrap gap-2">
          {[
            'ลองมองแบบนี้แทน',
            'ตามข้อมูลที่มี...',
            'ทำได้เลย — เริ่มจากนี้',
            'AI ง่ายขึ้น',
            'ใช้งานได้จริง',
            'ไม่ต้องพื้นฐาน IT',
          ].map((p, i) => (
            <span key={i} className="px-3 py-1.5 rounded-full text-xs font-semibold border border-white/10 text-slate-200">
              "{p}"
            </span>
          ))}
        </div>
      </Sub>
    </Section>
  );
}

function VoiceSample({ title, tone, children }) {
  return (
    <div className="panel p-5">
      <div className="flex items-baseline justify-between mb-3 pb-2 border-b border-white/5">
        <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500">{title}</div>
        <div className="text-[10px] font-mono uppercase tracking-widest" style={{ color: '#2DD4BF' }}>{tone}</div>
      </div>
      <div className="text-sm text-slate-200 leading-relaxed">{children}</div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────
// 12. DON'TS
// ───────────────────────────────────────────────────────────
function Donts() {
  return (
    <Section id="donts" num="12" title="Don'ts" sub="Anti-patterns — what TONPALEARN never does">
      <div className="grid md:grid-cols-2 gap-4">
        {[
          { title: 'Don\'t use "Great question!"', body: 'Opener-as-filler that adds no value. Start with the answer.' },
          { title: 'Don\'t list everything equally', body: 'If you have 5 options, recommend one. Boldness > balance.' },
          { title: 'Don\'t hallucinate numbers', body: 'If you don\'t know — say so. Never fabricate prices, dates, or specs.' },
          { title: 'Don\'t use 3+ display fonts', body: 'Space Grotesk + Cormorant Garamond is plenty. Adding more = visual chaos.' },
          { title: 'Don\'t recolor the wordmark', body: 'TON-PA-LEARN tri-gradient is fixed. Use it as-is or use the seal letter.' },
          { title: 'Don\'t overuse emoji', body: 'Sparingly. One emoji per heading max. Two in a body para max.' },
          { title: 'Don\'t use neon/saturated colors', body: 'TONPALEARN palette is muted/premium. Avoid #FF00FF / #00FF00 etc.' },
          { title: 'Don\'t pad responses', body: '"In conclusion..." "It is important to note..." → delete. Get to the point.' },
        ].map((d, i) => (
          <div key={i} className="panel p-5 border-l-2" style={{ borderLeftColor: '#EF4444' }}>
            <div className="text-sm font-display font-bold text-white">❌ {d.title}</div>
            <p className="text-xs text-slate-400 mt-2 leading-relaxed">{d.body}</p>
          </div>
        ))}
      </div>
    </Section>
  );
}

// ───────────────────────────────────────────────────────────
// 13. CODE TOKENS
// ───────────────────────────────────────────────────────────
function CodeTokens({ copy, copied }) {
  const tailwindConfig = `tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        display: ['Space Grotesk', 'IBM Plex Sans Thai', 'sans-serif'],
        serif:   ['Cormorant Garamond', 'serif'],
        body:    ['IBM Plex Sans Thai', 'sans-serif'],
        sarabun: ['Sarabun', 'sans-serif'],
        mono:    ['JetBrains Mono', 'monospace'],
      },
      colors: {
        ink:    { 950: '#08080F', 900: '#0D0D14', 800: '#12121E', 700: '#1A1A2A', 600: '#23233A' },
        gold:   { 300: '#F5D67A', 400: '#F0CC72', 500: '#E6B84B', 600: '#C8A84B', 700: '#9A7A2B' },
        teal:   { 300: '#67E8F9', 400: '#2DD4BF', 500: '#14B8A6', 600: '#0D9488' },
        brand:  { violet: '#A78BFA', violetDeep: '#7C5CFC' },
      },
      boxShadow: {
        glow:     '0 0 40px -10px rgba(230,184,75,0.35)',
        glowTeal: '0 0 40px -10px rgba(45,212,191,0.35)',
        glowVio:  '0 0 50px -10px rgba(167,139,250,0.35)',
        lift:     '0 18px 50px -20px rgba(0,0,0,0.55)',
      },
    }
  }
};`;

  const cssVars = `:root {
  --ink-950: #08080F;
  --ink-900: #0D0D14;
  --ink-800: #12121E;

  --gold-300: #F5D67A;
  --gold-500: #E6B84B;
  --gold-600: #C8A84B;
  --gold-700: #9A7A2B;

  --teal-400: #2DD4BF;
  --teal-500: #14B8A6;

  --violet-400: #A78BFA;
  --violet-deep: #7C5CFC;

  --grad-gold:   linear-gradient(135deg, #F5D67A 0%, #E6B84B 50%, #C8A84B 100%);
  --grad-teal:   linear-gradient(135deg, #67E8F9 0%, #2DD4BF 100%);
  --grad-violet: linear-gradient(135deg, #C4B5FD 0%, #7C5CFC 100%);
}`;

  const googleFonts = `<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Great+Vibes&display=swap" rel="stylesheet" />`;

  return (
    <Section id="code" num="13" title="Code Tokens" sub="Drop-in snippets for any project">
      <Sub title="Tailwind config">
        <CodeBlock code={tailwindConfig} lang="js" id="tw" copy={copy} copied={copied}/>
      </Sub>
      <Sub title="CSS variables (vanilla)">
        <CodeBlock code={cssVars} lang="css" id="css" copy={copy} copied={copied}/>
      </Sub>
      <Sub title="Google Fonts (link tags)">
        <CodeBlock code={googleFonts} lang="html" id="fonts" copy={copy} copied={copied}/>
      </Sub>
    </Section>
  );
}

function CodeBlock({ code, lang, id, copy, copied }) {
  return (
    <div className="panel overflow-hidden">
      <div className="flex items-center justify-between px-4 py-2 border-b border-white/5 bg-ink-950/60">
        <span className="font-mono text-[10px] uppercase tracking-widest text-slate-500">{lang}</span>
        <button onClick={() => copy(code, id)}
                className="text-[10px] font-mono px-2 py-0.5 rounded transition"
                style={{
                  background: copied === id ? '#10b981' : 'rgba(255,255,255,0.05)',
                  color: copied === id ? '#fff' : '#94a3b8',
                }}>
          {copied === id ? '✓ Copied' : 'Copy'}
        </button>
      </div>
      <pre className="px-4 py-3 font-mono text-[11px] leading-relaxed text-slate-300 overflow-x-auto scrollable whitespace-pre">
        {code}
      </pre>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
